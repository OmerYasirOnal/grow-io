function initAudio(){if(ac)return;try{ac=new(window.AudioContext||window.webkitAudioContext)();}catch(e){}}
function tone(f,t,d,v,dl){
  if(!ac)return;
  try{
    const now=ac.currentTime+(dl||0);
    const o=ac.createOscillator(),g=ac.createGain();
    o.type=t||'sine';o.frequency.setValueAtTime(f,now);
    g.gain.setValueAtTime(v||0.06,now);
    g.gain.exponentialRampToValueAtTime(0.001,now+(d||0.1));
    o.connect(g);g.connect(ac.destination);
    o.start(now);o.stop(now+(d||0.1)+0.01);
  }catch(e){}
}

// ═══ UTILITIES ═══
function rand(a,b){return a+Math.random()*(b-a);}
function randInt(a,b){return Math.floor(rand(a,b+1));}
function dist(a,b){const dx=a.x-b.x,dy=a.y-b.y;return Math.sqrt(dx*dx+dy*dy);}
function angleTo(a,b){return Math.atan2(b.y-a.y,b.x-a.x);}
function normAngle(a){while(a>PI)a-=TAU;while(a<-PI)a+=TAU;return a;}
function lerp(a,b,t){return a+(b-a)*t;}
function lerpColor(c1,c2,t){
  const r1=parseInt(c1.slice(1,3),16),g1=parseInt(c1.slice(3,5),16),b1=parseInt(c1.slice(5,7),16);
  const r2=parseInt(c2.slice(1,3),16),g2=parseInt(c2.slice(3,5),16),b2=parseInt(c2.slice(5,7),16);
  const r=Math.round(lerp(r1,r2,t)),g=Math.round(lerp(g1,g2,t)),b=Math.round(lerp(b1,b2,t));
  return '#'+(r<16?'0':'')+r.toString(16)+(g<16?'0':'')+g.toString(16)+(b<16?'0':'')+b.toString(16);
}
function hsl(h,s,l){return 'hsl('+h+','+s+'%,'+l+'%)';}
function clampWorld(x,y){const dx=x-WCX,dy=y-WCY,d=Math.sqrt(dx*dx+dy*dy);if(d<WR-20)return{x,y};const a=Math.atan2(dy,dx);return{x:WCX+Math.cos(a)*(WR-20),y:WCY+Math.sin(a)*(WR-20)};}

// ═══ SPATIAL GRID ═══
function resetGrid(){spatialGrid={};}
function gridInsert(entity,x,y){const k=Math.floor(x/CELL_SIZE)+','+Math.floor(y/CELL_SIZE);if(!spatialGrid[k])spatialGrid[k]=[];spatialGrid[k].push(entity);}
function gridQuery(x,y,r){
  const results=[];
  const cx1=Math.floor((x-r)/CELL_SIZE),cx2=Math.floor((x+r)/CELL_SIZE);
  const cy1=Math.floor((y-r)/CELL_SIZE),cy2=Math.floor((y+r)/CELL_SIZE);
  for(let gx=cx1;gx<=cx2;gx++)for(let gy=cy1;gy<=cy2;gy++){const k=gx+','+gy;if(spatialGrid[k])for(const e of spatialGrid[k])results.push(e);}
  return results;
}

// ═══ PARTICLE SYSTEM ═══
function spawnP(x,y,color,count,spd,sz){
  for(let i=0;i<count&&particles.length<MAX_PARTICLES;i++){
    const a=rand(0,TAU),s=rand(20,spd||80);
    particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:1,ml:rand(0.3,0.7),color:color||'#fff',size:sz||rand(2,4)});
  }
}
function updateParticles(dt){
  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i];
    p.x+=p.vx*dt;p.y+=p.vy*dt;
    p.vx*=0.96;p.vy*=0.96;p.vy+=60*dt;
    p.life-=dt/p.ml;
    if(p.life<=0)particles.splice(i,1);
  }
}
function drawParticles(){
  for(const p of particles){
    ctx.globalAlpha=Math.max(0,p.life);
    ctx.fillStyle=p.color;
    ctx.beginPath();ctx.arc(p.x,p.y,p.size*p.life,0,TAU);ctx.fill();
  }
  ctx.globalAlpha=1;
}

}
function spawnInitialFood(){for(let i=0;i<400;i++)spawnFood();}

// ═══ SNAKE CREATION ═══
function createSnake(isPlayer,x,y,skinIdx){
  if(x==null){const a=rand(0,TAU),r=rand(200,800);x=WCX+Math.cos(a)*r;y=WCY+Math.sin(a)*r;}
  const angle=rand(0,TAU);
  const segs=[{x,y}];
  for(let i=1;i<10;i++)segs.push({x:x-Math.cos(angle)*SEG_DIST*i,y:y-Math.sin(angle)*SEG_DIST*i});
  const pers=['collector','collector','collector','collector','collector','aggressive','aggressive','aggressive','coiler','coiler','ambush','ambush'];
  return{
    id:Math.random().toString(36).substr(2,6),
    name:isPlayer?'You':BOT_NAMES[randInt(0,BOT_NAMES.length-1)],
    skin:skinIdx!=null?skinIdx:randInt(0,4),
    segments:segs,angle,targetAngle:angle,
    speed:BASE_SPEED,length:10,score:0,alive:true,
    isPlayer:!!isPlayer,personality:isPlayer?null:pers[randInt(0,11)],
    boosting:false,boostFuel:100,
    powerups:{speed:0,shield:0,magnet:0,ghost:0},
    killCount:0,invulnTimer:0,
    aiTimer:rand(0,0.2),respawnTimer:0,isKing:false
  };
}

// ═══ SNAKE PHYSICS ═══
function updateSnake(s,dt){
  if(!s.alive)return;
  if(s.invulnTimer>0)s.invulnTimer-=dt;
  for(const k of PU_TYPES)if(s.powerups[k]>0)s.powerups[k]-=dt;
  let spd=s.speed;
  if(s.boosting&&s.boostFuel>0){spd*=2;s.boostFuel-=20*dt;}
  if(s.powerups.speed>0)spd*=1.8;
  if(s.boostFuel<=0)s.boosting=false;
  if(!s.boosting)s.boostFuel=Math.min(100,s.boostFuel+5*dt);
  // Shed segments while boosting
  if(s.boosting&&s.length>5&&frameCount%10===0){
    s.length--;
    const tail=s.segments[s.segments.length-1];
    spawnFood(tail.x,tail.y,1,SKINS[s.skin].c[0]);
  }
  // Turn
  let diff=normAngle(s.targetAngle-s.angle);
  s.angle+=Math.sign(diff)*Math.min(Math.abs(diff),TURN_SPEED*dt);
  s.angle=normAngle(s.angle);
  // Move head
  s.segments[0].x+=Math.cos(s.angle)*spd*dt;
  s.segments[0].y+=Math.sin(s.angle)*spd*dt;
  // Boundary
  const head=s.segments[0];
  const dfc=dist(head,{x:WCX,y:WCY});
  if(dfc>WR-10){
    const c=clampWorld(head.x,head.y);head.x=c.x;head.y=c.y;
    if(dfc>WR){killSnake(s,null,'boundary');return;}
  }
  // Follow
  for(let i=1;i<s.segments.length;i++){
    const prev=s.segments[i-1],curr=s.segments[i];
    const dx=prev.x-curr.x,dy=prev.y-curr.y;
    const d=Math.sqrt(dx*dx+dy*dy);
    if(d>SEG_DIST){curr.x+=(dx/d)*(d-SEG_DIST);curr.y+=(dy/d)*(d-SEG_DIST);}
  }
  while(s.segments.length<s.length){const t=s.segments[s.segments.length-1];s.segments.push({x:t.x,y:t.y});}
  if(s.segments.length>s.length)s.segments.length=s.length;
  s.speed=BASE_SPEED+Math.min(s.length*0.05,20);
}

// ═══ COLLISIONS ═══
function checkCollisions(){
  resetGrid();
  for(const s of snakes){
    if(!s.alive)continue;
    for(let i=0;i<s.segments.length;i++)gridInsert({snake:s,idx:i},s.segments[i].x,s.segments[i].y);
  }
  for(const s of snakes){
    if(!s.alive||s.invulnTimer>0)continue;
    const head=s.segments[0];
    const sw=6+Math.min(s.length*0.03,14);
    const hr=sw/2;
    // Head-body
    if(s.powerups.ghost<=0){
      const nearby=gridQuery(head.x,head.y,hr+20);
      for(const n of nearby){
        if(n.snake===s||!n.snake.alive)continue;
        if(n.idx<3)continue;
        const seg=n.snake.segments[n.idx];
        const ow=6+Math.min(n.snake.length*0.03,14);
        if(dist(head,seg)<hr+ow/2-2){
          if(n.idx===0){if(s.length<=n.snake.length)killSnake(s,n.snake,'head');else killSnake(n.snake,s,'head');}
          else killSnake(s,n.snake,'body');
          return;
        }
      }
    }
    // Food
    const magR=s.powerups.magnet>0?200:0;
    for(let i=foods.length-1;i>=0;i--){
      const f=foods[i];const d=dist(head,f);
      if(magR>0&&d<magR&&d>hr+f.r){const a=angleTo(f,head);f.x+=Math.cos(a)*200*gdt;f.y+=Math.sin(a)*200*gdt;}
      if(d<hr+f.r){
        s.length+=f.val*3;s.score+=f.val;
        if(s.isPlayer){score+=f.val;collectCombo++;collectTimer=0.8;sndCollect();postMsg({type:'HAPTIC',data:'light'});}
        spawnP(f.x,f.y,f.color,3,60,2);foods.splice(i,1);
      }
    }
    // Powerups
    for(let i=powerups.length-1;i>=0;i--){
      const pu=powerups[i];
      if(dist(head,pu)<hr+15){
        s.powerups[pu.type]=PU_DUR[pu.type];
        if(s.isPlayer){sndPowerup();postMsg({type:'HAPTIC',data:'light'});}
        spawnP(pu.x,pu.y,PU_COLORS[pu.type],10,100,3);powerups.splice(i,1);
      }
    }
  }
}

function killSnake(victim,killer,cause){
  if(!victim.alive)return;
  victim.alive=false;
  for(let i=0;i<victim.segments.length;i+=3){
    const seg=victim.segments[i];
    spawnFood(seg.x+rand(-10,10),seg.y+rand(-10,10),2,SKINS[victim.skin].c[0]);
  }
  if(killer&&killer.alive){
    killer.killCount++;killer.score+=100;
    if(killer.isPlayer){
      score+=100;totalKills++;sndKill();postMsg({type:'HAPTIC',data:'medium'});
      spawnP(victim.segments[0].x,victim.segments[0].y,SKINS[victim.skin].c[0],20,120,3);
    }
    if(victim.isKing&&killer.isPlayer){
      score+=500;sndKingSlain();postMsg({type:'HAPTIC',data:'heavy'});
      flashAlpha=0.3;flashColor='#ffd600';kingActive=false;nextKingScore=score+2000;
    }
  }
  if(victim.isPlayer){
    sndDeath();postMsg({type:'HAPTIC',data:'heavy'});
    flashAlpha=0.4;flashColor='#ff1744';shakeTimer=0.3;shakeMag=8;
    killerName=killer?killer.name:(cause==='boundary'?'the boundary':'unknown');
    deathCount++;totalGames++;saveHS();saveStats();checkUnlocks();saveSkins();
    state='dead';
    if(deathCount%3===0)postMsg({type:'SHOW_INTERSTITIAL'});
  }else{victim.respawnTimer=rand(3,6);}
}

function revivePlayer(){
  if(!player)return;
  player.alive=true;player.length=Math.max(10,Math.floor(player.length*0.5));
  player.segments=[{x:player.segments[0].x,y:player.segments[0].y}];
  player.invulnTimer=3;player.boosting=false;player.boostFuel=100;
  for(const k of PU_TYPES)player.powerups[k]=0;
  state='playing';
}

// ═══ BOT AI ═══
function updateBot(bot,dt){
  if(!bot.alive||bot.isPlayer)return;
  bot.aiTimer-=dt;if(bot.aiTimer>0)return;
  bot.aiTimer=0.15+rand(0,0.1);
  const head=bot.segments[0];
  let nearFood=null,nfD=Infinity;
  for(const f of foods){const d=dist(head,f);if(d<nfD){nfD=d;nearFood=f;}}
  let nearSmall=null,nearBig=null,nsD=Infinity,nbD=Infinity;
  for(const s of snakes){
    if(s===bot||!s.alive)continue;const d=dist(head,s.segments[0]);
    if(s.length<bot.length*0.8&&d<nsD){nsD=d;nearSmall=s;}
    if(s.length>bot.length*1.2&&d<nbD){nbD=d;nearBig=s;}
  }
  const bDist=dist(head,{x:WCX,y:WCY});
  if(bDist>WR-200){bot.targetAngle=angleTo(head,{x:WCX,y:WCY});return;}
  switch(bot.personality){
    case 'collector':
      if(nearBig&&nbD<300){bot.targetAngle=angleTo(nearBig.segments[0],head);break;}
      if(nearFood&&nfD<500){bot.targetAngle=angleTo(head,nearFood);break;}
      bot.targetAngle+=rand(-0.5,0.5);break;
    case 'aggressive':
      if(nearBig&&nbD<250){bot.targetAngle=angleTo(nearBig.segments[0],head);bot.boosting=false;break;}
      if(nearSmall&&nsD<600){
        const t=nsD/bot.speed;
        const px=nearSmall.segments[0].x+Math.cos(nearSmall.angle)*nearSmall.speed*t*0.5;
        const py=nearSmall.segments[0].y+Math.sin(nearSmall.angle)*nearSmall.speed*t*0.5;
        bot.targetAngle=angleTo(head,{x:px,y:py});
        bot.boosting=nsD<200;break;
      }
      if(nearFood)bot.targetAngle=angleTo(head,nearFood);else bot.targetAngle+=rand(-0.3,0.3);
      bot.boosting=false;break;
    case 'coiler':
      if(nearSmall&&nsD<400){
        const orbitD=100+nearSmall.length*0.3;
        const a=angleTo(head,nearSmall.segments[0]);
        bot.targetAngle=dist(head,nearSmall.segments[0])>orbitD+50?a:a+PI/2;break;
      }
      if(nearFood)bot.targetAngle=angleTo(head,nearFood);else bot.targetAngle+=rand(-0.4,0.4);break;
    case 'ambush':
      if(nearSmall&&nsD<250){bot.targetAngle=angleTo(head,nearSmall.segments[0]);bot.boosting=true;break;}
      bot.boosting=false;
      if(nearFood&&nfD<300)bot.targetAngle=angleTo(head,nearFood);else bot.targetAngle+=rand(-0.2,0.2);break;
  }
}

// ═══ SKIN UNLOCKS ═══
function checkUnlocks(){
  const prev=unlockedSkins.length;
  for(let i=0;i<SKINS.length;i++){
    if(unlockedSkins.includes(i))continue;
    const u=SKINS[i].u;if(u==='free'){unlockedSkins.push(i);continue;}
    const t=u[0],v=parseInt(u.slice(1));
    if(t==='s'&&score>=v)unlockedSkins.push(i);
    if(t==='k'&&totalKills>=v)unlockedSkins.push(i);
    if(t==='l'&&player&&player.length>=v)unlockedSkins.push(i);
    if(t==='g'&&totalGames>=v)unlockedSkins.push(i);
  }
  if(unlockedSkins.length>prev)saveSkins();
}

// ═══ ZONE UPDATE ═══
function updateZone(){
  if(!player)return;
  let z=ZONES[0];for(const zn of ZONES)if(player.length>=zn.min)z=zn;
  if(z.bg!==targetZoneBg){targetZoneBg=z.bg;targetZoneAccent=z.accent;sndZone();}
  zoneBg=lerpColor(zoneBg,targetZoneBg,0.02);
  zoneAccent=lerpColor(zoneAccent,targetZoneAccent,0.02);
}

// ═══ GAME INIT ═══
function startGame(){
  initAudio();score=0;collectCombo=0;collectTimer=0;
  foods=[];powerups=[];particles=[];snakes=[];
  kingActive=false;nextKingScore=2000;
  spawnInitialFood();
  player=createSnake(true,WCX,WCY,currentSkin);snakes.push(player);
  for(let i=0;i<MAX_BOTS;i++){const b=createSnake(false);b.length=randInt(10,40);snakes.push(b);}
  for(let i=0;i<50;i++){const a=rand(0,TAU),r=rand(30,200);spawnFood(WCX+Math.cos(a)*r,WCY+Math.sin(a)*r,1);}
  camera.x=WCX;camera.y=WCY;camera.zoom=1;
  state='playing';totalGames++;saveStats();
}

// ═══ UPDATE ═══
function update(dt){
  gdt=dt;frameCount++;
  if(flashAlpha>0)flashAlpha-=dt*2;
  if(shakeTimer>0)shakeTimer-=dt;
  if(collectTimer>0){collectTimer-=dt;if(collectTimer<=0)collectCombo=0;}
  if(state!=='playing')return;
  for(const s of snakes)updateSnake(s,dt);
  for(const s of snakes)if(!s.isPlayer)updateBot(s,dt);
  checkCollisions();updateParticles(dt);
  foodSpawnTimer-=dt;if(foodSpawnTimer<=0){foodSpawnTimer=0.2;spawnFood();}
  puSpawnTimer-=dt;if(puSpawnTimer<=0){puSpawnTimer=5;spawnPowerup();}
  // Respawn bots
  for(let i=snakes.length-1;i>=0;i--){
    const s=snakes[i];
    if(!s.alive&&!s.isPlayer){s.respawnTimer-=dt;if(s.respawnTimer<=0){snakes.splice(i,1);const nb=createSnake(false);nb.length=randInt(10,30+Math.floor(score/200));snakes.push(nb);}}
  }
  // King
  if(!kingActive&&score>=nextKingScore){
    kingActive=true;sndKing();
    const k=createSnake(false);k.name='KING';k.isKing=true;k.length=200+Math.floor(score/50);
    k.personality='aggressive';k.skin=randInt(0,4);snakes.push(k);
  }
  // Camera
  if(player&&player.alive){
    camera.x=lerp(camera.x,player.segments[0].x,0.08);
    camera.y=lerp(camera.y,player.segments[0].y,0.08);
    camera.zoom=lerp(camera.zoom,Math.max(0.6,1-player.length*0.0008),0.02);
  }
  updateZone();
  if(player&&player.alive&&player.boosting){const tail=player.segments[player.segments.length-1];spawnP(tail.x,tail.y,SKINS[player.skin].c[0],1,40,2);}
}

// ═══ RENDER ═══
function render(){
  ctx.setTransform(dpr,0,0,dpr,0,0);
  ctx.fillStyle=zoneBg;ctx.fillRect(0,0,W,H);
  if(state==='playing'||state==='dead'){
    const zoom=camera.zoom;
    const sx=shakeTimer>0?rand(-shakeMag,shakeMag):0,sy=shakeTimer>0?rand(-shakeMag,shakeMag):0;
    ctx.save();ctx.translate(W/2+sx,H/2+sy);ctx.scale(zoom,zoom);ctx.translate(-camera.x,-camera.y);
    drawGrid();drawBoundary();drawFood();drawPowerups();
    for(const s of snakes)if(s.alive&&!s.isPlayer)drawSnake(s);
    if(player&&player.alive)drawSnake(player);
    drawParticles();ctx.restore();
    drawHUD();drawMinimap();
    if(joystick.active)drawJoystick();
    drawBoostBtn();
  }
  if(state==='menu')drawMenu();
  if(state==='dead')drawDeathScreen();
  if(state==='skinselect')drawSkinSelect();
  if(flashAlpha>0){ctx.fillStyle=flashColor;ctx.globalAlpha=flashAlpha;ctx.fillRect(0,0,W,H);ctx.globalAlpha=1;}
}

// ═══ DRAW HELPERS ═══
function drawGrid(){
  ctx.strokeStyle='rgba(255,255,255,0.025)';ctx.lineWidth=1;
  const gs=100;
  const x1=Math.floor((camera.x-W/2/camera.zoom)/gs)*gs,x2=Math.ceil((camera.x+W/2/camera.zoom)/gs)*gs;
  const y1=Math.floor((camera.y-H/2/camera.zoom)/gs)*gs,y2=Math.ceil((camera.y+H/2/camera.zoom)/gs)*gs;
  ctx.beginPath();
  for(let x=x1;x<=x2;x+=gs){ctx.moveTo(x,y1);ctx.lineTo(x,y2);}
  for(let y=y1;y<=y2;y+=gs){ctx.moveTo(x1,y);ctx.lineTo(x2,y);}
  ctx.stroke();
}
function drawBoundary(){
  ctx.beginPath();ctx.arc(WCX,WCY,WR,0,TAU);
  ctx.strokeStyle='rgba(255,50,50,0.15)';ctx.lineWidth=4;ctx.stroke();
  ctx.strokeStyle='rgba(255,50,50,0.06)';ctx.lineWidth=20;ctx.stroke();
}
function drawFood(){
  const vx1=camera.x-W/2/camera.zoom-20,vx2=camera.x+W/2/camera.zoom+20;
  const vy1=camera.y-H/2/camera.zoom-20,vy2=camera.y+H/2/camera.zoom+20;
  for(const f of foods){
    if(f.x<vx1||f.x>vx2||f.y<vy1||f.y>vy2)continue;
    f.pulse+=0.05;const r=f.r+Math.sin(f.pulse)*1;
    ctx.fillStyle=f.color;ctx.shadowColor=f.color;ctx.shadowBlur=6;
    ctx.beginPath();ctx.arc(f.x,f.y,r,0,TAU);ctx.fill();ctx.shadowBlur=0;
  }
}
function drawPowerups(){
  const vx1=camera.x-W/2/camera.zoom-30,vx2=camera.x+W/2/camera.zoom+30;
  const vy1=camera.y-H/2/camera.zoom-30,vy2=camera.y+H/2/camera.zoom+30;
  for(const pu of powerups){
    if(pu.x<vx1||pu.x>vx2||pu.y<vy1||pu.y>vy2)continue;
    pu.pulse+=0.04;const r=12+Math.sin(pu.pulse)*3;
    ctx.save();ctx.translate(pu.x,pu.y);ctx.rotate(pu.pulse*0.5);
    ctx.fillStyle=PU_COLORS[pu.type];ctx.shadowColor=PU_COLORS[pu.type];ctx.shadowBlur=15;
    if(pu.type==='speed'){ctx.beginPath();for(let i=0;i<6;i++){const a=i*PI/3-PI/6;ctx.lineTo(Math.cos(a)*r,Math.sin(a)*r);}ctx.closePath();ctx.fill();}
    else if(pu.type==='shield'){ctx.beginPath();ctx.arc(0,0,r,0,TAU);ctx.fill();}
    else if(pu.type==='magnet'){ctx.beginPath();for(let i=0;i<10;i++){const a=i*PI/5-PI/2;const d=i%2===0?r:r/2;ctx.lineTo(Math.cos(a)*d,Math.sin(a)*d);}ctx.closePath();ctx.fill();}
    else{ctx.beginPath();ctx.moveTo(0,-r);ctx.lineTo(r*0.6,0);ctx.lineTo(0,r);ctx.lineTo(-r*0.6,0);ctx.closePath();ctx.fill();}
    ctx.shadowBlur=0;ctx.restore();
    ctx.fillStyle='#fff';ctx.font='bold 8px Rajdhani';ctx.textAlign='center';
    ctx.fillText(pu.type.toUpperCase(),pu.x,pu.y+r+12);
  }
}

function drawSnake(s){
  const skin=SKINS[s.skin];const w=6+Math.min(s.segments.length*0.03,14);
  if(s.powerups.ghost>0)ctx.globalAlpha=0.4;
  if(s.invulnTimer>0&&Math.floor(s.invulnTimer*10)%2===0)ctx.globalAlpha=0.3;
  for(let i=s.segments.length-1;i>=0;i--){
    const seg=s.segments[i];const t=1-i/Math.max(1,s.segments.length-1);
    const r=w/2*(0.5+t*0.5);let color;
    if(skin.p==='rainbow')color=hsl((i*8+frameCount*2)%360,80,60);
    else if(skin.p==='striped')color=Math.floor(i/3)%2===0?skin.c[0]:skin.c[1];
    else color=lerpColor(skin.c[1],skin.c[0],t);
    ctx.fillStyle=color;
    if(i===0){ctx.shadowColor=skin.c[0];ctx.shadowBlur=skin.p==='neon'?20:12;}
    ctx.beginPath();ctx.arc(seg.x,seg.y,r,0,TAU);ctx.fill();
    if(i===0)ctx.shadowBlur=0;
    if(skin.p==='dotted'&&i%4===0&&i>0){ctx.fillStyle='rgba(255,255,255,0.3)';ctx.beginPath();ctx.arc(seg.x,seg.y,r*0.4,0,TAU);ctx.fill();}
  }
  // Shield aura
  if(s.powerups.shield>0){ctx.strokeStyle='rgba(64,196,255,0.4)';ctx.lineWidth=3;ctx.shadowColor='#40c4ff';ctx.shadowBlur=10;ctx.beginPath();ctx.arc(s.segments[0].x,s.segments[0].y,w/2+6,0,TAU);ctx.stroke();ctx.shadowBlur=0;}
  // Eyes
  const head=s.segments[0];const eyeD=w/4,eyeR=w/6;
  const ex1=head.x+Math.cos(s.angle-0.4)*eyeD,ey1=head.y+Math.sin(s.angle-0.4)*eyeD;
  const ex2=head.x+Math.cos(s.angle+0.4)*eyeD,ey2=head.y+Math.sin(s.angle+0.4)*eyeD;
  ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(ex1,ey1,eyeR,0,TAU);ctx.fill();ctx.beginPath();ctx.arc(ex2,ey2,eyeR,0,TAU);ctx.fill();
  ctx.fillStyle='#111';
  ctx.beginPath();ctx.arc(ex1+Math.cos(s.angle)*eyeR*0.4,ey1+Math.sin(s.angle)*eyeR*0.4,eyeR*0.5,0,TAU);ctx.fill();
  ctx.beginPath();ctx.arc(ex2+Math.cos(s.angle)*eyeR*0.4,ey2+Math.sin(s.angle)*eyeR*0.4,eyeR*0.5,0,TAU);ctx.fill();
  // King crown
  if(s.isKing){ctx.fillStyle='#ffd600';ctx.shadowColor='#ffd600';ctx.shadowBlur=10;const cx=head.x,cy=head.y-w/2-2;ctx.beginPath();ctx.moveTo(cx-6,cy+4);ctx.lineTo(cx-6,cy-2);ctx.lineTo(cx-3,cy+1);ctx.lineTo(cx,cy-4);ctx.lineTo(cx+3,cy+1);ctx.lineTo(cx+6,cy-2);ctx.lineTo(cx+6,cy+4);ctx.closePath();ctx.fill();ctx.shadowBlur=0;}
  // Name
  ctx.fillStyle='rgba(255,255,255,0.7)';ctx.font='bold 10px Rajdhani';ctx.textAlign='center';
  ctx.fillText(s.name,head.x,head.y-w/2-8);
  ctx.fillStyle='rgba(255,255,255,0.4)';ctx.font='600 8px Rajdhani';
  ctx.fillText(s.length,head.x,head.y-w/2-18);
  ctx.globalAlpha=1;ctx.textAlign='left';
}

// ═══ HUD ═══
function rr(x,y,w,h,r){ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();}

function drawHUD(){
  const m=sat+10;
  ctx.fillStyle=zoneAccent;ctx.font='900 28px Orbitron';ctx.textAlign='left';
  ctx.shadowColor=zoneAccent;ctx.shadowBlur=10;ctx.fillText(score,15,m+30);ctx.shadowBlur=0;
  ctx.fillStyle='rgba(255,255,255,0.6)';ctx.font='700 14px Rajdhani';
  ctx.fillText(L.length+': '+(player?player.length:0),15,m+50);
  ctx.fillText(L.kills+': '+(player?player.killCount:0),15,m+66);
  let py=m+85;
  if(player)for(const k of PU_TYPES){if(player.powerups[k]>0){ctx.fillStyle=PU_COLORS[k];ctx.font='bold 12px Rajdhani';ctx.fillText(k.toUpperCase()+' '+player.powerups[k].toFixed(1)+'s',15,py);py+=16;}}
  // Leaderboard
  const lb=snakes.filter(s=>s.alive).sort((a,b)=>b.length-a.length).slice(0,5);
  ctx.textAlign='right';const lx=W-115,ly=m+130;
  ctx.fillStyle='rgba(0,0,0,0.3)';rr(lx-5,ly-14,105,lb.length*16+8,6);ctx.fill();
  for(let i=0;i<lb.length;i++){
    const s=lb[i];ctx.fillStyle=s.isPlayer?zoneAccent:'rgba(255,255,255,0.5)';
    ctx.font=(s.isPlayer?'bold ':'')+'11px Rajdhani';
    ctx.fillText((i+1)+'. '+s.name+' ('+s.length+')',lx+95,ly+i*16);
  }
  ctx.textAlign='left';
}

// ═══ MINIMAP ═══
let mmC=null;
function drawMinimap(){
  const sz=90,mx=W-sz-10,my=sat+12,sc=sz/WS;
  if(!mmC){mmC=document.createElement('canvas');mmC.width=sz*2;mmC.height=sz*2;}
  const mc=mmC.getContext('2d');mc.setTransform(2,0,0,2,0,0);mc.clearRect(0,0,sz,sz);
  mc.fillStyle='rgba(0,0,0,0.5)';mc.fillRect(0,0,sz,sz);
  mc.strokeStyle='rgba(255,255,255,0.1)';mc.lineWidth=1;mc.beginPath();mc.arc(sz/2,sz/2,WR*sc,0,TAU);mc.stroke();
  mc.fillStyle='rgba(100,255,100,0.2)';for(let i=0;i<foods.length;i+=10){const f=foods[i];mc.fillRect(f.x*sc,f.y*sc,1,1);}
  for(const s of snakes){if(!s.alive)continue;mc.fillStyle=s.isPlayer?'#00e5ff':(s.isKing?'#ffd600':SKINS[s.skin].c[0]);mc.beginPath();mc.arc(s.segments[0].x*sc,s.segments[0].y*sc,s.isPlayer?3:1.5,0,TAU);mc.fill();}
  mc.strokeStyle='rgba(255,255,255,0.15)';mc.lineWidth=1;mc.strokeRect(0,0,sz,sz);
  ctx.drawImage(mmC,0,0,sz*2,sz*2,mx,my,sz,sz);
}

// ═══ JOYSTICK ═══
function drawJoystick(){
  ctx.strokeStyle='rgba(255,255,255,0.15)';ctx.lineWidth=2;ctx.beginPath();ctx.arc(joystick.cx,joystick.cy,JOY_RADIUS,0,TAU);ctx.stroke();
  const kx=joystick.cx+joystick.dx,ky=joystick.cy+joystick.dy;
  ctx.fillStyle='rgba(0,229,255,0.25)';ctx.shadowColor='#00e5ff';ctx.shadowBlur=8;

}
function drawBoostBtn(){

// ═══ MENU ═══
function drawMenu(){
  ctx.fillStyle='#0a0a1a';ctx.fillRect(0,0,W,H);
  ctx.strokeStyle='rgba(255,255,255,0.02)';ctx.lineWidth=1;
  for(let x=0;x<W;x+=40){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();}
  for(let y=0;y<H;y+=40){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}
  ctx.textAlign='center';
  ctx.fillStyle='#00e5ff';ctx.font='900 52px Orbitron';ctx.shadowColor='#00e5ff';ctx.shadowBlur=30;
  ctx.fillText('GROW',W/2,H*0.28);ctx.shadowBlur=0;
  ctx.fillStyle='rgba(255,255,255,0.8)';ctx.font='700 28px Orbitron';ctx.fillText('.io',W/2+90,H*0.28);
  if(highScore>0){ctx.fillStyle='rgba(255,255,255,0.4)';ctx.font='600 16px Rajdhani';ctx.fillText(L.best+': '+highScore,W/2,H*0.35);}
  const bw=180,bh=50,bx=W/2-bw/2,by=H*0.44;
  ctx.fillStyle='#00e5ff';ctx.shadowColor='#00e5ff';ctx.shadowBlur=15;rr(bx,by,bw,bh,25);ctx.fill();ctx.shadowBlur=0;
  ctx.fillStyle='#0a0a1a';ctx.font='900 22px Orbitron';ctx.fillText(L.play,W/2,by+34);
  const sy=H*0.56;
  ctx.fillStyle='#7c4dff';ctx.shadowColor='#7c4dff';ctx.shadowBlur=10;rr(bx+20,sy,bw-40,40,20);ctx.fill();ctx.shadowBlur=0;
  ctx.fillStyle='#fff';ctx.font='700 16px Orbitron';ctx.fillText(L.skins,W/2,sy+27);
  // Preview
  const py=H*0.7;const skin=SKINS[currentSkin];
  for(let i=0;i<15;i++){const a=(i/15)*TAU+frameCount*0.02;const px=W/2+Math.cos(a)*30,ppy=py+Math.sin(a)*30;const t=i/15;ctx.fillStyle=lerpColor(skin.c[1],skin.c[0],t);ctx.beginPath();ctx.arc(px,ppy,5-t*2,0,TAU);ctx.fill();}
  ctx.fillStyle='rgba(255,255,255,0.3)';ctx.font='600 12px Rajdhani';ctx.fillText(skin.name,W/2,py+50);
  ctx.textAlign='left';
}

// ═══ DEATH SCREEN ═══
function drawDeathScreen(){
  ctx.fillStyle='rgba(0,0,0,0.7)';ctx.fillRect(0,0,W,H);ctx.textAlign='center';
  ctx.fillStyle='#ff1744';ctx.font='900 36px Orbitron';ctx.shadowColor='#ff1744';ctx.shadowBlur=20;
  ctx.fillText(L.eliminated,W/2,H*0.25);ctx.shadowBlur=0;
  ctx.fillStyle='rgba(255,255,255,0.7)';ctx.font='600 18px Rajdhani';
  ctx.fillText(L.score+': '+score,W/2,H*0.34);
  ctx.fillText(L.length+': '+(player?player.length:0),W/2,H*0.39);
  ctx.fillText(L.kills+': '+(player?player.killCount:0),W/2,H*0.44);
  ctx.fillStyle='rgba(255,255,255,0.4)';ctx.font='600 14px Rajdhani';
  ctx.fillText(L.eliminatedBy+' '+killerName,W/2,H*0.50);
  if(score>=highScore&&score>0){ctx.fillStyle='#ffd600';ctx.font='bold 16px Rajdhani';ctx.fillText(L.newBest,W/2,H*0.55);}
  const bw=200,bh=45,ry=H*0.62;
  ctx.fillStyle='#7c4dff';ctx.shadowColor='#7c4dff';ctx.shadowBlur=12;rr(W/2-bw/2,ry,bw,bh,22);ctx.fill();ctx.shadowBlur=0;
  ctx.fillStyle='#fff';ctx.font='700 16px Rajdhani';ctx.fillText(L.watchRevive,W/2,ry+30);
  const ry2=H*0.74;ctx.strokeStyle='rgba(255,255,255,0.3)';ctx.lineWidth=2;rr(W/2-bw/2,ry2,bw,bh,22);ctx.stroke();
  ctx.fillStyle='rgba(255,255,255,0.7)';ctx.fillText(L.playAgain,W/2,ry2+30);
  ctx.textAlign='left';
}

// ═══ SKIN SELECT ═══
function drawSkinSelect(){
  ctx.fillStyle='#0a0a1a';ctx.fillRect(0,0,W,H);ctx.textAlign='center';
  ctx.fillStyle='#fff';ctx.font='900 24px Orbitron';ctx.fillText(L.skins,W/2,sat+40);
  ctx.fillStyle='rgba(255,255,255,0.5)';ctx.font='700 18px Rajdhani';ctx.textAlign='left';ctx.fillText(L.back,15,sat+40);ctx.textAlign='center';
  const cols=5,cellW=W/cols,cellH=70,startY=sat+70-skinScroll;
  for(let i=0;i<SKINS.length;i++){
    const row=Math.floor(i/cols),col=i%cols;
    const cx=col*cellW+cellW/2,cy=startY+row*cellH+cellH/2;
    if(cy<sat+50||cy>H-sab)continue;
    const unlocked=unlockedSkins.includes(i);
    if(i===currentSkin){ctx.strokeStyle=zoneAccent;ctx.lineWidth=2;rr(cx-cellW/2+4,cy-cellH/2+4,cellW-8,cellH-8,8);ctx.stroke();}
    if(unlocked){
      const skin=SKINS[i];
      for(let j=0;j<5;j++){const t=j/5;let c;if(skin.p==='rainbow')c=hsl((j*60+frameCount*2)%360,80,60);else c=lerpColor(skin.c[1],skin.c[0],t);ctx.fillStyle=c;ctx.beginPath();ctx.arc(cx-10+j*5,cy-5,5-t*2,0,TAU);ctx.fill();}
      ctx.fillStyle='rgba(255,255,255,0.5)';ctx.font='600 10px Rajdhani';ctx.fillText(skin.name,cx,cy+18);
    }else{
      ctx.fillStyle='rgba(255,255,255,0.1)';ctx.beginPath();ctx.arc(cx,cy-5,12,0,TAU);ctx.fill();
      ctx.fillStyle='rgba(255,255,255,0.2)';ctx.font='bold 12px Rajdhani';ctx.fillText('?',cx,cy);
      const u=SKINS[i].u,t=u[0],v=parseInt(u.slice(1));let hint='';
      if(t==='s')hint=L.scoreReq+' '+v;if(t==='k')hint=v+' '+L.killsReq;if(t==='l')hint=L.lengthReq+' '+v;if(t==='g')hint=v+' '+L.gamesReq;
      ctx.fillStyle='rgba(255,255,255,0.3)';ctx.font='600 8px Rajdhani';ctx.fillText(hint,cx,cy+18);
    }
  }
  ctx.textAlign='left';
}

// ═══ INPUT ═══
let touches={};
$.addEventListener('touchstart',function(e){
  e.preventDefault();initAudio();
  const t=e.changedTouches[0];
  if(state==='menu'){handleMenuTap(t.clientX,t.clientY);return;}
  if(state==='dead'){handleDeathTap(t.clientX,t.clientY);return;}
  if(state==='skinselect'){handleSkinTap(t.clientX,t.clientY);touches._lastY=t.clientY;return;}
  if(state==='playing'){
    const bx=W-55,by=H-sab-55;
    if(dist({x:t.clientX,y:t.clientY},{x:bx,y:by})<35){if(player)player.boosting=true;sndBoost();touches[t.identifier]='boost';return;}
    if(joystick.active&&e.touches.length>1){if(player)player.boosting=true;sndBoost();touches[t.identifier]='boost';return;}
    joystick.active=true;joystick.cx=t.clientX;joystick.cy=t.clientY;joystick.dx=0;joystick.dy=0;
    touches[t.identifier]='joy';
  }
},{passive:false});

$.addEventListener('touchmove',function(e){
  e.preventDefault();
  if(state==='skinselect'){const t=e.changedTouches[0];skinScroll-=t.clientY-(touches._lastY||t.clientY);skinScroll=Math.max(0,Math.min(skinScroll,Math.ceil(SKINS.length/5)*70-H+sat+80));touches._lastY=t.clientY;return;}
  for(let i=0;i<e.changedTouches.length;i++){
    const t=e.changedTouches[i];
    if(touches[t.identifier]==='joy'&&joystick.active){
      let dx=t.clientX-joystick.cx,dy=t.clientY-joystick.cy;
      const d=Math.sqrt(dx*dx+dy*dy);if(d>JOY_RADIUS){dx=dx/d*JOY_RADIUS;dy=dy/d*JOY_RADIUS;}
      joystick.dx=dx;joystick.dy=dy;
      if(d>JOY_DEAD&&player){joystick.angle=Math.atan2(dy,dx);player.targetAngle=joystick.angle;}
    }
  }
},{passive:false});

$.addEventListener('touchend',function(e){
  e.preventDefault();
  for(let i=0;i<e.changedTouches.length;i++){
    const t=e.changedTouches[i];
    if(touches[t.identifier]==='joy')joystick.active=false;
    if(touches[t.identifier]==='boost'&&player)player.boosting=false;
    delete touches[t.identifier];
  }
  touches._lastY=undefined;
},{passive:false});

// Mouse
$.addEventListener('mousedown',function(e){
  initAudio();
  if(state==='menu'){handleMenuTap(e.clientX,e.clientY);return;}
  if(state==='dead'){handleDeathTap(e.clientX,e.clientY);return;}
  if(state==='skinselect'){handleSkinTap(e.clientX,e.clientY);return;}
  if(e.button===2&&player){player.boosting=true;sndBoost();}
});
$.addEventListener('mousemove',function(e){if(state==='playing'&&player&&player.alive)player.targetAngle=Math.atan2(e.clientY-H/2,e.clientX-W/2);});
$.addEventListener('mouseup',function(e){if(player)player.boosting=false;});
$.addEventListener('contextmenu',function(e){e.preventDefault();});
window.addEventListener('keydown',function(e){if(e.code==='Space'&&player){player.boosting=true;sndBoost();}});
window.addEventListener('keyup',function(e){if(e.code==='Space'&&player)player.boosting=false;});

function handleMenuTap(x,y){
  sndMenu();const bw=180,bh=50,bx=W/2-bw/2,by=H*0.44;
  if(x>bx&&x<bx+bw&&y>by&&y<by+bh){startGame();return;}
  const sy=H*0.56;if(x>bx+20&&x<bx+bw-20&&y>sy&&y<sy+40){state='skinselect';skinScroll=0;}
}
function handleDeathTap(x,y){
  sndMenu();const bw=200,bh=45,ry=H*0.62;
  if(x>W/2-bw/2&&x<W/2+bw/2&&y>ry&&y<ry+bh){postMsg({type:'SHOW_REWARDED_AD',data:{reward:'continue'}});return;}
  const ry2=H*0.74;if(x>W/2-bw/2&&x<W/2+bw/2&&y>ry2&&y<ry2+bh)startGame();
}
function handleSkinTap(x,y){
  if(x<80&&y<sat+55){state='menu';return;}
  const cols=5,cellW=W/cols,cellH=70,startY=sat+70-skinScroll;
  const col=Math.floor(x/cellW),row=Math.floor((y-startY)/cellH);
  const idx=row*cols+col;
  if(idx>=0&&idx<SKINS.length&&unlockedSkins.includes(idx)){currentSkin=idx;saveStats();sndMenu();}
}

// ═══ GAME LOOP ═══
let lt=0;
function loop(ts){const d=Math.min((ts-lt)/1000,0.05);lt=ts;update(d);render();requestAnimationFrame(loop);}
document.fonts.ready.then(function(){requestAnimationFrame(loop);});
</script>
