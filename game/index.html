// ═══ SNAKE CREATION ═══
function createSnake(isPlayer,x,y,skinIdx){
  if(x==null){const a=rand(0,TAU),r=rand(200,800);x=WCX+Math.cos(a)*r;y=WCY+Math.sin(a)*r;}
  const angle=rand(0,TAU);
  const segs=[{x,y}];
  for(let i=1;i<10;i++)segs.push({x:x-Math.cos(angle)*SEG_DIST*i,y:y-Math.sin(angle)*SEG_DIST*i});
  // Pre-seed the path history so the body has a trail to follow on frame 1.
  // cumDist is monotonic-increasing absolute distance traveled by the head;
  // pathHistory[0] (head) holds the LARGEST cumDist, older entries decrease.
  // Seeds therefore start at 0 (head) and go negative going back, so head
  // begins at cumDist=0 and grows as the snake moves.
  const pathHistory=[];
  for(let i=0;i<200;i++){
    pathHistory.push({
      x:x-Math.cos(angle)*i*0.5,
      y:y-Math.sin(angle)*i*0.5,
      cumDist:-i*0.5
    });
  }
  const pers=['collector','collector','collector','collector','collector','aggressive','aggressive','aggressive','coiler','coiler','ambush','ambush'];
  return{
    id:Math.random().toString(36).substr(2,6),
    name:isPlayer?'You':BOT_NAMES[randInt(0,BOT_NAMES.length-1)],
    skin:skinIdx!=null?skinIdx:randInt(0,4),
    segments:segs,angle,targetAngle:angle,
    speed:BASE_SPEED,length:10,score:0,alive:true,
    isPlayer:!!isPlayer,personality:isPlayer?null:pers[randInt(0,11)],
    boosting:false,boostFuel:100,
    powerups:{speed:0,shield:0,magnet:0,ghost:0},
    killCount:0,invulnTimer:0,
    aiTimer:rand(0,0.2),respawnTimer:0,isKing:false,
    skill:0.6+rand(0,0.4), // per-bot skill multiplier 0.6..1
    pathHistory:pathHistory,_lastHX:x,_lastHY:y,
    // Eat-punch (Wave 3.2): short-lived scalar 0→eases back, scales the head on
    // food pickup. Stored on the snake so the per-frame draw reads it with zero
    // allocation. Only the player ever sets it (eat feedback is player-gated).
    headPunch:0
  };
}

// ═══ SNAKE PHYSICS ═══
function updateSnake(s,dt){
  if(!s.alive)return;
  if(s.invulnTimer>0)s.invulnTimer-=dt;
  for(const k of PU_TYPES)if(s.powerups[k]>0)s.powerups[k]-=dt;
  let spd=s.speed;
  // Timer-based boost. boostFuel goes 0..100. Burns ~50/sec while held
  // (≈2 s of full boost), regens 25/sec when off (≈4 s to refill). No
  // segment shed — that loop fed the player's own dropped tail back as
  // +3 popups during boost, which was the spam the user reported.
  if(s.boosting){
    if(s.boostFuel<=0){s.boostFuel=0;s.boosting=false;}
    else{spd*=2;s.boostFuel-=50*dt;}
  }else{
    if(s.boostFuel<100)s.boostFuel=Math.min(100,s.boostFuel+25*dt);
  }
  if(s.powerups.speed>0)spd*=1.8;
  if(s.isBoss)spd*=1.3; // Boss is 30% faster than a normal aggressive bot.
  // Turn
  let diff=normAngle(s.targetAngle-s.angle);
  s.angle+=Math.sign(diff)*Math.min(Math.abs(diff),TURN_SPEED*dt);
  s.angle=normAngle(s.angle);
  // Move head
  s.segments[0].x+=Math.cos(s.angle)*spd*dt;
  s.segments[0].y+=Math.sin(s.angle)*spd*dt;
  // Boundary — slide along the rim instead of clamping or killing.
  // Project the head back onto the safe ring and rotate the heading to
  // the tangent so the snake glides around the edge instead of getting
  // stuck pushing into it (or instantly dying like before).
  const head=s.segments[0];
  const dfc=dist(head,{x:WCX,y:WCY});
  if(dfc>WR-12){
    const ang=Math.atan2(head.y-WCY,head.x-WCX);
    head.x=WCX+Math.cos(ang)*(WR-12);
    head.y=WCY+Math.sin(ang)*(WR-12);
    // If we're aiming outward, deflect to the closer tangent direction.
    const inward=ang+PI;
    const aimDelta=normAngle(s.angle-inward);
    if(Math.abs(aimDelta)<PI/2){
      const t1=ang+PI/2,t2=ang-PI/2;
      const d1=Math.abs(normAngle(s.angle-t1));
      const d2=Math.abs(normAngle(s.angle-t2));
      const tan=d1<d2?t1:t2;
      s.angle=tan;
      // Bots: keep targetAngle in sync so the AI doesn't fight the slide.
      if(!s.isPlayer)s.targetAngle=tan;
    }
  }
  // Path-following body: record where the head has been (with cumulative
  // distance along the trail), then place each segment at the point that
  // sits exactly i*SEG_DIST behind the head along that path. Means the
  // body actually walks the same line the head walked, instead of cutting
  // the inside of every turn the way pure pull-physics did.
  if(!s.pathHistory){s.pathHistory=[];s._lastHX=head.x;s._lastHY=head.y;}
  const dxH=head.x-s._lastHX,dyH=head.y-s._lastHY;
  const movedH=Math.sqrt(dxH*dxH+dyH*dyH);
  s._lastHX=head.x;s._lastHY=head.y;
  if(movedH>0.01){
    const prevCum=s.pathHistory.length?s.pathHistory[0].cumDist:0;
    s.pathHistory.unshift({x:head.x,y:head.y,cumDist:prevCum+movedH});
  }
  // Walk the (descending-by-recency) history with a single advancing pointer.
  // pathHistory[0] = head with the largest cumDist; entries get smaller cumDist
  // moving toward the tail end. To place segment i at i*SEG_DIST behind the
  // head we look for the first entry whose cumDist is <= headCum - i*SEG_DIST.
  // HYBRID: when the recorded path isn't deep enough yet (long snake +
  // recent growth), fall back to chain-pull physics for the segments past
  // the path's reach so segments don't all stack on the last known point.
  const headCum=s.pathHistory.length?s.pathHistory[0].cumDist:0;
  let hIdx=0;
  for(let i=1;i<s.segments.length;i++){
    const targetCum=headCum-i*SEG_DIST;
    while(hIdx<s.pathHistory.length-1&&s.pathHistory[hIdx].cumDist>targetCum)hIdx++;
    const p=s.pathHistory[hIdx];
    if(p&&p.cumDist<=targetCum){
      s.segments[i].x=p.x;s.segments[i].y=p.y;
    }else{
      // Path doesn't reach this segment — chain-follow from the previous one.
      const prev=s.segments[i-1],curr=s.segments[i];
      const dx=prev.x-curr.x,dy=prev.y-curr.y;
      const d=Math.sqrt(dx*dx+dy*dy);
      if(d>SEG_DIST){curr.x+=(dx/d)*(d-SEG_DIST);curr.y+=(dy/d)*(d-SEG_DIST);}
    }
  }
  // Trim history older than the tail (oldest entries have the smallest cumDist).
  const maxNeeded=(s.segments.length+2)*SEG_DIST;
  const minKeep=headCum-maxNeeded;
  while(s.pathHistory.length>2&&s.pathHistory[s.pathHistory.length-1].cumDist<minKeep){
    s.pathHistory.pop();
  }
  while(s.segments.length<s.length){const t=s.segments[s.segments.length-1];s.segments.push({x:t.x,y:t.y});}
  if(s.segments.length>s.length)s.segments.length=s.length;
  s.speed=BASE_SPEED+Math.min(s.length*0.05,20);
}

// ═══ COLLISIONS ═══
function checkCollisions(){
  resetGrid();
  for(const s of snakes){
    if(!s.alive)continue;
    for(let i=0;i<s.segments.length;i++)gridInsert({snake:s,idx:i},s.segments[i].x,s.segments[i].y);
  }
  for(const s of snakes){
    if(!s.alive)continue;
    const head=s.segments[0];
    const sw=6+Math.min(s.length*0.03,14);
    const hr=sw/2;
    // Head-vs-body / head-vs-head — skipped while invulnerable (spawn protection),
    // ghost (phase through), or shield (active barrier blocks the hit).
    // Food + powerup collection still runs below so the player can grow during
    // those first 2.5 s instead of starving.
    let died=false;
    if(s.invulnTimer<=0&&s.powerups.ghost<=0&&s.powerups.shield<=0){
      // Wider search radius (covers max possible other-snake body width too).
      const nearby=gridQuery(head.x,head.y,hr+24);
      for(const n of nearby){
        if(n.snake===s||!n.snake.alive)continue;
        // Spawn-invulnerable opponents are completely intangible.
        if(n.snake.invulnTimer>0)continue;
        const seg=n.snake.segments[n.idx];
        const ow=6+Math.min(n.snake.length*0.03,14);
        // Tight threshold without fudge so brushing past misses cleanly while
        // any actual overlap registers. (Substepping handles fast movement.)
        const collR=hr+ow/2;if(dist2(head,seg)<collR*collR){
          if(n.idx===0){
            // Head-vs-head: smaller dies — unless the would-be victim has an
            // active shield, which absorbs the hit and leaves both alive.
            if(s.length<=n.snake.length){
              killSnake(s,n.snake,'head');
            }else{
              if(n.snake.powerups.shield>0)continue;
              killSnake(n.snake,s,'head');
            }
          }else{
            // Head-vs-body: head's owner (s) dies — opponent's body stays solid
            // even when they're shielded, so attackers can't phase through us.
            killSnake(s,n.snake,'body');
          }
          died=true;break;
        }
      }
    }
    // Skip food/powerup collection if this snake just died — let the next snake be processed
    if(died)continue;
    // Food
    const magR=s.powerups.magnet>0?200:0;
    for(let i=foods.length-1;i>=0;i--){
      const f=foods[i];const d2=dist2(head,f);
      if(magR>0&&d2<magR*magR&&d2>(hr+f.r)*(hr+f.r)){const a=angleTo(f,head);f.x+=Math.cos(a)*200*gdt;f.y+=Math.sin(a)*200*gdt;}
      if(d2<(hr+f.r)*(hr+f.r)){
        // Diminishing growth: each food contributes more to a small snake
        // than to a giant. Floor(1.5 + 1.5 * 200/(200+length)): length 0 → 3,
        // length 100 → 2, length 300 → 2, length 800 → 1. Min 1 always.
        const growMul=1.5+1.5*(200/(200+s.length));
        const grow=Math.max(1,Math.floor(f.val*growMul));
        s.length+=grow;s.score+=f.val;
        if(s.isPlayer){
          // Combo is no longer driven by food (it was the source of the
          // +3+3 spam). Only the combo-zone x2.5 still applies; the
          // kill-combo multiplier kicks in on snake kills, not pellets.
          const inZone=isInComboZone(head.x,head.y);
          const mult=inZone?COMBO_ZONE_MULT:1;
          const pts=Math.max(1,Math.floor(f.val*mult));
          // Coin economy nerf: food pays half its score in coins.
          score+=pts;coins+=Math.max(1,Math.floor(pts*0.3));
          if(inZone)addScorePopup(f.x,f.y,'+'+pts,'#ffd600');
          sndCollect();postMsg({type:'HAPTIC',data:'light'});
          // Eat feedback (Wave 3.2): head scale-punch + a short absorb streak
          // pulling from the food toward the head. Player-only. The streak reuses
          // the existing particle pool (capped at MAX_PARTICLES, swap-removed),
          // spawned only on this discrete pickup — no per-frame allocation.
          s.headPunch=Math.min(0.5,s.headPunch+0.35);
          const _ax=angleTo(f,head);
          for(let k=0;k<3&&particles.length<MAX_PARTICLES;k++){
            const _sp=140+k*40;
            particles.push({x:f.x,y:f.y,vx:Math.cos(_ax)*_sp,vy:Math.sin(_ax)*_sp,life:1,ml:0.22,color:f.color,size:2.2});
          }
        }
        spawnP(f.x,f.y,f.color,3,60,2);foods.splice(i,1);
      }
    }
    // Powerups
    for(let i=powerups.length-1;i>=0;i--){
      const pu=powerups[i];
      if(dist2(head,pu)<(hr+15)*(hr+15)){
        s.powerups[pu.type]=PU_DUR[pu.type];
        if(s.isPlayer){sndPowerup();postMsg({type:'HAPTIC',data:'light'});}
        spawnP(pu.x,pu.y,PU_COLORS[pu.type],10,100,3);powerups.splice(i,1);
      }
    }
  }
}

function killSnake(victim,killer,cause){
  if(!victim.alive)return;
  victim.alive=false;
  // Defensive: clear transient flags so a respawning bot can't inherit
  // boost/joystick state from its previous life.
  victim.boosting=false;
  // Hit-pause when the player is on either side of the kill (D3): tiny
  // freeze that makes every meaningful collision feel like it landed.
  if(victim.isPlayer||(killer&&killer.isPlayer))hitPauseTimer=0.06;
  for(let i=0;i<victim.segments.length;i+=3){
    const seg=victim.segments[i];
    spawnFood(seg.x+rand(-10,10),seg.y+rand(-10,10),2,SKINS[victim.skin].c[0],true);
  }
  if(killer&&killer.alive){
    killer.killCount++;killer.score+=100;
    if(killer.isPlayer){
      // Bump kill-combo BEFORE awarding so multiplier reflects this kill.
      killCombo++;killComboTimer=KILL_COMBO_S;
      const km=killComboMult();
      const baseScore=100,baseCoin=12;
      const gainScore=Math.floor(baseScore*km);
      const gainCoin=Math.max(1,Math.floor(baseCoin*km));
      score+=gainScore;coins+=gainCoin;totalKills++;
      sndKill();postMsg({type:'HAPTIC',data:'medium'});
      const popupCol=km>=3?'#ff1744':(km>=2?'#ffab00':'#ff80ab');
      const popupTxt=km>1?'+'+gainScore+' COMBO x'+killCombo:'+'+gainScore;
      addScorePopup(victim.segments[0].x,victim.segments[0].y,popupTxt,popupCol);
      if(victim.length>killer.length){const bonus=Math.min((victim.length-killer.length)*2,500);score+=bonus;coins+=Math.ceil(bonus/6);flashAlpha=0.25;flashColor='#ff1744';addScorePopup(victim.segments[0].x,victim.segments[0].y-25,'+'+bonus+' BIG','#ffd600');}
      spawnP(victim.segments[0].x,victim.segments[0].y,SKINS[victim.skin].c[0],20,120,3);
      // Shockwave: player kills a bot — use the victim's primary skin color, normal size.
      spawnShock(victim.segments[0].x,victim.segments[0].y,SKINS[victim.skin].c[0],false);
    }
    if(victim.isKing&&killer.isPlayer){
      score+=KING_SCORE_REWARD;coins+=KING_COIN_REWARD;sndKingSlain();postMsg({type:'HAPTIC',data:'heavy'});
      flashAlpha=0.3;flashColor='#ffd600';nextKingScore=score+2000;runKingKills++;
    }
    if(victim.isBoss&&killer.isPlayer){
      score+=BOSS_SCORE_REWARD;coins+=BOSS_COIN_REWARD;sndKingSlain();
      postMsg({type:'HAPTIC',data:'heavy'});
      flashAlpha=0.5;flashColor='#ffd600';shakeTimer=0.35;shakeMag=8;
      addScorePopup(victim.segments[0].x,victim.segments[0].y-30,'+'+BOSS_SCORE_REWARD+' BOSS','#ffd600');
      // Boss Rush: count the cleared wave; the next boss auto-spawns once
      // bossActive clears below. The toast announces the wave just cleared.
      if(mode==='bossrush'){
        runWaves++;
        showToast(isTR?'DALGA '+runWaves+' TEMİZLENDİ!':'WAVE '+runWaves+' CLEARED!','success');
      }else{
        showToast(isTR?'BOSS YENİLDİ! +'+BOSS_COIN_REWARD+' 🪙':'BOSS DEFEATED! +'+BOSS_COIN_REWARD+' 🪙','success');
      }
      // Shockwave: boss slay — hot white-gold, biggest ring.
      spawnShock(victim.segments[0].x,victim.segments[0].y,'#ffd600',true);
      // Achievements: bump the lifetime boss-kill counter and evaluate now so
      // Boss Slayer / Boss Lord toast the moment they're earned (persisted here
      // too, so a counter increment survives even if the player quits the run).
      achBossKills++;evaluateAchievements();
    }
  }
  if(victim.isKing){kingActive=false;if(!nextKingScore||nextKingScore<=score)nextKingScore=score+2000;}
  if(victim.isBoss){bossActive=false;if(!nextBossScore||nextBossScore<=score)nextBossScore=score+5000;}
  if(victim.isPlayer){
    lastRunEarned=Math.max(0,coins-coinsAtStart);doubleClaimed=false;
    sndDeath();postMsg({type:'HAPTIC',data:'heavy'});
    flashAlpha=0.4;flashColor='#ff1744';shakeTimer=0.3;shakeMag=8;
    // Shockwave: player death — large red-orange burst centered on the player's head.
    spawnShock(victim.segments[0].x,victim.segments[0].y,'#ff1744',true);
    killerName=killer?killer.name:(cause==='boundary'?'the boundary':(cause==='timeout'?'time':'unknown'));
    deathCount++;
    // Per-mode best: update bestByMode[mode] if this run beats it. Boss Rush
    // uses waves-cleared (runWaves) as its proxy; all other modes use score.
    {
      const runMetric=mode==='bossrush'?runWaves:score;
      if(runMetric>0){
        const prevBest=bestByMode[mode]||0;
        if(runMetric>prevBest){bestByMode[mode]=runMetric;saveBlob('bests',bestByMode);}
      }
    }
    // Classic: also maintain the existing highScore / topScores records unchanged.
    if(mode==='classic'){saveHS();addTopScore(score);}
    saveStats();saveCoins();checkUnlocks();saveSkins();
    awardXp(score,player?player.killCount:0);
    // Evaluate daily missions for this run.
    evaluateMissions({score:score,kills:player?player.killCount:0,kingKills:runKingKills,playTime:playTime});
    // Achievements: fold this run's apex flag in (live #1 during the run, or the
    // final #1 rank addTopScore just stamped for classic), then evaluate the full
    // set so any newly-earned badge toasts + pays out once. persistAch() inside
    // captures the updated apex/bossKills alongside the unlocked set.
    if(runReachedApex||currentRank===1)achApex=true;
    evaluateAchievements();
    state='dead';
    resetTouchState();
    // Defensive: if a King was alive at the moment of death, clear the flag so
    // a stale snakes[] entry can't be misinterpreted by the next game's logic.
    // (snakes[] is fully reset by startGame, but state==='dead' still ticks
    // some banners and we want kingToast to settle to a clean baseline.)
    kingActive=false;kingToast=0;bossActive=false;bossToast=0;
    // Death cam: kick off the zoom-in + fade-in window (D4).
    deathCamTimer=DEATH_CAM_S;
    // Smart interstitial trigger: every 3rd death AND score > 50 AND tutorial not active.
    // Native side also enforces a 60s cooldown; this guards against ad fatigue early on.
    if(!showTutorial&&deathCount>=3&&deathCount%3===0&&score>=50)postMsg({type:'SHOW_INTERSTITIAL'});
  }else{victim.respawnTimer=rand(3,6);}
}

function revivePlayer(){
  // Only a genuine, first post-death revive may run. Without the state/hasRevived
  // guard a duplicate or late AD_REWARD_EARNED{continue} could yank a live run —
  // or even the menu — back to 'playing' and grant a free reset.
  if(!player||state!=='dead'||hasRevived)return;
  hasRevived=true;
  player.alive=true;player.length=Math.max(10,Math.floor(player.length*0.7));
  // Rebuild a body trailing behind the head along the current facing angle,
  // instead of stacking every segment on the head and letting them fan out
  // in the first frame (visible "snake spawned in a single point" glitch).
  const hx=player.segments[0].x,hy=player.segments[0].y,a=player.angle;
  const segs=[{x:hx,y:hy}];
  for(let i=1;i<player.length;i++){
    segs.push({x:hx-Math.cos(a)*SEG_DIST*i,y:hy-Math.sin(a)*SEG_DIST*i});
  }
  player.segments=segs;
  // Reset path history so the new body trail starts from the revive point.
  player.pathHistory=[];player._lastHX=hx;player._lastHY=hy;
  player.invulnTimer=3;player.boosting=false;player.boostFuel=100;
  for(const k of PU_TYPES)player.powerups[k]=0;
  state='playing';
  resetTouchState();
}

// ═══ BOT AI (stage-aware) ═══
function updateBot(bot,dt){
  if(!bot.alive||bot.isPlayer)return;
  const stage=currentBotStage();
  bot.aiTimer-=dt;if(bot.aiTimer>0)return;
  // Smarter bots think more often
  bot.aiTimer=(0.12+rand(0,0.08))*stage.reactMul/Math.max(0.6,bot.skill);

  const head=bot.segments[0];
  // Sight scales with stage
  const sight=500*stage.sightMul;
  const sightSmall=600*stage.sightMul;
  const sightBig=300*stage.sightMul;

  let nearFood=null,nfD=Infinity;
  for(const f of foods){const d=dist(head,f);if(d<nfD&&d<sight){nfD=d;nearFood=f;}}
  let nearSmall=null,nearBig=null,nsD=Infinity,nbD=Infinity;
  for(const s of snakes){
    if(s===bot||!s.alive)continue;const d=dist(head,s.segments[0]);
    if(s.length<bot.length*0.8&&d<nsD){nsD=d;nearSmall=s;}
    if(s.length>bot.length*1.2&&d<nbD){nbD=d;nearBig=s;}
  }

  // Avoid the wall — look-ahead version: project where the head will be in
  // ~0.4s and steer if THAT point is past the safety ring, not just the
  // current one. Smarter bots steer earlier and don't hug the boundary.
  const bDist=dist(head,{x:WCX,y:WCY});
  if(bDist>WR-220){bot.targetAngle=angleTo(head,{x:WCX,y:WCY});bot.boosting=false;return;}
  const lookT=0.4;
  const px=head.x+Math.cos(bot.angle)*bot.speed*lookT;
  const py=head.y+Math.sin(bot.angle)*bot.speed*lookT;
  if(dist({x:px,y:py},{x:WCX,y:WCY})>WR-150){
    bot.targetAngle=angleTo({x:px,y:py},{x:WCX,y:WCY});
    bot.boosting=false;
    return;
  }

  // Panic flee: if a much bigger snake's head is close and we still have
  // some body to spend, flee away with boost regardless of personality.
  if(nearBig&&nbD<240&&bot.length>14){
    bot.targetAngle=angleTo(nearBig.segments[0],head);
    bot.boosting=true;
    return;
  }

  // Avoid the player's body too (smarter bots steer around it)
  if(player&&player.alive&&player.segments.length>5){
    let bodyHit=null,bhD=Infinity;
    for(let i=4;i<player.segments.length;i+=2){
      const seg=player.segments[i];const d=dist(head,seg);
      if(d<60+stage.aggression*40&&d<bhD){bhD=d;bodyHit=seg;}
    }
    if(bodyHit){
      const a=angleTo(bodyHit,head);
      bot.targetAngle=a+(Math.random()<0.5?PI/2:-PI/2)*0.5;
      return;
    }
  }

  // Maybe boost-attack if the stage permits and a small target is close
  const useBoost=Math.random()<stage.boostMul*bot.skill;

  switch(bot.personality){
    case 'collector':
      if(nearBig&&nbD<sightBig){bot.targetAngle=angleTo(nearBig.segments[0],head);bot.boosting=false;break;}
      if(nearFood){bot.targetAngle=angleTo(head,nearFood);break;}
      bot.targetAngle+=rand(-0.5,0.5);bot.boosting=false;break;
    case 'aggressive':
      if(nearBig&&nbD<sightBig*0.85){bot.targetAngle=angleTo(nearBig.segments[0],head);bot.boosting=false;break;}
      if(nearSmall&&nsD<sightSmall){
        const t=nsD/Math.max(80,bot.speed);
        const px=nearSmall.segments[0].x+Math.cos(nearSmall.angle)*nearSmall.speed*t*0.55;
        const py=nearSmall.segments[0].y+Math.sin(nearSmall.angle)*nearSmall.speed*t*0.55;
        bot.targetAngle=angleTo(head,{x:px,y:py});
        bot.boosting=useBoost&&nsD<260&&bot.boostFuel>30;break;
      }
      if(nearFood)bot.targetAngle=angleTo(head,nearFood);else bot.targetAngle+=rand(-0.3,0.3);
      bot.boosting=false;break;
    case 'coiler':
      if(nearSmall&&nsD<sightSmall*0.7){
        const orbitD=110+nearSmall.length*0.3;
        const a=angleTo(head,nearSmall.segments[0]);
        bot.targetAngle=dist(head,nearSmall.segments[0])>orbitD+50?a:a+PI/2;
        bot.boosting=useBoost&&nsD<140;break;
      }
      if(nearFood)bot.targetAngle=angleTo(head,nearFood);else bot.targetAngle+=rand(-0.4,0.4);
      bot.boosting=false;break;
    case 'ambush':
      if(nearSmall&&nsD<sightSmall*0.45){
        bot.targetAngle=angleTo(head,nearSmall.segments[0]);
        bot.boosting=useBoost&&bot.boostFuel>40;break;
      }
      bot.boosting=false;
      if(nearFood&&nfD<sight*0.6)bot.targetAngle=angleTo(head,nearFood);else bot.targetAngle+=rand(-0.2,0.2);break;
  }
}

// ═══ SKIN UNLOCKS ═══
// Only 'free' and 'earn' (score-tier, u[0]==='s') skins auto-unlock here.
// 'coins' skins (k/l/g) are NEVER granted for free — they require a shop purchase.
function checkUnlocks(){
  const prev=unlockedSkins.length;let lastName='';
  for(let i=0;i<SKINS.length;i++){
    if(unlockedSkins.includes(i))continue;
    const sk=SKINS[i];
    const rail=skinRail(sk);
    if(rail==='free'){unlockedSkins.push(i);lastName=sk.name;continue;}
    if(rail==='earn'){
      // Auto-unlock when score threshold is met
      const v=parseInt(sk.u.slice(1));
      if(score>=v){unlockedSkins.push(i);lastName=sk.name;}
    }
    // rail==='coins': do nothing — only purchasable via the shop
  }
  if(unlockedSkins.length>prev){saveSkins();if(lastName){unlockToast=3;unlockToastName=lastName;sndPowerup();}}
}

// ═══ ZONE UPDATE ═══
function updateZone(){
  if(!player)return;
  let z=ZONES[0],zi=0;
  for(let i=0;i<ZONES.length;i++){if(player.length>=ZONES[i].min){z=ZONES[i];zi=i;}}
  if(z.bg!==targetZoneBg){
    targetZoneBg=z.bg;targetZoneAccent=z.accent;
    sndZone();flashAlpha=0.35;flashColor=z.accent;
    postMsg({type:'HAPTIC',data:'medium'});
    // ─── Zone-entry sweep ring ────────────────────────────────────────────────
    // Only spawn when moving INTO a deeper zone (zi > zoneIdx), not on the
    // initial zone-0 set or on zone resets between runs.
    // Spawn two nested rings: one standard and one wide sweep that expands to
    // ~600 world units over 0.8 s, so the player clearly sees a biome boundary
    // crossing.  We patch maxR/dur on the slot right after spawnShock fills it
    // (cursor has already advanced; last written slot = (shkHead-1+SHK_MAX)%SHK_MAX).
    // reducedMotion gates the zone-entry sweep ring (cosmetic). Guard the slot
    // patch behind the same flag so we never mutate a stale slot when spawnShock
    // no-ops (shkHead would not have advanced).
    if(zi>zoneIdx&&!reducedMotion){
      spawnShock(WCX,WCY,z.accent,true);
      const _sweepSlot=shockwaves[(shkHead-1+SHK_MAX)%SHK_MAX];
      _sweepSlot.maxR=600;_sweepSlot.dur=0.85;
    }
    zoneIdx=zi;
  }
  zoneBg=lerpColor(zoneBg,targetZoneBg,0.02);
  zoneAccent=lerpColor(zoneAccent,targetZoneAccent,0.02);
}

// ═══ GAME INIT ═══
function startGame(modeId){
  // Resolve mode config; default to current global `mode`, then 'classic' as safety.
  const _modeId=modeId||mode||'classic';
  const _modeCfg=MODES.find(function(m){return m.id===_modeId;})||MODES[0];
  // Update the global so HUD / other systems can read it.
  mode=_modeCfg.id;
  initAudio();score=0;killCombo=0;killComboTimer=0;hasRevived=false;currentRank=0;runKingKills=0;runWaves=0;runReachedApex=false;
  foods=[];powerups=[];particles=[];snakes=[];scorePopups=[];
  kingActive=false;nextKingScore=2000;
  bossActive=false;nextBossScore=5000;bossToast=0;
  // Rush is a short (~90s) sprint that typically scores ~800-1500, so the
  // default King/Boss gates (2000/5000) almost never fire. Pull the first
  // King/Boss thresholds in for Rush only so the mode actually shows its
  // headline spectacle. Re-arm after a kill still uses the per-mode offset
  // logic in killSnake(). Boss-Rush manages its own boss cadence — leave it
  // (and Classic, which keeps 2000/5000) untouched.
  if(mode==='rush'){nextKingScore=900;nextBossScore=2500;}
  spawnComboZones(true); // silent on first spawn — no "moved" toast at game start
  spawnInitialFood();
  // Player starts with extra length so they have a real "boost reserve" up front.
  // Lock initial heading to "up" instead of random so the snake doesn't drift
  // in an unexpected direction during the spawn-protection window.
  player=createSnake(true,WCX,WCY,currentSkin);
  player.length=_modeCfg.startLength;player.invulnTimer=2.5;
  player.angle=-PI/2;player.targetAngle=-PI/2;
  // Re-anchor the body trail so the visible segments line up behind the head
  // along the new facing — otherwise the random initial trail drawn by
  // createSnake stays one frame before physics catches up.
  for(let i=0;i<player.segments.length;i++){
    player.segments[i].x=WCX-Math.cos(player.angle)*SEG_DIST*i;
    player.segments[i].y=WCY-Math.sin(player.angle)*SEG_DIST*i;
  }
  // Re-seed path history along the new heading so the spawn body has a
  // proper trail to follow from frame 1. cumDist is negative for fake
  // pre-spawn history so the head's running cumDist (=0 at spawn) is
  // always the largest entry in pathHistory.
  player.pathHistory=[];
  for(let i=0;i<300;i++){
    player.pathHistory.push({
      x:WCX-Math.cos(player.angle)*i*0.5,
      y:WCY-Math.sin(player.angle)*i*0.5,
      cumDist:-i*0.5
    });
  }
  player._lastHX=WCX;player._lastHY=WCY;
  snakes.push(player);
  for(let i=0;i<_modeCfg.botCount;i++){
    const sp=pickSafeBotSpawn(500);
    const b=createSnake(false,sp.x,sp.y);b.length=randInt(15,50);snakes.push(b);
  }
  for(let i=0;i<50;i++){const a=rand(0,TAU),r=rand(30,200);spawnFood(WCX+Math.cos(a)*r,WCY+Math.sin(a)*r,1);}
  camera.x=WCX;camera.y=WCY;camera.zoom=1;
  state='playing';totalGames++;playTime=0;runTimeLimit=_modeCfg.timeLimit;coinsAtStart=coins;saveStats();
  lastBotStageMin=BOT_STAGES[0].min;
  hitPauseTimer=0;deathCamTimer=0;
  // Reset zone colours to ZONES[0] so a fresh run doesn't trigger a "new
  // zone entered" flash on the first frame just because the last run had
  // already reached a deeper zone.
  const z0=ZONES[0];
  zoneBg=z0.bg;targetZoneBg=z0.bg;
  zoneAccent=z0.accent;targetZoneAccent=z0.accent;
  // Reset biome state so the first frame of a new run starts from zone 0
  // without triggering a false zone-entry sweep.
  zoneIdx=0;bgGrad=null;bgGradKey='';
  resetTouchState();
}

// ═══ UPDATE ═══
function update(dt){
  gdt=dt;frameCount++;
  if(flashAlpha>0)flashAlpha-=dt*2;
  if(shakeTimer>0)shakeTimer-=dt;
  if(killComboTimer>0){killComboTimer-=dt;if(killComboTimer<=0)killCombo=0;}
  if(unlockToast>0)unlockToast-=dt;
  if(quitConfirmTimer>0)quitConfirmTimer-=dt;
  if(kingToast>0&&state==='playing')kingToast-=dt;
  if(bossToast>0&&state==='playing')bossToast-=dt;
  if(deathCamTimer>0)deathCamTimer-=dt;
  // Living-eyes blink accumulator (Wave 3.2). Time-driven, shared across all
  // snakes. Ticks every frame (cheap) so eyes blink on menu/death too. When the
  // gap elapses, fire a blink and decay it over EYE_BLINK_DUR.
  if(eyeBlinkP>0){eyeBlinkP-=dt/EYE_BLINK_DUR;if(eyeBlinkP<0)eyeBlinkP=0;}
  else{eyeBlinkT+=dt;if(eyeBlinkT>=EYE_BLINK_GAP){eyeBlinkT=0;eyeBlinkP=1;}}
  updateToasts(dt);
  if(state!=='playing')return;
  // Hit-pause: render keeps running (camera shake / death flash stay
  // animated) but physics + AI freeze for ~60ms after a player kill or
  // player death, giving the moment a beat of weight.
  if(hitPauseTimer>0){hitPauseTimer-=dt;return;}
  playTime+=dt;
  // Rush (or any timed mode) timeout: end the run as if the player died,
  // but via a 'time' cause so the death screen says TIME'S UP instead of
  // a killer name. Classic (runTimeLimit===0) never enters this branch.
  if(runTimeLimit>0&&playTime>=runTimeLimit&&player&&player.alive){
    killSnake(player,null,'timeout');
  }
  unlockCheckTimer-=dt;if(unlockCheckTimer<=0){unlockCheckTimer=1.5;checkUnlocks();checkBotStageTransition();
    // Live apex detection (classic only): the player has reached #1 if their
    // running score already beats the current top classic record. Sticky for the
    // run (folded into achApex at run-end). No allocation — reads topScores[0].
    if(mode==='classic'&&!runReachedApex&&score>0&&score>=((topScores[0]&&topScores[0].s)||0)&&topScores.length>0)runReachedApex=true;
  }
  // 1) AI decisions once per frame (full dt for stable timer accumulation)
  //    Entry-guard: skip whole call if bot's think timer hasn't elapsed —
  //    saves a function call per bot per frame (~720 calls/s saved at 12 bots * 60fps).
  for(const s of snakes){
    if(s.isPlayer||!s.alive)continue;
    if(s.aiTimer>0){s.aiTimer-=dt;continue;}
    updateBot(s,dt);
  }
  // 2) Substepped physics + collisions to prevent tunneling at high speed
  //    (boost + speed power-up can push speed past one body radius per frame).
  let vmax=BASE_SPEED;
  for(const s of snakes){
    if(!s.alive)continue;
    let v=s.speed;
    if(s.boosting)v*=2;
    if(s.powerups.speed>0)v*=1.8;
    if(v>vmax)vmax=v;
  }
  // Step at most half a body-segment per substep (~4px). Cap at 4 substeps so a
  // single dropped frame can't blow up the cost.
  const subSteps=Math.max(1,Math.min(4,Math.ceil(vmax*dt/(SEG_DIST*0.5))));
  const sdt=dt/subSteps;
  for(let st=0;st<subSteps;st++){
    gdt=sdt;
    if(player&&player.alive)updateSnake(player,sdt);
    for(const s of snakes)if(!s.isPlayer&&s.alive)updateSnake(s,sdt);
    checkCollisions();
  }
  gdt=dt;
  // Eat-punch decay (Wave 3.2): ease the player's head-scale punch back to 0.
  // Exponential-ish decay; clamped so it never lingers. Player-only state.
  if(player&&player.headPunch>0){player.headPunch-=dt*5;if(player.headPunch<0)player.headPunch=0;}
  updateParticles(dt);updateScorePopups(dt);updateShocks(dt);
  emitPlayerTrail(dt);updateTrailParts(dt);
  foodSpawnTimer-=dt;if(foodSpawnTimer<=0){foodSpawnTimer=0.2;spawnFood();}
  puSpawnTimer-=dt;if(puSpawnTimer<=0){puSpawnTimer=5;spawnPowerup();}
  // Combo zones drift to a fresh pair every COMBO_ZONE_INTERVAL seconds.
  comboZoneTimer-=dt;if(comboZoneTimer<=0)spawnComboZones(false);
  // Respawn bots
  for(let i=snakes.length-1;i>=0;i--){
    const s=snakes[i];
    if(!s.alive&&!s.isPlayer){s.respawnTimer-=dt;if(s.respawnTimer<=0){
      snakes.splice(i,1);
      const sp=pickSafeBotSpawn(450);
      const nb=createSnake(false,sp.x,sp.y);
      nb.length=randInt(10,30+Math.floor(score/200));
      snakes.push(nb);
    }}
  }
  // King
  if(!kingActive&&score>=nextKingScore){
    kingActive=true;sndKing();
    const ksp=pickSafeBotSpawn(600);
    const k=createSnake(false,ksp.x,ksp.y);k.name='KING';k.isKing=true;k.length=200+Math.floor(score/50);
    k.personality='aggressive';k.skin=randInt(0,4);snakes.push(k);
    kingToast=3.5;flashAlpha=0.35;flashColor='#ffd600';shakeTimer=0.3;shakeMag=6;postMsg({type:'HAPTIC',data:'heavy'});
  }
  // Boss (D1) — rarer, every 5k score, length 300+, +30% speed, big rewards.
  // Boss Rush (Wave 3.1): bosses spawn back-to-back regardless of score — the
  // gate is just !bossActive, and each wave (runWaves) is longer/tougher. The
  // re-arm is automatic: killSnake clears bossActive on a boss death, so the
  // next frame spawns the next wave's boss. classic/rush keep the score-gate.
  const _bossWanted=mode==='bossrush'?!bossActive:(!bossActive&&score>=nextBossScore);
  if(_bossWanted){
    bossActive=true;sndKingSlain(); // dramatic chord, reused
    const bsp=pickSafeBotSpawn(700);
    const b=createSnake(false,bsp.x,bsp.y);b.name='BOSS';b.isBoss=true;
    // Boss Rush length escalates per wave (waves cleared so far); classic/rush
    // keep the existing score-driven length so they're byte-for-byte unchanged.
    b.length=mode==='bossrush'?(260+runWaves*55):(300+Math.floor(score/120));
    b.personality='aggressive';b.skin=BOSS_SKIN_IDX;b.skill=1.0; // Blood skin, max skill
    snakes.push(b);
    bossToast=4;flashAlpha=0.45;flashColor='#ff1744';shakeTimer=0.45;shakeMag=9;
    postMsg({type:'HAPTIC',data:'heavy'});
    if(mode==='bossrush')showToast(isTR?'⚠ DALGA '+(runWaves+1)+'!':'⚠ WAVE '+(runWaves+1)+'!','error');
    else showToast(isTR?'⚠ BOSS GELDİ!':'⚠ BOSS INCOMING!','error');
  }
  // Camera
  if(player&&player.alive){
    camera.x=lerp(camera.x,player.segments[0].x,0.08);
    camera.y=lerp(camera.y,player.segments[0].y,0.08);
    // Smooth power-curve auto-zoom: 1.0 (small) → 0.45 (very long). Faster early, plateaus.
    const t=Math.min(1,player.length/800);
    const targetZoom=1.0-(1-Math.pow(1-t,1.6))*0.55;
    // Asymmetric lerp: zoom IN faster (snake just lost length, the player
    // wants to feel the recovery) and OUT slower so growth feels gradual.
    const zLerp=targetZoom>camera.zoom?0.07:0.03;
    camera.zoom=lerp(camera.zoom,targetZoom,zLerp);
  }
  updateZone();
  if(player&&player.alive&&player.boosting){const tail=player.segments[player.segments.length-1];spawnP(tail.x,tail.y,SKINS[player.skin].c[0],1,40,2);}
}

// ═══ RENDER ═══
const liveBotsBuf=[];           // reused each frame for snake z-ordering
const byLength=(a,b)=>a.length-b.length;
function render(){
  ctx.setTransform(dpr,0,0,dpr,0,0);
  // ─── Biome cached gradient background ───────────────────────────────────────
  // Quantise zoneBg to 4-bit per channel so the gradient isn't rebuilt on every
  // lerp micro-step — only when the colour shifts a visible amount (~1/16 step).
  const _bgQKey=(parseInt(zoneBg.slice(1,3),16)>>4)+'|'+(parseInt(zoneBg.slice(3,5),16)>>4)+'|'+(parseInt(zoneBg.slice(5,7),16)>>4);
  if(!bgGrad||bgGradKey!==_bgQKey||bgGradW!==W||bgGradH!==H){buildBgGrad();bgGradKey=_bgQKey;}
  ctx.fillStyle=bgGrad;ctx.fillRect(0,0,W,H);
  if(state==='playing'||state==='dead'||state==='paused'){
    // Death cam: while the timer is running, ease the zoom up to ~1.25× over
    // the window so the moment of death feels heavier before the death screen
    // takes over. Cube-easing (1 - (1-t)^3) ramps fast then settles.
    let zoom=camera.zoom;
    if(state==='dead'&&deathCamTimer>0){
      const tProg=1-(deathCamTimer/DEATH_CAM_S);
      const eased=1-(1-tProg)*(1-tProg)*(1-tProg);
      zoom=camera.zoom*(1+0.25*eased);
    }
    const sx=shakeTimer>0?rand(-shakeMag,shakeMag):0,sy=shakeTimer>0?rand(-shakeMag,shakeMag):0;
    ctx.save();ctx.translate(W/2+sx,H/2+sy);ctx.scale(zoom,zoom);ctx.translate(-camera.x,-camera.y);
    drawGrid();drawStars();drawBoundary();drawComboZones();drawFood();drawPowerups();
    // Z-sort snakes: smaller bots first, bigger bots above; player always on top.
    // Reuse a module buffer (like hudLeaderboard) instead of allocating a fresh
    // filtered+sorted array + comparator closure every frame.
    // Cosmetic trail (base / non-additive styles) sits UNDER the snakes so the
    // body rides on top of its own trail.
    drawTrailPartsBase();
    liveBotsBuf.length=0;
    for(let i=0;i<snakes.length;i++){const s=snakes[i];if(s.alive&&!s.isPlayer)liveBotsBuf.push(s);}
    liveBotsBuf.sort(byLength);
    for(const s of liveBotsBuf)drawSnake(s);
    if(player&&player.alive)drawSnake(player);
    // Additive trail (neon/rainbow) in the effects layer alongside particles/shocks.
    drawTrailPartsAdditive();
    drawParticles();drawScorePopups();drawShocks();ctx.restore();
    // Boundary danger glow (Wave 3.2): screen-space red edge vignette that
    // intensifies as the player's head nears the arena rim. Drawn AFTER the
    // world transform is popped (it hugs the screen edges, not the world).
    if(state==='playing')drawBoundaryDanger();
    drawHUD();drawMinimap();
    if(joystick.active&&state==='playing')drawJoystick();
    if(state==='playing'){drawBoostFuel();drawPauseBtn();}
  }
  if(state==='menu'){drawMenu();if(showSettings)drawSettingsOverlay();if(!showTutorial&&showDailyModal)drawDailyModal();if(!showTutorial&&!showDailyModal&&showMissionsPanel)drawMissionsPanel();}
  if(state==='dead')drawDeathScreen();
  if(state==='paused')drawPauseScreen();
  if(state==='skinselect')drawSkinSelect();
  if(state==='trailselect')drawTrailSelect();
  if(state==='leaderboard')drawLeaderboard();
  if(state==='achievements')drawAchievements();
  if(state==='modeselect')drawModeSelect();
  // Tutorial overlay renders on top of menu / pause / playing only — never
  // over the death screen, where it would just confuse the player.
  if(showTutorial&&state!=='dead')drawTutorial();
  if(flashAlpha>0){ctx.fillStyle=flashColor;ctx.globalAlpha=flashAlpha;ctx.fillRect(0,0,W,H);ctx.globalAlpha=1;}
  drawToasts();
  if(unlockToast>0&&(state==='playing'||state==='paused')){
    const a=Math.min(unlockToast,1),ty=sat+120;
    ctx.globalAlpha=a;ctx.textAlign='center';
    ctx.fillStyle='rgba(0,0,0,0.7)';rr(W/2-140,ty-28,280,52,12);ctx.fill();
    ctx.fillStyle='#ffd600';ctx.shadowColor='#ffd600';ctx.shadowBlur=12;
    ctx.font='900 14px Orbitron';ctx.fillText(L.skinUnlocked,W/2,ty-6);ctx.shadowBlur=0;
    ctx.fillStyle='#fff';ctx.font='700 16px Rajdhani';ctx.fillText(unlockToastName,W/2,ty+16);
    ctx.globalAlpha=1;ctx.textAlign='left';
  }
}

// ═══ DRAW HELPERS ═══
function drawGrid(){
  // Accent-tinted grid: parse zoneAccent and use it at very low alpha so each
  // biome's grid reads differently (e.g. cyan lines in zone 0, teal in zone 1).
  const _gr=parseInt(zoneAccent.slice(1,3),16),_gg=parseInt(zoneAccent.slice(3,5),16),_gb=parseInt(zoneAccent.slice(5,7),16);
  ctx.strokeStyle='rgba('+_gr+','+_gg+','+_gb+',0.035)';ctx.lineWidth=1;
  const gs=100;
  const x1=Math.floor((camera.x-W/2/camera.zoom)/gs)*gs,x2=Math.ceil((camera.x+W/2/camera.zoom)/gs)*gs;
  const y1=Math.floor((camera.y-H/2/camera.zoom)/gs)*gs,y2=Math.ceil((camera.y+H/2/camera.zoom)/gs)*gs;
  ctx.beginPath();
  for(let x=x1;x<=x2;x+=gs){ctx.moveTo(x,y1);ctx.lineTo(x,y2);}
  for(let y=y1;y<=y2;y+=gs){ctx.moveTo(x1,y);ctx.lineTo(x2,y);}
  ctx.stroke();
}
// Drifting parallax stars: a small persistent set of slow points scattered
// across the world. They tint with the current zone accent so each biome
// reads differently. Cheap (~80 dots) and stays under 1ms render.
const BG_STARS = [];
const BG_STAR_COUNT = 80;
(function seedStars(){
  for(let i=0;i<BG_STAR_COUNT;i++){
    BG_STARS.push({
      x:rand(0,WS),y:rand(0,WS),
      r:rand(0.6,2.2),
      a:rand(0.18,0.55),
      tw:rand(0,TAU), // twinkle phase
      tws:rand(0.5,2.0), // twinkle speed
      vx:rand(-3,3),vy:rand(-3,3) // very slow drift
    });
  }
})();
function drawStars(){
  // Cull to viewport with a margin so stars at edges still appear.
  const vx1=camera.x-W/2/camera.zoom-50,vx2=camera.x+W/2/camera.zoom+50;
  const vy1=camera.y-H/2/camera.zoom-50,vy2=camera.y+H/2/camera.zoom+50;
  ctx.fillStyle=zoneAccent;
  for(let i=0;i<BG_STARS.length;i++){
    const s=BG_STARS[i];
    // Drift + wrap inside the world
    s.x+=s.vx*gdt;s.y+=s.vy*gdt;
    if(s.x<0)s.x+=WS;else if(s.x>WS)s.x-=WS;
    if(s.y<0)s.y+=WS;else if(s.y>WS)s.y-=WS;
    if(s.x<vx1||s.x>vx2||s.y<vy1||s.y>vy2)continue;
    s.tw+=s.tws*gdt;
    const a=s.a*(0.6+0.4*Math.sin(s.tw));
    ctx.globalAlpha=a;
    ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,TAU);ctx.fill();
  }
  ctx.globalAlpha=1;
}
function drawBoundary(){
  // Inner hard stroke: accent-tinted (keeps the "danger zone" feel but reads
  // as part of the current biome rather than a generic red ring).
  const _br=parseInt(zoneAccent.slice(1,3),16),_bg2=parseInt(zoneAccent.slice(3,5),16),_bb=parseInt(zoneAccent.slice(5,7),16);
  ctx.beginPath();ctx.arc(WCX,WCY,WR,0,TAU);
  ctx.strokeStyle='rgba('+_br+','+_bg2+','+_bb+',0.25)';ctx.lineWidth=4;ctx.stroke();
  // Outer soft glow halo: wider, very transparent accent colour
  ctx.strokeStyle='rgba('+_br+','+_bg2+','+_bb+',0.07)';ctx.lineWidth=24;ctx.stroke();
}
// BOUNDARY DANGER GLOW (Wave 3.2) — screen-space red vignette that fades in as
// the player's head approaches the arena rim (within ~220px of WR). Additive,
// fully save()/restore()-bounded, and gated behind !reducedMotion so motion-
// sensitive players never see it. No allocation in the hot path (gradient is
// only built on the frames the player is actually near the rim).
const BOUNDARY_DANGER_RANGE = 220;
function drawBoundaryDanger(){
  if(reducedMotion)return;
  if(!player||!player.alive)return;
  const head=player.segments[0];
  const dfc=dist(head,{x:WCX,y:WCY});
  const near=WR-dfc;                       // distance from the rim, +ve inside
  if(near>BOUNDARY_DANGER_RANGE)return;     // too far from the edge — nothing to draw
  // Proximity 0 (at range) → 1 (at the rim). Square it so it ramps gently then
  // bites hard right at the edge.
  let prox=1-Math.max(0,near)/BOUNDARY_DANGER_RANGE;
  prox=prox*prox;
  const a=prox*0.55;
  ctx.save();
  ctx.globalCompositeOperation='lighter';
  // Radial gradient: transparent in the centre, red toward the screen edges.
  const cx=W/2,cy=H/2,inner=Math.min(W,H)*0.32,outer=Math.max(W,H)*0.72;
  const grd=ctx.createRadialGradient(cx,cy,inner,cx,cy,outer);
  grd.addColorStop(0,'rgba(255,23,68,0)');
  grd.addColorStop(0.7,'rgba(255,23,68,'+(a*0.45)+')');
  grd.addColorStop(1,'rgba(255,40,60,'+a+')');
  ctx.fillStyle=grd;
  ctx.fillRect(0,0,W,H);
  ctx.restore(); // globalCompositeOperation reset to 'source-over'
}
function drawFood(){
  // Dropped per-food shadowBlur (was 6 with on/off per pellet × ~600 visible
  // foods = the biggest draw-op contributor). Pellets are 4-5 px and barely
  // showed the glow anyway; this is a major thermal/perf win on iPhone.
  const vx1=camera.x-W/2/camera.zoom-20,vx2=camera.x+W/2/camera.zoom+20;
  const vy1=camera.y-H/2/camera.zoom-20,vy2=camera.y+H/2/camera.zoom+20;
  for(const f of foods){
    if(f.x<vx1||f.x>vx2||f.y<vy1||f.y>vy2)continue;
    f.pulse+=3*gdt;const r=f.r+Math.sin(f.pulse)*1;
    ctx.fillStyle=f.color;
    ctx.beginPath();ctx.arc(f.x,f.y,r,0,TAU);ctx.fill();
  }
}
function drawPowerups(){
  const vx1=camera.x-W/2/camera.zoom-30,vx2=camera.x+W/2/camera.zoom+30;
  const vy1=camera.y-H/2/camera.zoom-30,vy2=camera.y+H/2/camera.zoom+30;
  for(const pu of powerups){
    if(pu.x<vx1||pu.x>vx2||pu.y<vy1||pu.y>vy2)continue;
    pu.pulse+=2.4*gdt;const r=12+Math.sin(pu.pulse)*3;
    ctx.save();ctx.translate(pu.x,pu.y);ctx.rotate(pu.pulse*0.5);
    ctx.fillStyle=PU_COLORS[pu.type];ctx.shadowColor=PU_COLORS[pu.type];ctx.shadowBlur=15;
    if(pu.type==='speed'){ctx.beginPath();for(let i=0;i<6;i++){const a=i*PI/3-PI/6;ctx.lineTo(Math.cos(a)*r,Math.sin(a)*r);}ctx.closePath();ctx.fill();}
    else if(pu.type==='shield'){ctx.beginPath();ctx.arc(0,0,r,0,TAU);ctx.fill();}
    else if(pu.type==='magnet'){ctx.beginPath();for(let i=0;i<10;i++){const a=i*PI/5-PI/2;const d=i%2===0?r:r/2;ctx.lineTo(Math.cos(a)*d,Math.sin(a)*d);}ctx.closePath();ctx.fill();}
    else{ctx.beginPath();ctx.moveTo(0,-r);ctx.lineTo(r*0.6,0);ctx.lineTo(0,r);ctx.lineTo(-r*0.6,0);ctx.closePath();ctx.fill();}
    ctx.shadowBlur=0;ctx.restore();
    ctx.fillStyle='#fff';ctx.font='bold 8px Rajdhani';ctx.textAlign='center';
    ctx.fillText(pu.type.toUpperCase(),pu.x,pu.y+r+12);
  }
}

function drawSnake(s){
  const skin=SKINS[s.skin];
  const segs=s.segments;
  const segLen=segs.length;
  const denom=Math.max(1,segLen-1);
  const w=6+Math.min(segLen*0.03,14);
  const halfW=w/2;
  if(s.powerups.ghost>0)ctx.globalAlpha=0.4;
  if(s.invulnTimer>0&&Math.floor(s.invulnTimer*10)%2===0)ctx.globalAlpha=0.3;
  // Outline pass — fillStyle set once for the whole pass (was per-segment).
  ctx.shadowBlur=0;
  ctx.fillStyle='rgba(0,0,0,0.35)';
  for(let i=segLen-1;i>=0;i--){
    const seg=segs[i];const t=1-i/denom;
    const r=halfW*(0.55+t*0.45)+1.2;
    ctx.beginPath();ctx.arc(seg.x,seg.y,r,0,TAU);ctx.fill();
  }
  // Eat-punch (Wave 3.2): head fill swells by headPunch then eases back to 1
  // (decayed in update). Player-only state; 1 for everyone else.
  const headScale=1+(s.headPunch||0);
  // Fill pass with skin colours.
  for(let i=segLen-1;i>=0;i--){
    const seg=segs[i];const t=1-i/denom;
    let r=halfW*(0.55+t*0.45);let color;
    if(i===0&&headScale!==1)r*=headScale;
    if(skin.p==='rainbow')color=hsl((i*8+frameCount*2)%360,80,60);
    else if(skin.p==='striped')color=((i/3)|0)%2===0?skin.c[0]:skin.c[1];
    else color=lerpColor(skin.c[1],skin.c[0],t);
    ctx.fillStyle=color;
    if(i===0){ctx.shadowColor=skin.c[0];ctx.shadowBlur=skin.p==='neon'?22:14;}
    ctx.beginPath();ctx.arc(seg.x,seg.y,r,0,TAU);ctx.fill();
    if(i===0)ctx.shadowBlur=0;
    if(skin.p==='dotted'&&i%4===0&&i>0){ctx.fillStyle='rgba(255,255,255,0.35)';ctx.beginPath();ctx.arc(seg.x,seg.y,r*0.4,0,TAU);ctx.fill();}
  }
  // Shield aura
  if(s.powerups.shield>0){ctx.strokeStyle='rgba(64,196,255,0.4)';ctx.lineWidth=3;ctx.shadowColor='#40c4ff';ctx.shadowBlur=10;ctx.beginPath();ctx.arc(s.segments[0].x,s.segments[0].y,w/2+6,0,TAU);ctx.stroke();ctx.shadowBlur=0;}
  // Magnet range (player only — hint)
  if(s.isPlayer&&s.powerups.magnet>0){ctx.strokeStyle='rgba(118,255,3,0.18)';ctx.lineWidth=1;ctx.setLineDash([6,6]);ctx.beginPath();ctx.arc(s.segments[0].x,s.segments[0].y,200,0,TAU);ctx.stroke();ctx.setLineDash([]);}
  // Eyes — LIVING EYES (Wave 3.2). Eye sockets ride the head scale-punch; pupils
  // track the gaze direction (heading by default, nearest threat for the player);
  // a shared time-driven blink squashes both eyes vertically in sync. All cheap,
  // no per-frame allocation (gaze scan reuses snakes[] in place).
  const head=s.segments[0];const eyeD=w/4*headScale,eyeR=w/6*headScale;
  // Gaze: default to heading. For the player, glance toward the nearest other
  // snake head if one is reasonably close (a wary "watching the threat" feel).
  let gazeA=s.angle;
  if(s.isPlayer){
    let _nd=520*520,_nx=0,_ny=0,_found=false;
    for(let qi=0;qi<snakes.length;qi++){
      const o=snakes[qi];
      if(o===s||!o.alive)continue;
      const oh=o.segments[0];const ddx=oh.x-head.x,ddy=oh.y-head.y;const dd=ddx*ddx+ddy*ddy;
      if(dd<_nd){_nd=dd;_nx=ddx;_ny=ddy;_found=true;}
    }
    if(_found)gazeA=Math.atan2(_ny,_nx);
  }
  // Blink: eyeBlinkP 1→0 maps to a brief eye squash via a sine hump (0 at the
  // ends, full squash mid-blink). Eyes never fully vanish — scaleY floors at ~0.12.
  const blinkSq=eyeBlinkP>0?Math.sin(eyeBlinkP*PI):0;   // 0..1, peaks mid-blink
  const eyeSY=1-blinkSq*0.88;                           // vertical scale 1 → 0.12
  const ex1=head.x+Math.cos(s.angle-0.4)*eyeD,ey1=head.y+Math.sin(s.angle-0.4)*eyeD;
  const ex2=head.x+Math.cos(s.angle+0.4)*eyeD,ey2=head.y+Math.sin(s.angle+0.4)*eyeD;
  // Pupil offset toward gaze (clamped inside the sclera).
  const pdx=Math.cos(gazeA)*eyeR*0.42,pdy=Math.sin(gazeA)*eyeR*0.42;
  if(eyeSY>=0.999){
    // Fast path — no blink this frame, draw round eyes directly (no save/scale).
    ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(ex1,ey1,eyeR,0,TAU);ctx.fill();ctx.beginPath();ctx.arc(ex2,ey2,eyeR,0,TAU);ctx.fill();
    ctx.fillStyle='#111';
    ctx.beginPath();ctx.arc(ex1+pdx,ey1+pdy,eyeR*0.5,0,TAU);ctx.fill();
    ctx.beginPath();ctx.arc(ex2+pdx,ey2+pdy,eyeR*0.5,0,TAU);ctx.fill();
  }else{
    // Blinking — squash each eye vertically about its own center.
    ctx.fillStyle='#fff';
    ctx.save();ctx.translate(ex1,ey1);ctx.scale(1,eyeSY);
    ctx.beginPath();ctx.arc(0,0,eyeR,0,TAU);ctx.fill();ctx.fillStyle='#111';ctx.beginPath();ctx.arc(pdx,pdy,eyeR*0.5,0,TAU);ctx.fill();ctx.restore();
    ctx.fillStyle='#fff';
    ctx.save();ctx.translate(ex2,ey2);ctx.scale(1,eyeSY);
    ctx.beginPath();ctx.arc(0,0,eyeR,0,TAU);ctx.fill();ctx.fillStyle='#111';ctx.beginPath();ctx.arc(pdx,pdy,eyeR*0.5,0,TAU);ctx.fill();ctx.restore();
  }
  // King crown
  if(s.isKing){ctx.fillStyle='#ffd600';ctx.shadowColor='#ffd600';ctx.shadowBlur=10;const cx=head.x,cy=head.y-w/2-2;ctx.beginPath();ctx.moveTo(cx-6,cy+4);ctx.lineTo(cx-6,cy-2);ctx.lineTo(cx-3,cy+1);ctx.lineTo(cx,cy-4);ctx.lineTo(cx+3,cy+1);ctx.lineTo(cx+6,cy-2);ctx.lineTo(cx+6,cy+4);ctx.closePath();ctx.fill();ctx.shadowBlur=0;}
  // Boss aura: pulsating red halo + skull mark above the head.
  if(s.isBoss){
    const bp=0.5+0.5*Math.sin(frameCount*0.12);
    ctx.strokeStyle='rgba(255,23,68,'+(0.35+bp*0.45)+')';
    ctx.lineWidth=3+bp*3;
    ctx.shadowColor='#ff1744';ctx.shadowBlur=18;
    ctx.beginPath();ctx.arc(head.x,head.y,w/2+10+bp*6,0,TAU);ctx.stroke();
    ctx.shadowBlur=0;
    // Skull mark
    ctx.fillStyle='#ff1744';ctx.font='900 14px Orbitron';ctx.textAlign='center';
    ctx.fillText('☠',head.x,head.y-w/2-12);ctx.textAlign='left';
  }
  // Name
  ctx.fillStyle='rgba(255,255,255,0.7)';ctx.font='bold 10px Rajdhani';ctx.textAlign='center';
  ctx.fillText(s.name,head.x,head.y-w/2-8);
  ctx.fillStyle='rgba(255,255,255,0.4)';ctx.font='600 8px Rajdhani';
  ctx.fillText(s.length,head.x,head.y-w/2-18);
  ctx.globalAlpha=1;ctx.textAlign='left';
  // ═══ BOOST VFX (player only, additive, save/restore-bounded, no per-frame alloc) ═══
  // reducedMotion gates the entire heavy additive pass (glow + speed-lines + trail sheen).
  if(s.isPlayer&&s.boosting&&!reducedMotion){
    const bRgb=_parseHex(skin.c[0]);
    const br=bRgb.r,bg=bRgb.g,bb=bRgb.b;
    ctx.save();
    ctx.globalCompositeOperation='lighter';
    // — Brighter multi-segment trail: additive sheen over the first 12 body segments —
    const trailMax=Math.min(12,segLen-1);
    for(let i=1;i<=trailMax;i++){
      const seg=segs[i];
      const tf=1-(i/trailMax);           // 1 near head → 0 at tail edge
      const tr=halfW*(0.55+(1-i/denom)*0.45)*1.1;
      const ta=tf*0.28;
      ctx.beginPath();ctx.arc(seg.x,seg.y,tr,0,TAU);
      ctx.fillStyle='rgba('+br+','+bg+','+bb+','+ta+')';
      ctx.fill();
    }
    // — Head glow pulse: soft radial gradient centered on head, pulsing gently —
    const pulse=0.65+0.35*Math.sin(frameCount*0.18);
    const glowR=w*2.2;
    const glowA=pulse*0.45;
    const hgrd=ctx.createRadialGradient(head.x,head.y,w*0.3,head.x,head.y,glowR);
    hgrd.addColorStop(0,'rgba('+br+','+bg+','+bb+','+glowA+')');
    hgrd.addColorStop(0.5,'rgba('+br+','+bg+','+bb+','+(glowA*0.3)+')');
    hgrd.addColorStop(1,'rgba('+br+','+bg+','+bb+',0)');
    ctx.beginPath();ctx.arc(head.x,head.y,glowR,0,TAU);
    ctx.fillStyle=hgrd;ctx.fill();
    // — Speed-lines: 5 tapered streaks behind the head opposite heading —
    const backA=s.angle+Math.PI;   // direction directly behind
    const slLen=w*2.8;             // base streak length
    const slSpread=0.38;           // fan half-angle (radians)
    for(let k=0;k<5;k++){
      // fan angle: evenly spaced from -spread to +spread
      const fa=backA+slSpread*(k/4-0.5)*2;
      const startD=w*0.6;          // start behind the head circle
      const endD=startD+slLen*(0.7+0.3*((k+1)%3===0?1:0.6));
      const sx0=head.x+Math.cos(fa)*startD;
      const sy0=head.y+Math.sin(fa)*startD;
      const sx1=head.x+Math.cos(fa)*endD;
      const sy1=head.y+Math.sin(fa)*endD;
      const slA=k===2?0.55:0.35;   // center streak slightly brighter
      const slW=k===2?2.2:1.2;
      const slGrd=ctx.createLinearGradient(sx0,sy0,sx1,sy1);
      slGrd.addColorStop(0,'rgba('+br+','+bg+','+bb+','+slA+')');
      slGrd.addColorStop(1,'rgba('+br+','+bg+','+bb+',0)');
      ctx.beginPath();ctx.moveTo(sx0,sy0);ctx.lineTo(sx1,sy1);
      ctx.strokeStyle=slGrd;ctx.lineWidth=slW;ctx.stroke();
    }
    ctx.restore();
  }
}

function rr(x,y,w,h,r){ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();}

    ctx.font='900 28px Orbitron';
    ctx.fillText(isTR?'☠ BOSS GELDİ!':'☠ BOSS INCOMING!',W/2,m+60);ctx.shadowBlur=0;
    ctx.fillStyle='rgba(255,255,255,0.78)';ctx.font='700 13px Rajdhani';
    ctx.fillText(isTR?'Yenersen +'+BOSS_SCORE_REWARD+' skor & +'+BOSS_COIN_REWARD+' 🪙':'Defeat it for +'+BOSS_SCORE_REWARD+' & +'+BOSS_COIN_REWARD+' 🪙',W/2,m+80);
    ctx.globalAlpha=1;ctx.textAlign='left';

  if(player&&player.invulnTimer>0){
    ctx.textAlign='center';ctx.fillStyle='#40c4ff';ctx.shadowColor='#40c4ff';ctx.shadowBlur=12;

    ctx.font='700 12px Rajdhani';ctx.fillText(mult+'x '+L.score+' & 🪙',W/2,m+52);
    // Tiny timer pip so the player can see the chain about to break
    const pip=Math.max(0,Math.min(1,killComboTimer/KILL_COMBO_S));

  // Powerup labels render below the AI stage badge so they never overlap.
  let py=m+118;
  if(player){for(const k of PU_TYPES){if(player.powerups[k]>0){ctx.fillStyle=PU_COLORS[k];ctx.font='bold 14px Rajdhani';ctx.fillText(PU_ICONS[k]+' '+player.powerups[k].toFixed(1)+'s',15,py);py+=18;}}}
  // Leaderboard — refresh ranking ~7×/s. Was filter+sort+slice every frame
  // (3 array allocations × 60fps = constant GC churn for a static-ish view).
  if(frameCount%9===0||hudLeaderboard.length===0){
    hudLeaderboard.length=0;
    for(const s of snakes)if(s.alive)hudLeaderboard.push(s);

  const lb=hudLeaderboard;

}

let mmC=null;
function drawMinimap(){
  const sz=90,mx=W-sz-12,my=sat+8,sc=sz/WS;
  if(!mmC){mmC=document.createElement('canvas');mmC.width=sz*2;mmC.height=sz*2;}
  // Throttle expensive offscreen redraw to ~15fps; blit cached image every frame.
  if(frameCount%4===0){
    const mc=mmC.getContext('2d');mc.setTransform(2,0,0,2,0,0);mc.clearRect(0,0,sz,sz);
    mc.fillStyle='rgba(0,0,0,0.5)';mc.fillRect(0,0,sz,sz);
    mc.strokeStyle='rgba(255,255,255,0.1)';mc.lineWidth=1;mc.beginPath();mc.arc(sz/2,sz/2,WR*sc,0,TAU);mc.stroke();
    mc.fillStyle='rgba(100,255,100,0.2)';for(let i=0;i<foods.length;i+=10){const f=foods[i];mc.fillRect(f.x*sc,f.y*sc,1,1);}
    for(const s of snakes){
      if(!s.alive)continue;
      const hx=s.segments[0].x*sc,hy=s.segments[0].y*sc;
      mc.fillStyle=s.isPlayer?'#00e5ff':(s.isKing?'#ffd600':SKINS[s.skin].c[0]);
      if(s.isPlayer){
        const a=s.angle,tr=5;
        mc.beginPath();
        mc.moveTo(hx+Math.cos(a)*tr,hy+Math.sin(a)*tr);
        mc.lineTo(hx+Math.cos(a+2.5)*tr,hy+Math.sin(a+2.5)*tr);
        mc.lineTo(hx+Math.cos(a-2.5)*tr,hy+Math.sin(a-2.5)*tr);
        mc.closePath();mc.fill();
      }else{
        mc.beginPath();mc.arc(hx,hy,s.isKing?2.5:1.5,0,TAU);mc.fill();
      }
    }
    mc.strokeStyle='rgba(255,255,255,0.15)';mc.lineWidth=1;mc.strokeRect(0,0,sz,sz);
  }
  ctx.drawImage(mmC,0,0,sz*2,sz*2,mx,my,sz,sz);
}

  ry=oy+uh*0.64;
  ctx.fillStyle='rgba(255,23,68,0.25)';ctx.strokeStyle='#ff1744';ctx.lineWidth=2;
  rr(bx,ry,bw,bh,bh/2);ctx.fill();ctx.stroke();
  ctx.fillStyle='#fff';ctx.font='900 17px Orbitron';ctx.fillText(L.mainMenu,W/2,ry+bh*0.65);

  if(quitConfirmTimer>0){

// ─── DAILY REWARD MODAL (Wave 2.3) ───────────────────────────────────────────
function drawDailyModal(){
  // Full-screen dim backdrop
  ctx.fillStyle='rgba(0,0,0,0.82)';ctx.fillRect(0,0,W,H);
  ctx.textAlign='center';
  const uh=H-sat-sab,oy=sat;
  const mw=Math.min(320,W-28),mh=Math.min(440,uh*0.88);
  const mx=W/2-mw/2,my=oy+(uh-mh)/2;
  // Modal card
  ctx.fillStyle='#0e0e22';rr(mx,my,mw,mh,20);ctx.fill();
  ctx.strokeStyle='#ffd600';ctx.lineWidth=2;ctx.shadowColor='#ffd600';ctx.shadowBlur=16;
  rr(mx,my,mw,mh,20);ctx.stroke();ctx.shadowBlur=0;
  // Title
  ctx.fillStyle='#ffd600';ctx.shadowColor='#ffd600';ctx.shadowBlur=12;
  ctx.font='900 18px Orbitron';ctx.fillText(L.dailyReward,W/2,my+34);ctx.shadowBlur=0;
  // Streak line
  ctx.fillStyle='rgba(255,255,255,0.6)';ctx.font='600 13px Rajdhani';
  ctx.fillText(L.streak+': '+loginStreak,W/2,my+54);
  // 7-day strip
  const stripY=my+68,stripH=mh-68-130; // leave room for buttons at bottom
  const cellW=Math.floor((mw-20)/7),cellH=Math.min(74,Math.floor(stripH*0.9));
  const stripX=mx+10+(mw-20-cellW*7)/2;
  for(let d=0;d<7;d++){
    const cx=stripX+d*cellW,cy=stripY;
    const isPast=(d<dailyClaimIdx);
    const isToday=(d===dailyClaimIdx&&dailyAvailable);
    const isFuture=(d>dailyClaimIdx)||(d===dailyClaimIdx&&!dailyAvailable);
    const isClaimed=(d===dailyClaimIdx&&!dailyAvailable&&d>=0);
    // Cell background
    if(isToday){ctx.fillStyle='rgba(255,214,0,0.18)';}
    else if(isPast||isClaimed){ctx.fillStyle='rgba(0,230,118,0.10)';}
    else{ctx.fillStyle='rgba(255,255,255,0.04)';}
    rr(cx+2,cy,cellW-4,cellH,8);ctx.fill();
    ctx.strokeStyle=isToday?'#ffd600':(isPast||isClaimed?'rgba(0,230,118,0.5)':'rgba(255,255,255,0.12)');
    ctx.lineWidth=isToday?2:1;rr(cx+2,cy,cellW-4,cellH,8);ctx.stroke();
    // Day label
    ctx.fillStyle=isToday?'#ffd600':(isPast||isClaimed?'rgba(0,230,118,0.8)':'rgba(255,255,255,0.4)');
    ctx.font='600 10px Rajdhani';ctx.fillText(L.day+' '+(d+1),cx+cellW/2,cy+14);
    // Coins or checkmark
    if(isPast||isClaimed){
      ctx.fillStyle='#00e676';ctx.font='900 18px Orbitron';ctx.fillText('✓',cx+cellW/2,cy+40);
    }else if(isFuture){
      ctx.fillStyle='rgba(255,255,255,0.25)';ctx.font='700 10px Orbitron';ctx.fillText('🔒',cx+cellW/2,cy+40);
    }else{
      ctx.fillStyle='#ffd600';ctx.shadowColor='#ffd600';ctx.shadowBlur=6;
      ctx.font='700 13px Orbitron';ctx.fillText('+'+DAILY_REWARDS[d],cx+cellW/2,cy+38);ctx.shadowBlur=0;
    }
    // Today indicator
    if(isToday){ctx.fillStyle='#ffd600';ctx.font='600 8px Rajdhani';ctx.fillText('▲',cx+cellW/2,cy+cellH-2);}
  }
  // Streak-save button (only shown if a break was detected and not yet saved)
  let btnY=stripY+cellH+16;
  if(dailyStreakSaveOffered&&dailyStreakPreBreak>1){
    const sbw=mw-32,sbh=44;
    const adOk=adReady.rewarded;
    ctx.globalAlpha=adOk?1:0.5;
    ctx.strokeStyle='#ff9100';ctx.lineWidth=2;ctx.shadowColor='#ff9100';ctx.shadowBlur=adOk?8:0;
    rr(mx+16,btnY,sbw,sbh,22);ctx.stroke();ctx.shadowBlur=0;
    ctx.fillStyle='#ff9100';ctx.font='700 12px Orbitron';
    ctx.fillText('📺 '+L.streakSave+' ('+dailyStreakPreBreak+'→'+(dailyStreakPreBreak+1)+')',W/2,btnY+sbh*0.62);
    ctx.globalAlpha=1;
    btnY+=sbh+10;
  }
  // CLAIM button
  if(dailyAvailable){
    const cbw=mw-32,cbh=52;
    ctx.fillStyle='#ffd600';ctx.shadowColor='#ffd600';ctx.shadowBlur=14;
    rr(mx+16,btnY,cbw,cbh,26);ctx.fill();ctx.shadowBlur=0;
    ctx.fillStyle='#0a0a1a';ctx.font='900 20px Orbitron';
    ctx.fillText(L.claim+' +'+DAILY_REWARDS[dailyClaimIdx]+' 🪙',W/2,btnY+cbh*0.64);
    btnY+=cbh+10;
  }
  // Close / Back chip
  const closeBw=mw-32;const closeBh=38;
  ctx.fillStyle='rgba(255,255,255,0.07)';rr(mx+16,btnY,closeBw,closeBh,19);ctx.fill();
  ctx.strokeStyle='rgba(255,255,255,0.2)';ctx.lineWidth=1;rr(mx+16,btnY,closeBw,closeBh,19);ctx.stroke();
  ctx.fillStyle='rgba(255,255,255,0.55)';ctx.font='700 14px Rajdhani';
  ctx.fillText(L.back,W/2,btnY+closeBh*0.64);
  ctx.textAlign='left';
}
function handleDailyModalTap(x,y){
  const uh=H-sat-sab,oy=sat;
  const mw=Math.min(320,W-28),mh=Math.min(440,uh*0.88);
  const mx=W/2-mw/2,my=oy+(uh-mh)/2;
  const stripY=my+68;
  const cellW=Math.floor((mw-20)/7),cellH=Math.min(74,Math.floor((mh-68-130)*0.9));
  let btnY=stripY+cellH+16;
  if(dailyStreakSaveOffered&&dailyStreakPreBreak>1){
    const sbw=mw-32,sbh=44;
    if(x>mx+16&&x<mx+16+sbw&&y>btnY&&y<btnY+sbh){
      if(!adReady.rewarded){showToast(L.adNotAvailable,'error');postMsg({type:'CHECK_AD_READY'});return;}
      postMsg({type:'SHOW_REWARDED_AD',data:{reward:'streak'}});
      return;
    }
    btnY+=sbh+10;
  }
  if(dailyAvailable){
    const cbw=mw-32,cbh=52;
    if(x>mx+16&&x<mx+16+cbw&&y>btnY&&y<btnY+cbh){
      // Grant reward — commit the pending streak value (may be >7 for long runs)
      // and advance lastLoginDate HERE (not at arming time) so an interrupted
      // pre-claim session re-computes the same pending streak idempotently.
      loginStreak=dailyPendingStreak;
      lastLoginDate=todayKey();
      saveLogin();
      coins+=DAILY_REWARDS[dailyClaimIdx];saveCoins();
      saveBlob('daily',{claimedDay:todayKey()});
      sndPowerup();
      showToast('+'+DAILY_REWARDS[dailyClaimIdx]+' 🪙 · '+L.streak+': '+loginStreak,'success');
      dailyAvailable=false;
      showDailyModal=false;
      return;
    }
    btnY+=cbh+10;
  }
  // Close button
  const closeBh=38;
  if(x>mx+16&&x<W/2+mw/2-16&&y>btnY&&y<btnY+closeBh){
    showDailyModal=false;sndMenu();return;
  }
  // Tap outside modal also closes
  if(x<mx||x>mx+mw||y<my||y>my+mh){showDailyModal=false;sndMenu();}
}

    ctx.fillText(mv.label,rowX+46,ry+rowH*0.42);

  ctx.fillStyle=allDoneM?'#ffd600':'rgba(255,214,0,0.45)';

// ═══ TUTORIAL ═══
function drawTutorial(){
  // Backdrop with subtle vignette
  ctx.fillStyle='rgba(0,0,0,0.94)';ctx.fillRect(0,0,W,H);
  const vg=ctx.createRadialGradient(W/2,H/2,W*0.2,W/2,H/2,W*0.7);
  vg.addColorStop(0,'rgba(0,229,255,0.05)');vg.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=vg;ctx.fillRect(0,0,W,H);
  ctx.textAlign='center';
  const uh=H-sat-sab,oy=sat;
  // Header card
  const titleSize=Math.min(34,Math.floor(W*0.085));
  ctx.fillStyle='#00e5ff';ctx.shadowColor='#00e5ff';ctx.shadowBlur=20;
  ctx.font='900 '+titleSize+'px Orbitron';ctx.fillText(L.howToPlay,W/2,oy+uh*0.11);ctx.shadowBlur=0;
  ctx.fillStyle='rgba(255,255,255,0.55)';ctx.font='600 13px Rajdhani';
  ctx.fillText(isTR?'Yılanını büyüt, rakipleri ezdir':'Grow your snake, crash rivals',W/2,oy+uh*0.155);
  // Cards container
  const cardW=Math.min(340,W-32),cardX=W/2-cardW/2;
  const cardH=Math.min(82,Math.floor(uh*0.13));
  const startY=oy+uh*0.21;
  const pulse=(Math.sin(frameCount*0.06)+1)/2;
  for(let i=0;i<TUT_CARDS.length;i++){
    const c=TUT_CARDS[i];
    const cy=startY+i*(cardH+8);
    if(cy+cardH>H-sab-60)break;
    // Card background
    ctx.fillStyle='rgba(255,255,255,0.04)';rr(cardX,cy,cardW,cardH,14);ctx.fill();
    ctx.strokeStyle=c.color+'66';ctx.lineWidth=1.5;rr(cardX,cy,cardW,cardH,14);ctx.stroke();
    // Icon circle (animated for boost)
    const iconR=cardH*0.32;
    const ix=cardX+iconR+18,iy=cy+cardH/2;
    if(c.animated){
      ctx.strokeStyle=c.color+Math.floor((0.3+(1-pulse)*0.5)*255).toString(16).padStart(2,'0');
      ctx.lineWidth=2.5;
      ctx.beginPath();ctx.arc(ix,iy,iconR+pulse*8,0,TAU);ctx.stroke();
    }
    ctx.fillStyle=c.color;ctx.shadowColor=c.color;ctx.shadowBlur=12;
    ctx.beginPath();ctx.arc(ix,iy,iconR,0,TAU);ctx.fill();ctx.shadowBlur=0;
    ctx.fillStyle='#0a0a1a';ctx.font='900 '+Math.floor(iconR*1.05)+'px Orbitron';
    ctx.textBaseline='middle';ctx.textAlign='center';
    ctx.fillText(c.icon,ix,iy+1);ctx.textBaseline='alphabetic';
    // Title + desc
    ctx.textAlign='left';
    ctx.fillStyle=c.color;ctx.font='900 14px Orbitron';

// ═══ MENU ═══
// Pre-render the static background grid to an offscreen canvas. The grid
// only depends on W/H/dpr, so we redraw it lazily when those change.
let menuBgC=null,menuBgW=0,menuBgH=0,menuBgDpr=0;
function ensureMenuBg(){
  if(menuBgC&&menuBgW===W&&menuBgH===H&&menuBgDpr===dpr)return;
  menuBgC=document.createElement('canvas');
  menuBgC.width=Math.ceil(W*dpr);menuBgC.height=Math.ceil(H*dpr);
  const mc=menuBgC.getContext('2d');mc.setTransform(dpr,0,0,dpr,0,0);
  mc.fillStyle='#0a0a1a';mc.fillRect(0,0,W,H);
  // Soft cyan aurora behind the title gives the flat panel some depth.
  const gx=W/2,gy=H*0.26,gr=Math.max(W,H)*0.62;
  const aur=mc.createRadialGradient(gx,gy,0,gx,gy,gr);
  aur.addColorStop(0,'rgba(0,229,255,0.11)');
  aur.addColorStop(0.45,'rgba(0,150,200,0.04)');
  aur.addColorStop(1,'rgba(10,10,26,0)');
  mc.fillStyle=aur;mc.fillRect(0,0,W,H);
  mc.strokeStyle='rgba(255,255,255,0.02)';mc.lineWidth=1;
  mc.beginPath();
  for(let x=0;x<W;x+=40){mc.moveTo(x,0);mc.lineTo(x,H);}
  for(let y=0;y<H;y+=40){mc.moveTo(0,y);mc.lineTo(W,y);}
  mc.stroke();
  // Vignette: darken the edges to focus the eye on the centre column.
  const vig=mc.createRadialGradient(W/2,H/2,Math.min(W,H)*0.32,W/2,H/2,Math.max(W,H)*0.78);
  vig.addColorStop(0,'rgba(0,0,0,0)');
  vig.addColorStop(1,'rgba(0,0,0,0.55)');
  mc.fillStyle=vig;mc.fillRect(0,0,W,H);
  menuBgW=W;menuBgH=H;menuBgDpr=dpr;
}
// Sparse field of slow-rising glow motes — ambient life over the cached menu
// background. ~22 dots, gdt-driven so the drift is frame-rate independent.
let menuParticles=null;
// Menu pulse phase — accumulates real time (gdt, seconds) so the title/PLAY glow
// pulses are frame-rate independent (keep the 60fps look on 120Hz ProMotion).
let menuPulseT=0;
function drawMenuParticles(){
  if(!menuParticles){
    menuParticles=[];
    for(let i=0;i<22;i++)menuParticles.push({x:rand(0,W),y:rand(0,H),r:rand(0.8,2.4),spd:rand(6,18),ph:rand(0,TAU)});
  }
  for(let i=0;i<menuParticles.length;i++){
    const p=menuParticles[i];
    p.y-=p.spd*gdt;p.ph+=gdt*0.8;
    if(p.y<-4){p.y=H+4;p.x=rand(0,W);}
    else if(p.x<0||p.x>W){p.x=rand(0,W);}
    ctx.fillStyle='rgba(0,229,255,'+(0.10+0.10*Math.sin(p.ph)).toFixed(3)+')';
    ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,TAU);ctx.fill();
  }
}

  for(let i=0;i<15;i++){const a=(i/15)*TAU+frameCount*0.02;const px=W/2+Math.cos(a)*30,ppy=py+Math.sin(a)*30;const t=i/15;ctx.fillStyle=lerpColor(skin.c[1],skin.c[0],t);ctx.beginPath();ctx.arc(px,ppy,5-t*2,0,TAU);ctx.fill();}
  ctx.fillStyle='rgba(255,255,255,0.3)';ctx.font='600 12px Rajdhani';ctx.fillText(skin.name,W/2,py+50);
  // Version stamp (bottom)
  ctx.fillStyle='rgba(255,255,255,0.18)';ctx.font='600 10px Rajdhani';ctx.textAlign='center';
  ctx.fillText('v1.3.0',W/2,H-sab-8);

}

// ═══ DEATH SCREEN ═══
function drawDeathScreen(){
  // Death cam fade: alpha ramps 0→1 across DEATH_CAM_S so the death screen
  // doesn't slam in the same frame the snake dies — gives the zoom-in beat
  // some breathing room. Once the timer expires, stays at full alpha.
  const fade=deathCamTimer>0?1-(deathCamTimer/DEATH_CAM_S):1;
  ctx.globalAlpha=Math.max(0,Math.min(1,fade));
  ctx.fillStyle='rgba(0,0,0,0.78)';ctx.fillRect(0,0,W,H);ctx.textAlign='center';
  const uh=H-sat-sab,oy=sat;
  // Mode badge — small pill at very top so each mode's result is visibly distinct.
  const modeAccentDs=mode==='rush'?'#ffab00':(mode==='bossrush'?'#ff1744':'#00e5ff');
  const modeLabelDs=mode==='rush'?L.rushMode:(mode==='bossrush'?L.bossrushMode:L.classicMode);
  ctx.fillStyle='rgba(0,0,0,0.45)';rr(W/2-60,oy+10,120,26,13);ctx.fill();
  ctx.strokeStyle=modeAccentDs;ctx.lineWidth=1.5;rr(W/2-60,oy+10,120,26,13);ctx.stroke();
  ctx.fillStyle=modeAccentDs;ctx.font='700 12px Rajdhani';ctx.fillText(modeLabelDs,W/2,oy+27);
  // Title: TIME'S UP for timeout, ELIMINATED for collisions.
  const isTimeout=(killerName==='time');
  const titleCol=isTimeout?'#ffab00':'#ff1744';
  const titleTxt=isTimeout?L.timeUp:L.eliminated;
  ctx.fillStyle=titleCol;ctx.font='900 38px Orbitron';ctx.shadowColor=titleCol;ctx.shadowBlur=20;
  ctx.fillText(titleTxt,W/2,oy+uh*0.13);ctx.shadowBlur=0;
  // Big headline number — Boss Rush shows waves cleared (its score proxy) with
  // a WAVE label/badge; every other mode shows the raw score unchanged.
  const bigNum=mode==='bossrush'?runWaves:score;
  const bigLabel=mode==='bossrush'?L.wave.toUpperCase():L.score.toUpperCase();
  ctx.fillStyle='#fff';ctx.font='900 52px Orbitron';ctx.shadowColor=mode==='bossrush'?'#ff1744':zoneAccent;ctx.shadowBlur=14;
  ctx.fillText(bigNum,W/2,oy+uh*0.235);ctx.shadowBlur=0;
  ctx.fillStyle='rgba(255,255,255,0.45)';ctx.font='600 13px Rajdhani';
  ctx.fillText(bigLabel,W/2,oy+uh*0.265);
  // Compact stats line
  ctx.fillStyle='rgba(255,255,255,0.7)';ctx.font='700 15px Rajdhani';
  const mn=Math.floor(playTime/60),sc=Math.floor(playTime%60);
  const stats1=L.length+': '+(player?player.length:0)+'  ·  '+L.kills+': '+(player?player.killCount:0);
  ctx.fillText(stats1,W/2,oy+uh*0.34);
  const stats2=L.time+': '+mn+':'+(sc<10?'0':'')+sc;
  ctx.fillStyle='rgba(255,255,255,0.5)';ctx.font='600 13px Rajdhani';
  ctx.fillText(stats2,W/2,oy+uh*0.385);
  // Coins earned + killer/timeout line
  const earned=Math.max(0,coins-coinsAtStart);
  if(earned>0){ctx.fillStyle='#ffd600';ctx.font='700 15px Rajdhani';ctx.fillText('🪙 +'+earned,W/2,oy+uh*0.43);}
  if(!isTimeout){
    ctx.fillStyle='rgba(255,255,255,0.4)';ctx.font='600 13px Rajdhani';
    ctx.fillText(L.eliminatedBy+' '+killerName,W/2,oy+uh*0.465);
  }
  // Rank/best badge — use per-mode best for the new-best check. Boss Rush's
  // metric is waves-cleared (runWaves); every other mode uses score.
  const currentModeBest=bestByMode[mode]||0;
  const runMetricDs=mode==='bossrush'?runWaves:score;
  // bestByMode was already updated in killSnake before drawDeathScreen runs,
  // so currentModeBest IS the new best if the run beat the previous best. We
  // detect that by checking runMetric === currentModeBest (this run set it).
  const isNewModeBest=(runMetricDs>0&&runMetricDs===currentModeBest);
  // For classic, also check highScore path for the existing top-rank display.
  if(isNewModeBest){
    ctx.fillStyle='#ffd600';ctx.shadowColor='#ffd600';ctx.shadowBlur=10;ctx.font='900 20px Orbitron';
    ctx.fillText('★ '+L.newBest+' ★',W/2,oy+uh*0.51);ctx.shadowBlur=0;
  }else if(mode==='classic'&&currentRank>0&&currentRank<=10){
    const col=currentRank===1?'#ffd600':(currentRank<=3?'#c0c0c0':'#00e5ff');
    ctx.fillStyle=col;ctx.shadowColor=col;ctx.shadowBlur=8;ctx.font='900 18px Orbitron';
    ctx.fillText('TOP '+currentRank,W/2,oy+uh*0.51);ctx.shadowBlur=0;
  }else if(currentModeBest>0){
    ctx.fillStyle='rgba(255,255,255,0.45)';ctx.font='600 13px Rajdhani';
    ctx.fillText(L.modeBest+': '+formatModeBest(mode,currentModeBest),W/2,oy+uh*0.51);
  }
  // Tier line — current named tier (derived from CLASSIC best highScore) plus,
  // if not yet Master, the "Next: {tier} at {min}" nudge. Read-only, no persist.
  {const tr=tierForScore(highScore),nt=nextTier(highScore);
  ctx.fillStyle=tr.color;ctx.font='700 13px Rajdhani';ctx.textAlign='center';
  ctx.fillText(L.tier+': '+tierName(tr),W/2,oy+uh*0.54);
  if(nt){ctx.fillStyle='rgba(255,255,255,0.45)';ctx.font='600 11px Rajdhani';
    ctx.fillText(L.nextTier+': '+tierName(nt)+' @ '+nt.min,W/2,oy+uh*0.562);}}
  // Buttons
  const bw=Math.min(260,W-40),bh=50;
  const canRevive=!hasRevived;
  const showAd=canRevive&&adReady.rewarded;
  const adLoading=canRevive&&!adReady.rewarded&&adReady.rewardedLoading;
  // Revive button (only if not already revived this game)
  const ry=oy+uh*0.58;
  if(canRevive){
    if(showAd){
      ctx.fillStyle='#7c4dff';ctx.shadowColor='#7c4dff';ctx.shadowBlur=12;rr(W/2-bw/2,ry,bw,bh,25);ctx.fill();ctx.shadowBlur=0;
      ctx.fillStyle='#fff';ctx.font='900 17px Orbitron';ctx.fillText(L.watchRevive,W/2,ry+32);
    }else if(adLoading){
      ctx.globalAlpha=0.55;
      ctx.fillStyle='#7c4dff';rr(W/2-bw/2,ry,bw,bh,25);ctx.fill();
      ctx.fillStyle='#fff';ctx.font='900 15px Orbitron';
      ctx.fillText(isTR?'REKLAM YÜKLENİYOR...':'AD LOADING...',W/2,ry+32);
      ctx.globalAlpha=1;
    }else{
      ctx.globalAlpha=0.35;
      ctx.fillStyle='#7c4dff';rr(W/2-bw/2,ry,bw,bh,25);ctx.fill();
      ctx.fillStyle='#fff';ctx.font='900 17px Orbitron';ctx.fillText(L.watchRevive,W/2,ry+32);
      ctx.globalAlpha=1;
    }
  }
  // Ad-failed inline message
  if(adFailedMsg>0){
    adFailedMsg-=gdt;
    ctx.fillStyle='rgba(255,100,100,'+(Math.min(adFailedMsg,1))+')';
    ctx.font='600 13px Rajdhani';
    ctx.fillText(L.adNotAvailable,W/2,ry+bh+16);
  }
  // ─── Double your coins button ─────────────────────────────────────────────
  const showDouble=lastRunEarned>0&&!doubleClaimed;
  if(showDouble){
    const dby=oy+uh*(canRevive?0.675:0.595);
    const dbOk=adReady.rewarded;
    ctx.globalAlpha=dbOk?1:0.4;
    ctx.fillStyle='#ffd600';ctx.shadowColor='#ffd600';ctx.shadowBlur=dbOk?10:0;rr(W/2-bw/2,dby,bw,44,22);ctx.fill();ctx.shadowBlur=0;
    ctx.fillStyle='#0a0a1a';ctx.font='900 14px Orbitron';ctx.fillText(L.doubleCoins+' +'+lastRunEarned+' 🪙',W/2,dby+28);
    ctx.globalAlpha=1;
  }
  // Play Again
  const ry2=oy+uh*(canRevive?(showDouble?0.775:0.71):(showDouble?0.685:0.62));
  ctx.fillStyle='#00e5ff';ctx.shadowColor='#00e5ff';ctx.shadowBlur=10;rr(W/2-bw/2,ry2,bw,bh,25);ctx.fill();ctx.shadowBlur=0;
  ctx.fillStyle='#0a0a1a';ctx.font='900 17px Orbitron';ctx.fillText('▶ '+L.playAgain,W/2,ry2+32);
  // Main Menu
  const ry3=oy+uh*(canRevive?(showDouble?0.895:0.84):(showDouble?0.81:0.75));
  ctx.strokeStyle='rgba(255,255,255,0.3)';ctx.lineWidth=2;rr(W/2-bw/2,ry3,bw,44,22);ctx.stroke();
  ctx.fillStyle='rgba(255,255,255,0.85)';ctx.font='700 15px Rajdhani';
  ctx.fillText('⌂ '+L.mainMenu,W/2,ry3+28);
  ctx.globalAlpha=1;
  ctx.textAlign='left';
}

function cosmTabRect(){const w=110,h=30;return{x:W-w-12,y:sat+58,w:w,h:h};}

  // TRAILS tab — switches to the cosmetic-trail screen (geometry via cosmTabRect).
  {const r=cosmTabRect();ctx.fillStyle='rgba(124,77,255,0.14)';rr(r.x,r.y,r.w,r.h,r.h/2);ctx.fill();
   ctx.strokeStyle='rgba(124,77,255,0.6)';ctx.lineWidth=1.4;rr(r.x,r.y,r.w,r.h,r.h/2);ctx.stroke();
   ctx.fillStyle='#b39dff';ctx.font='900 13px Rajdhani';ctx.textAlign='center';ctx.fillText(L.trails+' →',r.x+r.w/2,r.y+r.h*0.66);}

  const cols=5,cellW=W/cols,cellH=70,startY=oy+118-skinScroll;
  for(let i=0;i<SKINS.length;i++){

    const unlocked=unlockedSkins.includes(i);

    if(unlocked){
      const skin=SKINS[i];
      for(let j=0;j<5;j++){const t=j/5;let c;if(skin.p==='rainbow')c=hsl((j*60+frameCount*2)%360,80,60);else c=lerpColor(skin.c[1],skin.c[0],t);ctx.fillStyle=c;ctx.beginPath();ctx.arc(cx-10+j*5,cy-5,5-t*2,0,TAU);ctx.fill();}
      ctx.fillStyle='rgba(255,255,255,0.5)';ctx.font='600 10px Rajdhani';ctx.fillText(skin.name,cx,cy+18);
    }else{
      // Locked skin — branch on rail: 'earn' shows goal only, 'coins' shows price + buy cue
      ctx.fillStyle='rgba(255,255,255,0.1)';ctx.beginPath();ctx.arc(cx,cy-5,12,0,TAU);ctx.fill();
      ctx.fillStyle='rgba(255,255,255,0.2)';ctx.font='bold 12px Rajdhani';ctx.fillText('?',cx,cy);
      const skL=SKINS[i],uL=skL.u,tL=uL[0],vL=parseInt(uL.slice(1));

      if(railL==='earn'){

        ctx.fillStyle='rgba(100,220,255,0.55)';ctx.font='600 8px Rajdhani';ctx.fillText(hint,cx,cy+14);
        ctx.fillStyle='rgba(100,220,255,0.35)';ctx.font='600 7px Rajdhani';ctx.fillText('▲ EARN',cx,cy+24);
      }else{

        const p=featuredSkinPrice(i);
        ctx.fillStyle='rgba(255,255,255,0.3)';ctx.font='600 8px Rajdhani';
        const hintC=tL==='k'?vL+' '+L.killsReq:(tL==='l'?L.lengthReq+' '+vL:vL+' '+L.gamesReq);

        ctx.fillStyle=coins>=p?'#ffd600':'rgba(255,214,0,0.3)';ctx.font='bold 9px Rajdhani';ctx.fillText('🪙'+p,cx,cy+24);
      }
    }
    // FEATURED highlight badge on this week's featured skin cell (any state).
    if(isFeaturedSkin(i)){
      const pulse=reducedMotion?0:0.18+0.12*Math.sin(frameCount*0.12);
      ctx.strokeStyle='rgba(255,214,0,'+(0.55+pulse)+')';ctx.lineWidth=2;
      rr(cx-cellW/2+4,cy-cellH/2+4,cellW-8,cellH-8,8);ctx.stroke();

      ctx.fillText('★ '+L.featured,cx,cy-cellH/2+13);ctx.textAlign='center';

  // Buy confirm modal
  if(pendingSkinBuy>=0){

    ctx.fillStyle='#fff';ctx.font='900 22px Orbitron';ctx.fillText(sk.name,W/2,my+86);
    ctx.fillStyle='#ffd600';ctx.font='900 26px Orbitron';ctx.shadowColor='#ffd600';ctx.shadowBlur=10;
    ctx.fillText('🪙 '+p,W/2,my+126);ctx.shadowBlur=0;
    ctx.fillStyle='rgba(255,255,255,0.55)';ctx.font='600 13px Rajdhani';
    ctx.fillText(isTR?'Bu görünümü satın al?':'Buy this skin?',W/2,my+150);
    const cbw=120,cbh=48,cy=my+mh-cbh-20;
    ctx.fillStyle='#00e676';rr(mx+20,cy,cbw,cbh,24);ctx.fill();
    ctx.fillStyle='#0a0a1a';ctx.font='900 16px Orbitron';ctx.fillText(isTR?'AL':'BUY',mx+20+cbw/2,cy+30);
    ctx.fillStyle='rgba(255,255,255,0.15)';ctx.strokeStyle='rgba(255,255,255,0.5)';ctx.lineWidth=2;rr(mx+mw-cbw-20,cy,cbw,cbh,24);ctx.fill();ctx.stroke();
    ctx.fillStyle='#fff';ctx.fillText(isTR?'İPTAL':'CANCEL',mx+mw-cbw-20+cbw/2,cy+30);
    ctx.textAlign='left';
  }
  // Scrollbar indicator
  const maxScroll=Math.max(0,Math.ceil(SKINS.length/5)*70-H+sat+sab+128);
  if(maxScroll>0){
    const sbY=sat+128,sbH=H-sab-sbY-12,sbX=W-6;
    const thumbR=Math.min(1,sbH/(sbH+maxScroll)),thumbH=sbH*thumbR;
    const thumbY=sbY+(skinScroll/maxScroll)*(sbH-thumbH);
    ctx.fillStyle='rgba(255,255,255,0.08)';ctx.fillRect(sbX,sbY,3,sbH);
    ctx.fillStyle='rgba(255,255,255,0.45)';ctx.fillRect(sbX,thumbY,3,thumbH);
  }
  ctx.textAlign='left';
}

// ═══ TRAIL SELECT (cosmetic axis #2) ═══
// One source of truth for each trail row's hit-rect (draw + tap share it).
function trailRowRect(i){

  const rw=Math.min(320,W-32),rx=W/2-rw/2,ry=oy+136+i*(rowH+8);

// Static preview dots representing a trail style (no pooled state — pure paint).
function drawTrailPreview(td,cx,cy){

  if(id==='none'){ctx.fillStyle='rgba(255,255,255,0.25)';ctx.font='600 11px Rajdhani';ctx.textAlign='center';ctx.fillText('—',cx,cy+3);return;}
  for(let j=0;j<6;j++){
    const px=cx-18+j*7,t=j/6;let c;
    if(id==='rainbow'){const rc=_hslToRgb((j*55+frameCount*4)%360,0.85,0.6);c='rgb('+rc.r+','+rc.g+','+rc.b+')';}

    ctx.fillStyle=c;ctx.globalAlpha=0.4+t*0.6;
    ctx.beginPath();ctx.arc(px,cy+Math.sin(frameCount*0.1+j)*2,3.4-t*1.6,0,TAU);ctx.fill();
  }
  ctx.globalAlpha=1;
}
