function resize(){
  dpr = Math.min(window.devicePixelRatio||1, 2);
  W = window.innerWidth; H = window.innerHeight;
  $.width = W*dpr; $.height = H*dpr;
  $.style.width = W+'px'; $.style.height = H+'px';
  ctx.setTransform(dpr,0,0,dpr,0,0);
  try{sat=parseInt(getComputedStyle(document.documentElement).getPropertyValue('--sat'))||0;sab=parseInt(getComputedStyle(document.documentElement).getPropertyValue('--sab'))||0;}catch(e){}
  // Detect notched iPhones (iPhone X and later: iPhone 11/12/13/14/15/16 all fit these ratios)
  // and guarantee minimum safe clearance even if env(safe-area-inset-*) fails inside WebView.
  const ratio=H>0?W/H:1;
  const notchLike=(H>=780&&H<=960&&W>=375&&W<=440&&ratio<0.48);
  if(notchLike){
    sat=Math.max(sat,44);
    sab=Math.max(sab,34);
  }else{
    sat=Math.max(sat,12);
    sab=Math.max(sab,12);
  }
}
window.addEventListener('resize', resize);
resize();

// ═══ CONSTANTS ═══
const WS = 3000, WCX = 1500, WCY = 1500, WR = 1500;
const SEG_DIST = 8, TURN_SPEED = 3.5, BASE_SPEED = 150;
const MAX_FOOD = 600, MAX_BOTS = 12, MAX_PARTICLES = 300, MAX_POWERUPS = 8;
const CELL_SIZE = 200, GRID_W = Math.ceil(WS/CELL_SIZE);
const JOY_RADIUS = 55, JOY_DEAD = 5;
const PI = Math.PI, TAU = PI*2;

// ═══ SKINS (52) ═══
// 20-skin curated lineup. Free 5 → score 6 → kill 4 → length 3 → games 1
// → Rainbow as the final hardest. Names + colours stay close to the
// originals so existing localStorage migrations don't lose much.
const SKINS = [
  {name:'Classic',  c:['#00e5ff','#006064'],p:'solid',   u:'free'},
  {name:'Lime',     c:['#76ff03','#33691e'],p:'solid',   u:'free'},
  {name:'Sunset',   c:['#ff9100','#e65100'],p:'solid',   u:'free'},
  {name:'Hot Pink', c:['#ff4081','#880e4f'],p:'solid',   u:'free'},
  {name:'Gold',     c:['#ffd600','#f57f17'],p:'solid',   u:'free'},
  {name:'Neon Blue',c:['#448aff','#1a237e'],p:'neon',    u:'s1000'},
  {name:'Neon Green',c:['#69f0ae','#1b5e20'],p:'neon',   u:'s2500'},
  {name:'Ice',      c:['#80d8ff','#01579b'],p:'gradient',u:'s5000'},
  {name:'Lava',     c:['#ff6e40','#bf360c'],p:'gradient',u:'s8000'},
  {name:'Royal',    c:['#7c4dff','#311b92'],p:'neon',    u:'s12000'},
  {name:'Fire',     c:['#ff3d00','#ff9100'],p:'striped', u:'s15000'},
  {name:'Forest',   c:['#00c853','#76ff03'],p:'striped', u:'k20'},
  {name:'Blood',    c:['#d50000','#b71c1c'],p:'neon',    u:'k50'},
  {name:'Reaper',   c:['#ffffff','#424242'],p:'striped', u:'k100'},
  {name:'Phantom',  c:['#b388ff','#6200ea'],p:'neon',    u:'k150'},
  {name:'Python',   c:['#ffeb3b','#4caf50'],p:'striped', u:'l100'},
  {name:'Cobra',    c:['#9c27b0','#e91e63'],p:'neon',    u:'l250'},
  {name:'Leviathan',c:['#3f51b5','#1a237e'],p:'neon',    u:'l500'},
  {name:'Matrix',   c:['#00e676','#1b5e20'],p:'dotted',  u:'g100'},
  {name:'Rainbow',  c:['#ff0000','#ff0000'],p:'rainbow', u:'s30000'},
];
// Stable index for Boss skin (decoupled from layout reordering).
const BOSS_SKIN_IDX = SKINS.findIndex(s => s.name === 'Blood');

// ═══ ZONES ═══
const ZONES = [
  {min:0,bg:'#0a0a1a',accent:'#00e5ff'},
  {min:31,bg:'#0a0a2e',accent:'#00bfa5'},
  {min:81,bg:'#1a0a2e',accent:'#e040fb'},
  {min:151,bg:'#2b0a0a',accent:'#ff6d00'},
  {min:251,bg:'#0d0020',accent:'#d500f9'}
];

const BOT_NAMES = ['Viper','Neon','Pixel','Blaze','Zenith','Shadow','Echo','Pulse','Flux','Nova','Glitch','Storm','Phantom','Cobra','Fang','Specter','Volt','Drift','Shard','Ember','Frost','Raze','Spark','Thorn','Wrath','Crimson','Zephyr','Onyx','Cipher','Apex','Bolt','Razor','Haze','Quake','Jolt','Turbo','Byte','Nexus','Rogue','Blitz'];

// ═══ STATE ═══
let state = 'menu';
// Drop any stale touch/joystick state so a finger held during a state change
// (e.g. tapping a menu button) doesn't leak into the next screen and steer
// the snake by accident.
function resetTouchState(){
  for(const k in touches)delete touches[k];
  joystick.active=false;joystick.dx=0;joystick.dy=0;
  skinScrollLastY=null;
  if(player)player.boosting=false;
}
// When tutorial is opened from a screen other than the initial spawn (e.g.
// pause "How to play"), this remembers where to go back to once dismissed.
let tutorialReturnState=null;
// Main-menu Settings overlay: same Sound / Music / Vibration toggles as the
// pause screen, but reachable without starting a game.
let showSettings=false;
let score = 0, highScore = 0, deathCount = 0, totalKills = 0, totalGames = 0;
let player = null, snakes = [], foods = [], powerups = [], particles = [];
let spatialGrid = {};
let camera = {x:WCX, y:WCY, zoom:1};
let joystick = {active:false, cx:0, cy:0, dx:0, dy:0, angle:0};
let currentSkin = 0, unlockedSkins = [0,1,2,3,4];
let skinScroll = 0, killerName = '';
let frameCount = 0, foodSpawnTimer = 0, puSpawnTimer = 0;
let flashAlpha = 0, flashColor = '#fff';
let adFailedMsg = 0, buyFailedMsg = 0;
let unlockToast = 0, unlockToastName = '';
let unlockCheckTimer = 0;
let currentRank = 0, playTime = 0, showTutorial = false;
let lastLoginDate = '', loginStreak = 0;
let dailyToast = 0, dailyAmount = 0, dailyStreakVal = 0;
let quitConfirmTimer = 0, kingToast = 0, coinsAtStart = 0;
// Hit-pause: short global freeze the moment the player kills or is killed,
// gives every collision a beat of weight (D3 in the polish plan).
let hitPauseTimer = 0;
// Death cam: timed zoom-in + death-screen fade-in window (D4). Counts down
// in the banner-decay block so it ticks even though the world is in 'dead'.
let deathCamTimer = 0;
const DEATH_CAM_S = 0.55;
let pendingSkinBuy = -1;
let scorePopups = [];
let soundOn = true, musicOn = true, vibrationOn = true;
let coins = 0, topScores = [];
let shakeTimer = 0, shakeMag = 0;
let kingActive = false, nextKingScore = 2000;
// Boss snake (D1): rarer, tougher than King, every 5k score points.
let bossActive = false, nextBossScore = 5000, bossToast = 0;
const BOSS_SCORE_REWARD = 1000;
const BOSS_COIN_REWARD = 180; // Was 300; nerfed alongside the wider economy.
// Combo zones (D2): two roaming bonus circles. Anything the player eats with
// their head inside one is multiplied. Zones move every 30 s to keep the
// camera flowing.
const comboZones = []; // pre-allocated (reused on relocate)
let comboZoneTimer = 0;
const COMBO_ZONE_INTERVAL = 30;
const COMBO_ZONE_RADIUS = 200;
const COMBO_ZONE_MULT = 2.5;
function spawnComboZones(silent){
  comboZones.length=0;
  for(let i=0;i<2;i++){
    const a=rand(0,TAU),r=rand(300,WR-300);
    comboZones.push({x:WCX+Math.cos(a)*r,y:WCY+Math.sin(a)*r});
  }
  comboZoneTimer=COMBO_ZONE_INTERVAL;
  if(!silent)showToast(isTR?'Bonus bölge taşındı!':'Bonus zone moved!','info');
}
function isInComboZone(x,y){
  for(let i=0;i<comboZones.length;i++){
    const z=comboZones[i],dx=x-z.x,dy=y-z.y;
    if(dx*dx+dy*dy<COMBO_ZONE_RADIUS*COMBO_ZONE_RADIUS)return true;
  }
  return false;
}
function drawComboZones(){
  if(!comboZones.length)return;
  ctx.lineWidth=2;
  ctx.setLineDash([10,8]);
  ctx.textAlign='center';
  ctx.font='900 14px Orbitron';
  for(let i=0;i<comboZones.length;i++){
    const z=comboZones[i];
    ctx.fillStyle='rgba(255,214,0,0.06)';
    ctx.beginPath();ctx.arc(z.x,z.y,COMBO_ZONE_RADIUS,0,TAU);ctx.fill();
    ctx.strokeStyle='rgba(255,214,0,0.55)';
    ctx.beginPath();ctx.arc(z.x,z.y,COMBO_ZONE_RADIUS,0,TAU);ctx.stroke();
    ctx.fillStyle='#ffd600';
    ctx.fillText('x'+COMBO_ZONE_MULT,z.x,z.y+5);
  }
  ctx.setLineDash([]);
  ctx.textAlign='left';
}
let collectCombo = 0, collectTimer = 0;
let zoneBg = '#0a0a1a', zoneAccent = '#00e5ff';
let targetZoneBg = '#0a0a1a', targetZoneAccent = '#00e5ff';
let gdt = 0;

// ═══ AUDIO ═══
let ac = null;
function initAudio(){try{if(!ac)ac=new(window.AudioContext||window.webkitAudioContext)();if(ac&&ac.state==='suspended'&&ac.resume)ac.resume();if(musicOn&&!musicTimer)startMusic();}catch(e){}}
function tone(f,t,d,v,dl){
  if(!ac||!soundOn)return;
  try{
    const now=ac.currentTime+(dl||0);
    const o=ac.createOscillator(),g=ac.createGain();
    o.type=t||'sine';o.frequency.setValueAtTime(f,now);
    g.gain.setValueAtTime(v||0.06,now);
    g.gain.exponentialRampToValueAtTime(0.001,now+(d||0.1));
    o.connect(g);g.connect(ac.destination);
    o.start(now);o.stop(now+(d||0.1)+0.01);
  }catch(e){}
}
function sndCollect(){const f=440+collectCombo*40;tone(f,'sine',0.04,0.05);tone(f*1.5,'sine',0.03,0.03,0.02);}
function sndKill(){tone(200,'sawtooth',0.15,0.07);tone(400,'square',0.1,0.04,0.02);}
function sndDeath(){tone(300,'sawtooth',0.4,0.06);tone(200,'sawtooth',0.3,0.04,0.1);tone(100,'sawtooth',0.3,0.03,0.2);}
function sndPowerup(){tone(660,'sine',0.08,0.05);tone(880,'sine',0.08,0.04,0.08);tone(1100,'sine',0.1,0.05,0.16);}
function sndBoost(){tone(120,'triangle',0.1,0.04);}
function sndKing(){tone(100,'sawtooth',0.5,0.06);tone(150,'square',0.4,0.04,0.05);}
function sndKingSlain(){for(let i=0;i<6;i++)tone(440+i*110,'sine',0.12,0.05,i*0.07);}
function sndZone(){for(let i=0;i<5;i++)tone(330+i*80,'sine',0.15,0.04,i*0.06);}
function sndMenu(){tone(440,'sine',0.15,0.04);postMsg({type:'HAPTIC',data:'light'});}

// ═══ AMBIENT MUSIC (simple synthesized loop) ═══
let musicTimer=null,musicStep=0;
const MUSIC_NOTES=[174.61,196.00,220.00,261.63,196.00,233.08,261.63,329.63];
function musicTick(){
  if(!musicOn||!ac)return;
  const note=MUSIC_NOTES[musicStep%MUSIC_NOTES.length];
  try{
    const now=ac.currentTime;
    const o=ac.createOscillator(),g=ac.createGain(),f=ac.createBiquadFilter();
    o.type='triangle';o.frequency.setValueAtTime(note,now);
    f.type='lowpass';f.frequency.setValueAtTime(900,now);
    g.gain.setValueAtTime(0,now);
    g.gain.linearRampToValueAtTime(0.025,now+0.05);
    g.gain.linearRampToValueAtTime(0,now+0.7);
    o.connect(f);f.connect(g);g.connect(ac.destination);
    o.start(now);o.stop(now+0.75);
  }catch(e){}
  musicStep++;
}
function startMusic(){
  if(musicTimer||!musicOn)return;
  musicTick();
  musicTimer=setInterval(musicTick,750);
}
function stopMusic(){
  if(musicTimer){clearInterval(musicTimer);musicTimer=null;}
}

// ═══ POSTMESSAGE BRIDGE ═══
let adReady = {interstitial:false, rewarded:false};
let hostBridgeSeen = false;
function postMsg(m){try{
  if(m.type==='HAPTIC'&&!vibrationOn)return;
  if(window.ReactNativeWebView){window.ReactNativeWebView.postMessage(JSON.stringify(m));hostBridgeSeen=true;}
}catch(e){}}
window.addEventListener('message',function(e){
  try{
    const m=typeof e.data==='string'?JSON.parse(e.data):e.data;
    if(m.type==='AD_REWARD_EARNED'&&m.data){
      if(m.data.reward==='continue')revivePlayer();
      else if(m.data.reward==='coins'){coins+=100;saveCoins();showToast(L.coinsEarned,'success');sndPowerup();}
    }
    if(m.type==='AD_FAILED'){
      const reward=m.data&&m.data.reward;
      showToast(L.adNotAvailable,'error');
      if(reward==='continue'){adFailedMsg=3;}
    }
    if(m.type==='AD_STATUS'&&m.data){adReady={interstitial:!!m.data.interstitial,rewarded:!!m.data.rewarded};}
    if(m.type==='HIGH_SCORE_LOADED'){highScore=Math.max(highScore,m.data||0);try{localStorage.setItem('growio_hs',String(highScore));}catch(e){}}
    if(m.type==='COINS_LOADED'){const rn=m.data||0;if(rn>coins){coins=rn;try{localStorage.setItem('growio_coins',String(coins));}catch(e){}}}
    if(m.type==='STATS_LOADED'&&m.data){
      const s=m.data;
      if(typeof s.totalKills==='number')totalKills=Math.max(totalKills,s.totalKills);
      if(typeof s.totalGames==='number')totalGames=Math.max(totalGames,s.totalGames);
      if(typeof s.totalDeaths==='number')deathCount=Math.max(deathCount,s.totalDeaths);
    }
    if(m.type==='SKIN_STATE_LOADED'&&m.data){
      const s=m.data;
      if(Array.isArray(s.unlocked))for(const idx of s.unlocked)if(typeof idx==='number'&&!unlockedSkins.includes(idx))unlockedSkins.push(idx);
      if(typeof s.current==='number'&&unlockedSkins.includes(s.current))currentSkin=s.current;
    }
  }catch(e){}
});

// ═══ PERSISTENCE ═══
function saveHS(){if(score>highScore){highScore=score;try{localStorage.setItem('growio_hs',String(highScore));}catch(e){}postMsg({type:'SAVE_HIGH_SCORE',data:highScore});}}
function loadHSLocal(){try{const v=parseInt(localStorage.getItem('growio_hs'));if(!isNaN(v)&&v>highScore)highScore=v;}catch(e){}}
function saveSkins(){try{localStorage.setItem('growio_skins',JSON.stringify(unlockedSkins));}catch(e){}postMsg({type:'SAVE_SKIN_STATE',data:{current:currentSkin,unlocked:unlockedSkins.slice()}});}
function loadSkins(){
  try{const d=localStorage.getItem('growio_skins');if(d)unlockedSkins=JSON.parse(d);}catch(e){}
  // Migrate: drop indexes outside the new SKINS layout, ensure free 5 stay.
  unlockedSkins=(Array.isArray(unlockedSkins)?unlockedSkins:[]).filter(i=>typeof i==='number'&&i>=0&&i<SKINS.length);
  for(let i=0;i<5;i++)if(!unlockedSkins.includes(i))unlockedSkins.push(i);
  if(currentSkin<0||currentSkin>=SKINS.length)currentSkin=0;

// ═══ UTILITIES ═══
function rand(a,b){return a+Math.random()*(b-a);}
function randInt(a,b){return Math.floor(rand(a,b+1));}
function dist(a,b){const dx=a.x-b.x,dy=a.y-b.y;return Math.sqrt(dx*dx+dy*dy);}
function angleTo(a,b){return Math.atan2(b.y-a.y,b.x-a.x);}
function normAngle(a){while(a>PI)a-=TAU;while(a<-PI)a+=TAU;return a;}
function lerp(a,b,t){return a+(b-a)*t;}
function lerpColor(c1,c2,t){
  const r1=parseInt(c1.slice(1,3),16),g1=parseInt(c1.slice(3,5),16),b1=parseInt(c1.slice(5,7),16);
  const r2=parseInt(c2.slice(1,3),16),g2=parseInt(c2.slice(3,5),16),b2=parseInt(c2.slice(5,7),16);
  const r=Math.round(lerp(r1,r2,t)),g=Math.round(lerp(g1,g2,t)),b=Math.round(lerp(b1,b2,t));
  return '#'+(r<16?'0':'')+r.toString(16)+(g<16?'0':'')+g.toString(16)+(b<16?'0':'')+b.toString(16);
}
function hsl(h,s,l){return 'hsl('+h+','+s+'%,'+l+'%)';}
function clampWorld(x,y){const dx=x-WCX,dy=y-WCY,d=Math.sqrt(dx*dx+dy*dy);if(d<WR-20)return{x,y};const a=Math.atan2(dy,dx);return{x:WCX+Math.cos(a)*(WR-20),y:WCY+Math.sin(a)*(WR-20)};}

// ═══ SPATIAL GRID ═══
function resetGrid(){spatialGrid={};}
function gridInsert(entity,x,y){const k=Math.floor(x/CELL_SIZE)+','+Math.floor(y/CELL_SIZE);if(!spatialGrid[k])spatialGrid[k]=[];spatialGrid[k].push(entity);}
function gridQuery(x,y,r){
  const results=[];
  const cx1=Math.floor((x-r)/CELL_SIZE),cx2=Math.floor((x+r)/CELL_SIZE);
  const cy1=Math.floor((y-r)/CELL_SIZE),cy2=Math.floor((y+r)/CELL_SIZE);
  for(let gx=cx1;gx<=cx2;gx++)for(let gy=cy1;gy<=cy2;gy++){const k=gx+','+gy;if(spatialGrid[k])for(const e of spatialGrid[k])results.push(e);}
  return results;
}

// Pick a spawn point at least minD pixels from the player. Prevents bots
// from popping into existence right on top of the head and instakilling a
// passive player.
function pickSafeBotSpawn(minD){
  const md=minD||450;
  const phx=player&&player.alive?player.segments[0].x:WCX;
  const phy=player&&player.alive?player.segments[0].y:WCY;
  for(let attempts=0;attempts<10;attempts++){
    const a=rand(0,TAU),r=rand(200,WR-100);
    const x=WCX+Math.cos(a)*r,y=WCY+Math.sin(a)*r;
    const dx=x-phx,dy=y-phy;
    if(dx*dx+dy*dy>md*md)return{x,y};
  }
  // Fallback: spawn on the world's far side relative to the player.
  const a=Math.atan2(WCY-phy,WCX-phx);
  return{x:WCX+Math.cos(a)*(WR-200),y:WCY+Math.sin(a)*(WR-200)};
}

function createSnake(isPlayer,x,y,skinIdx){

// ═══ SNAKE PHYSICS ═══
function updateSnake(s,dt){
  if(!s.alive)return;
  if(s.invulnTimer>0)s.invulnTimer-=dt;
  for(const k of PU_TYPES)if(s.powerups[k]>0)s.powerups[k]-=dt;
  let spd=s.speed;
  // Boost is now length-based: each boosted segment is shed as food. Below MIN
  // length the snake can't boost — preventing infinite-press abuse and turning
  // length itself into the boost resource.
  const MIN_BOOST_LEN=10;
  if(s.boosting&&s.length>MIN_BOOST_LEN){
    spd*=2;
    if(frameCount%6===0){
      s.length--;
      const tail=s.segments[s.segments.length-1];
      spawnFood(tail.x,tail.y,1,SKINS[s.skin].c[0]);
    }
  }else if(s.boosting){
    // Forced off when too short
    s.boosting=false;
  }
  if(s.powerups.speed>0)spd*=1.8;
  if(s.isBoss)spd*=1.3; // Boss is 30% faster than a normal aggressive bot.
  // Turn
  let diff=normAngle(s.targetAngle-s.angle);
  s.angle+=Math.sign(diff)*Math.min(Math.abs(diff),TURN_SPEED*dt);
  s.angle=normAngle(s.angle);
  // Move head
  s.segments[0].x+=Math.cos(s.angle)*spd*dt;
  s.segments[0].y+=Math.sin(s.angle)*spd*dt;
  // Boundary
  const head=s.segments[0];
  const dfc=dist(head,{x:WCX,y:WCY});
  if(dfc>WR-10){
    const c=clampWorld(head.x,head.y);head.x=c.x;head.y=c.y;
    if(dfc>WR){killSnake(s,null,'boundary');return;}
  }
  // Path-following body: record where the head has been (with cumulative
  // distance along the trail), then place each segment at the point that
  // sits exactly i*SEG_DIST behind the head along that path. Means the
  // body actually walks the same line the head walked, instead of cutting
  // the inside of every turn the way pure pull-physics did.
  if(!s.pathHistory){s.pathHistory=[];s._lastHX=head.x;s._lastHY=head.y;}
  const dxH=head.x-s._lastHX,dyH=head.y-s._lastHY;
  const movedH=Math.sqrt(dxH*dxH+dyH*dyH);
  s._lastHX=head.x;s._lastHY=head.y;
  if(movedH>0.01){
    const prevCum=s.pathHistory.length?s.pathHistory[0].cumDist:0;
    s.pathHistory.unshift({x:head.x,y:head.y,cumDist:prevCum+movedH});
  }
  // Walk the (descending-by-recency) history with a single advancing pointer.
  let hIdx=0;
  for(let i=1;i<s.segments.length;i++){
    const targetDist=i*SEG_DIST;
    while(hIdx<s.pathHistory.length-1&&s.pathHistory[hIdx].cumDist<targetDist)hIdx++;
    const p=s.pathHistory[hIdx];
    if(p){s.segments[i].x=p.x;s.segments[i].y=p.y;}
  }
  // Trim history past the last segment (+ a small safety margin).
  const maxNeeded=(s.segments.length+2)*SEG_DIST;
  while(s.pathHistory.length>2&&s.pathHistory[s.pathHistory.length-1].cumDist>maxNeeded){
    s.pathHistory.pop();
  }
  while(s.segments.length<s.length){const t=s.segments[s.segments.length-1];s.segments.push({x:t.x,y:t.y});}
  if(s.segments.length>s.length)s.segments.length=s.length;
  s.speed=BASE_SPEED+Math.min(s.length*0.05,20);
}

// ═══ COLLISIONS ═══
function checkCollisions(){
  resetGrid();
  for(const s of snakes){
    if(!s.alive)continue;
    for(let i=0;i<s.segments.length;i++)gridInsert({snake:s,idx:i},s.segments[i].x,s.segments[i].y);
  }
  for(const s of snakes){
    if(!s.alive)continue;
    const head=s.segments[0];
    const sw=6+Math.min(s.length*0.03,14);
    const hr=sw/2;
    // Head-vs-body / head-vs-head — skipped while invulnerable (spawn protection).
    // Food + powerup collection still runs below so the player can grow during
    // those first 2.5 s instead of starving.
    let died=false;
    if(s.invulnTimer<=0&&s.powerups.ghost<=0){
      // Wider search radius (covers max possible other-snake body width too).
      const nearby=gridQuery(head.x,head.y,hr+24);
      for(const n of nearby){
        if(n.snake===s||!n.snake.alive)continue;
        // Invulnerable snakes are intangible to others (spawn protection).
        if(n.snake.invulnTimer>0)continue;
        const seg=n.snake.segments[n.idx];
        const ow=6+Math.min(n.snake.length*0.03,14);
        // Tight threshold without fudge so brushing past misses cleanly while
        // any actual overlap registers. (Substepping handles fast movement.)
        if(dist(head,seg)<hr+ow/2){
          if(n.idx===0){if(s.length<=n.snake.length)killSnake(s,n.snake,'head');else killSnake(n.snake,s,'head');}
          else killSnake(s,n.snake,'body');
          died=true;break;
        }
      }
    }
    // Skip food/powerup collection if this snake just died — let the next snake be processed
    if(died)continue;
    // Food
    const magR=s.powerups.magnet>0?200:0;
    for(let i=foods.length-1;i>=0;i--){
      const f=foods[i];const d=dist(head,f);
      if(magR>0&&d<magR&&d>hr+f.r){const a=angleTo(f,head);f.x+=Math.cos(a)*200*gdt;f.y+=Math.sin(a)*200*gdt;}
      if(d<hr+f.r){
        // Diminishing growth: each food contributes more to a small snake
        // than to a giant. Floor(1.5 + 1.5 * 200/(200+length)): length 0 → 3,
        // length 100 → 2, length 300 → 2, length 800 → 1. Min 1 always.
        const growMul=1.5+1.5*(200/(200+s.length));
        const grow=Math.max(1,Math.floor(f.val*growMul));
        s.length+=grow;s.score+=f.val;
        if(s.isPlayer){
          const comboMult=collectCombo>=10?3:(collectCombo>=5?2:1);
          const inZone=isInComboZone(head.x,head.y);
          const totalMult=comboMult*(inZone?COMBO_ZONE_MULT:1);
          const pts=Math.max(1,Math.floor(f.val*totalMult));
          // Coin economy nerf: food now pays half its score in coins (was 1:1).
          score+=pts;coins+=Math.max(1,Math.floor(pts*0.5));
          collectCombo++;collectTimer=0.8;
          if(totalMult>1||collectCombo%3===0)addScorePopup(f.x,f.y,'+'+pts,inZone?'#ffd600':(comboMult>1?'#ffd600':f.color));
          sndCollect();postMsg({type:'HAPTIC',data:'light'});
        }
        spawnP(f.x,f.y,f.color,3,60,2);foods.splice(i,1);
      }
    }
    // Powerups
    for(let i=powerups.length-1;i>=0;i--){
      const pu=powerups[i];
      if(dist(head,pu)<hr+15){
        s.powerups[pu.type]=PU_DUR[pu.type];
        if(s.isPlayer){sndPowerup();postMsg({type:'HAPTIC',data:'light'});}
        spawnP(pu.x,pu.y,PU_COLORS[pu.type],10,100,3);powerups.splice(i,1);
      }
    }
  }
}

function killSnake(victim,killer,cause){
  if(!victim.alive)return;
  victim.alive=false;
  // Defensive: clear transient flags so a respawning bot can't inherit
  // boost/joystick state from its previous life.
  victim.boosting=false;
  // Hit-pause when the player is on either side of the kill (D3): tiny
  // freeze that makes every meaningful collision feel like it landed.
  if(victim.isPlayer||(killer&&killer.isPlayer))hitPauseTimer=0.06;
  for(let i=0;i<victim.segments.length;i+=3){
    const seg=victim.segments[i];
    spawnFood(seg.x+rand(-10,10),seg.y+rand(-10,10),2,SKINS[victim.skin].c[0],true);
  }
  if(killer&&killer.alive){
    killer.killCount++;killer.score+=100;
    if(killer.isPlayer){
      // Kill coin reward halved as part of the economy nerf.
      score+=100;coins+=12;totalKills++;sndKill();postMsg({type:'HAPTIC',data:'medium'});
      addScorePopup(victim.segments[0].x,victim.segments[0].y,'+100','#ff1744');
      if(victim.length>killer.length){const bonus=Math.min((victim.length-killer.length)*2,500);score+=bonus;coins+=Math.ceil(bonus/6);flashAlpha=0.25;flashColor='#ff1744';addScorePopup(victim.segments[0].x,victim.segments[0].y-25,'+'+bonus+' BIG','#ffd600');}
      spawnP(victim.segments[0].x,victim.segments[0].y,SKINS[victim.skin].c[0],20,120,3);
    }
    if(victim.isKing&&killer.isPlayer){
      score+=500;coins+=80;sndKingSlain();postMsg({type:'HAPTIC',data:'heavy'});
      flashAlpha=0.3;flashColor='#ffd600';nextKingScore=score+2000;
    }
    if(victim.isBoss&&killer.isPlayer){
      score+=BOSS_SCORE_REWARD;coins+=BOSS_COIN_REWARD;sndKingSlain();
      postMsg({type:'HAPTIC',data:'heavy'});
      flashAlpha=0.5;flashColor='#ffd600';shakeTimer=0.35;shakeMag=8;
      addScorePopup(victim.segments[0].x,victim.segments[0].y-30,'+'+BOSS_SCORE_REWARD+' BOSS','#ffd600');
      showToast(isTR?'BOSS YENİLDİ! +'+BOSS_COIN_REWARD+' 🪙':'BOSS DEFEATED! +'+BOSS_COIN_REWARD+' 🪙','success');
    }
  }
  if(victim.isKing){kingActive=false;if(!nextKingScore||nextKingScore<=score)nextKingScore=score+2000;}
  if(victim.isBoss){bossActive=false;if(!nextBossScore||nextBossScore<=score)nextBossScore=score+5000;}
  if(victim.isPlayer){
    sndDeath();postMsg({type:'HAPTIC',data:'heavy'});
    flashAlpha=0.4;flashColor='#ff1744';shakeTimer=0.3;shakeMag=8;
    killerName=killer?killer.name:(cause==='boundary'?'the boundary':'unknown');
    deathCount++;saveHS();saveStats();saveCoins();addTopScore(score);checkUnlocks();saveSkins();
    state='dead';
    resetTouchState();
    // Defensive: if a King was alive at the moment of death, clear the flag so
    // a stale snakes[] entry can't be misinterpreted by the next game's logic.
    // (snakes[] is fully reset by startGame, but state==='dead' still ticks
    // some banners and we want kingToast to settle to a clean baseline.)
    kingActive=false;kingToast=0;bossActive=false;bossToast=0;
    // Death cam: kick off the zoom-in + fade-in window (D4).
    deathCamTimer=DEATH_CAM_S;
    // Smart interstitial trigger: every 3rd death AND score > 50 AND tutorial not active.
    // Native side also enforces a 60s cooldown; this guards against ad fatigue early on.
    if(!showTutorial&&deathCount>=3&&deathCount%3===0&&score>=50)postMsg({type:'SHOW_INTERSTITIAL'});
  }else{victim.respawnTimer=rand(3,6);}
}

function revivePlayer(){
  if(!player)return;
  player.alive=true;player.length=Math.max(10,Math.floor(player.length*0.7));
  // Rebuild a body trailing behind the head along the current facing angle,
  // instead of stacking every segment on the head and letting them fan out
  // in the first frame (visible "snake spawned in a single point" glitch).
  const hx=player.segments[0].x,hy=player.segments[0].y,a=player.angle;
  const segs=[{x:hx,y:hy}];
  for(let i=1;i<player.length;i++){
    segs.push({x:hx-Math.cos(a)*SEG_DIST*i,y:hy-Math.sin(a)*SEG_DIST*i});
  }
  player.segments=segs;
  // Reset path history so the new body trail starts from the revive point.
  player.pathHistory=[];player._lastHX=hx;player._lastHY=hy;
  player.invulnTimer=3;player.boosting=false;
  for(const k of PU_TYPES)player.powerups[k]=0;
  state='playing';
  resetTouchState();
}

// ═══ BOT AI (stage-aware) ═══
function updateBot(bot,dt){
  if(!bot.alive||bot.isPlayer)return;
  const stage=currentBotStage();
  bot.aiTimer-=dt;if(bot.aiTimer>0)return;
  // Smarter bots think more often
  bot.aiTimer=(0.12+rand(0,0.08))*stage.reactMul/Math.max(0.6,bot.skill);

  const head=bot.segments[0];
  // Sight scales with stage
  const sight=500*stage.sightMul;
  const sightSmall=600*stage.sightMul;
  const sightBig=300*stage.sightMul;

  let nearFood=null,nfD=Infinity;
  for(const f of foods){const d=dist(head,f);if(d<nfD&&d<sight){nfD=d;nearFood=f;}}
  let nearSmall=null,nearBig=null,nsD=Infinity,nbD=Infinity;
  for(const s of snakes){
    if(s===bot||!s.alive)continue;const d=dist(head,s.segments[0]);
    if(s.length<bot.length*0.8&&d<nsD){nsD=d;nearSmall=s;}
    if(s.length>bot.length*1.2&&d<nbD){nbD=d;nearBig=s;}
  }

  // Avoid the wall — look-ahead version: project where the head will be in
  // ~0.4s and steer if THAT point is past the safety ring, not just the
  // current one. Smarter bots steer earlier and don't hug the boundary.
  const bDist=dist(head,{x:WCX,y:WCY});
  if(bDist>WR-220){bot.targetAngle=angleTo(head,{x:WCX,y:WCY});bot.boosting=false;return;}
  const lookT=0.4;
  const px=head.x+Math.cos(bot.angle)*bot.speed*lookT;
  const py=head.y+Math.sin(bot.angle)*bot.speed*lookT;
  if(dist({x:px,y:py},{x:WCX,y:WCY})>WR-150){
    bot.targetAngle=angleTo({x:px,y:py},{x:WCX,y:WCY});
    bot.boosting=false;
    return;
  }

  // Panic flee: if a much bigger snake's head is close and we still have
  // some body to spend, flee away with boost regardless of personality.
  if(nearBig&&nbD<240&&bot.length>14){
    bot.targetAngle=angleTo(nearBig.segments[0],head);
    bot.boosting=true;
    return;
  }

  // Avoid the player's body too (smarter bots steer around it)
  if(player&&player.alive&&player.segments.length>5){
    let bodyHit=null,bhD=Infinity;
    for(let i=4;i<player.segments.length;i+=2){
      const seg=player.segments[i];const d=dist(head,seg);
      if(d<60+stage.aggression*40&&d<bhD){bhD=d;bodyHit=seg;}
    }
    if(bodyHit){
      const a=angleTo(bodyHit,head);
      bot.targetAngle=a+(Math.random()<0.5?PI/2:-PI/2)*0.5;
      return;
    }
  }

  // Maybe boost-attack if the stage permits and a small target is close
  const useBoost=Math.random()<stage.boostMul*bot.skill;

  switch(bot.personality){
    case 'collector':
      if(nearBig&&nbD<sightBig){bot.targetAngle=angleTo(nearBig.segments[0],head);bot.boosting=false;break;}
      if(nearFood){bot.targetAngle=angleTo(head,nearFood);break;}
      bot.targetAngle+=rand(-0.5,0.5);bot.boosting=false;break;
    case 'aggressive':
      if(nearBig&&nbD<sightBig*0.85){bot.targetAngle=angleTo(nearBig.segments[0],head);bot.boosting=false;break;}
      if(nearSmall&&nsD<sightSmall){
        const t=nsD/Math.max(80,bot.speed);
        const px=nearSmall.segments[0].x+Math.cos(nearSmall.angle)*nearSmall.speed*t*0.55;
        const py=nearSmall.segments[0].y+Math.sin(nearSmall.angle)*nearSmall.speed*t*0.55;
        bot.targetAngle=angleTo(head,{x:px,y:py});
        bot.boosting=useBoost&&nsD<260&&bot.length>16;break;
      }
      if(nearFood)bot.targetAngle=angleTo(head,nearFood);else bot.targetAngle+=rand(-0.3,0.3);
      bot.boosting=false;break;
    case 'coiler':
      if(nearSmall&&nsD<sightSmall*0.7){
        const orbitD=110+nearSmall.length*0.3;
        const a=angleTo(head,nearSmall.segments[0]);
        bot.targetAngle=dist(head,nearSmall.segments[0])>orbitD+50?a:a+PI/2;
        bot.boosting=useBoost&&nsD<140;break;
      }
      if(nearFood)bot.targetAngle=angleTo(head,nearFood);else bot.targetAngle+=rand(-0.4,0.4);
      bot.boosting=false;break;
    case 'ambush':
      if(nearSmall&&nsD<sightSmall*0.45){
        bot.targetAngle=angleTo(head,nearSmall.segments[0]);
        bot.boosting=useBoost&&bot.length>18;break;
      }
      bot.boosting=false;
      if(nearFood&&nfD<sight*0.6)bot.targetAngle=angleTo(head,nearFood);else bot.targetAngle+=rand(-0.2,0.2);break;
  }
}

// ═══ SKIN UNLOCKS ═══
function checkUnlocks(){
  const prev=unlockedSkins.length;let lastName='';
  for(let i=0;i<SKINS.length;i++){
    if(unlockedSkins.includes(i))continue;
    const u=SKINS[i].u;if(u==='free'){unlockedSkins.push(i);lastName=SKINS[i].name;continue;}
    const t=u[0],v=parseInt(u.slice(1));
    let ok=false;
    if(t==='s'&&score>=v)ok=true;
    if(t==='k'&&totalKills>=v)ok=true;
    if(t==='l'&&player&&player.length>=v)ok=true;
    if(t==='g'&&totalGames>=v)ok=true;
    if(ok){unlockedSkins.push(i);lastName=SKINS[i].name;}
  }
  if(unlockedSkins.length>prev){saveSkins();if(lastName){unlockToast=3;unlockToastName=lastName;sndPowerup();}}
}

// ═══ ZONE UPDATE ═══
function updateZone(){
  if(!player)return;
  let z=ZONES[0];for(const zn of ZONES)if(player.length>=zn.min)z=zn;
  if(z.bg!==targetZoneBg){targetZoneBg=z.bg;targetZoneAccent=z.accent;sndZone();flashAlpha=0.35;flashColor=z.accent;postMsg({type:'HAPTIC',data:'medium'});}
  zoneBg=lerpColor(zoneBg,targetZoneBg,0.02);
  zoneAccent=lerpColor(zoneAccent,targetZoneAccent,0.02);
}

// ═══ GAME INIT ═══
function startGame(){
  initAudio();score=0;collectCombo=0;collectTimer=0;
  foods=[];powerups=[];particles=[];snakes=[];scorePopups=[];
  kingActive=false;nextKingScore=2000;
  bossActive=false;nextBossScore=5000;bossToast=0;
  spawnComboZones(true); // silent on first spawn — no "moved" toast at game start
  spawnInitialFood();
  // Player starts with extra length so they have a real "boost reserve" up front.
  // Lock initial heading to "up" instead of random so the snake doesn't drift
  // in an unexpected direction during the spawn-protection window.
  player=createSnake(true,WCX,WCY,currentSkin);
  player.length=22;player.invulnTimer=2.5;
  player.angle=-PI/2;player.targetAngle=-PI/2;
  // Re-anchor the body trail so the visible segments line up behind the head
  // along the new facing — otherwise the random initial trail drawn by
  // createSnake stays one frame before physics catches up.
  for(let i=0;i<player.segments.length;i++){
    player.segments[i].x=WCX-Math.cos(player.angle)*SEG_DIST*i;
    player.segments[i].y=WCY-Math.sin(player.angle)*SEG_DIST*i;
  }
  snakes.push(player);
  for(let i=0;i<MAX_BOTS;i++){
    const sp=pickSafeBotSpawn(500);
    const b=createSnake(false,sp.x,sp.y);b.length=randInt(10,40);snakes.push(b);
  }
  for(let i=0;i<50;i++){const a=rand(0,TAU),r=rand(30,200);spawnFood(WCX+Math.cos(a)*r,WCY+Math.sin(a)*r,1);}
  camera.x=WCX;camera.y=WCY;camera.zoom=1;
  state='playing';totalGames++;playTime=0;coinsAtStart=coins;saveStats();
  lastBotStageMin=BOT_STAGES[0].min;
  hitPauseTimer=0;deathCamTimer=0;
  // Reset zone colours to ZONES[0] so a fresh run doesn't trigger a "new
  // zone entered" flash on the first frame just because the last run had
  // already reached a deeper zone.
  const z0=ZONES[0];
  zoneBg=z0.bg;targetZoneBg=z0.bg;
  zoneAccent=z0.accent;targetZoneAccent=z0.accent;
  resetTouchState();
}

// ═══ UPDATE ═══
function update(dt){
  gdt=dt;frameCount++;
  if(flashAlpha>0)flashAlpha-=dt*2;
  if(shakeTimer>0)shakeTimer-=dt;
  if(collectTimer>0){collectTimer-=dt;if(collectTimer<=0)collectCombo=0;}
  if(unlockToast>0)unlockToast-=dt;
  if(dailyToast>0&&!showTutorial)dailyToast-=dt;
  if(quitConfirmTimer>0)quitConfirmTimer-=dt;
  if(kingToast>0&&state==='playing')kingToast-=dt;
  if(bossToast>0&&state==='playing')bossToast-=dt;
  if(deathCamTimer>0)deathCamTimer-=dt;
  updateToasts(dt);
  if(state!=='playing')return;
  // Hit-pause: render keeps running (camera shake / death flash stay
  // animated) but physics + AI freeze for ~60ms after a player kill or
  // player death, giving the moment a beat of weight.
  if(hitPauseTimer>0){hitPauseTimer-=dt;return;}
  playTime+=dt;
  unlockCheckTimer-=dt;if(unlockCheckTimer<=0){unlockCheckTimer=1.5;checkUnlocks();checkBotStageTransition();}
  // 1) AI decisions once per frame (full dt for stable timer accumulation)
  //    Entry-guard: skip whole call if bot's think timer hasn't elapsed —
  //    saves a function call per bot per frame (~720 calls/s saved at 12 bots * 60fps).
  for(const s of snakes){
    if(s.isPlayer||!s.alive)continue;
    if(s.aiTimer>0){s.aiTimer-=dt;continue;}
    updateBot(s,dt);
  }
  // 2) Substepped physics + collisions to prevent tunneling at high speed
  //    (boost + speed power-up can push speed past one body radius per frame).
  let vmax=BASE_SPEED;
  for(const s of snakes){
    if(!s.alive)continue;
    let v=s.speed;
    if(s.boosting)v*=2;
    if(s.powerups.speed>0)v*=1.8;
    if(v>vmax)vmax=v;
  }
  // Step at most half a body-segment per substep (~4px). Cap at 4 substeps so a
  // single dropped frame can't blow up the cost.
  const subSteps=Math.max(1,Math.min(4,Math.ceil(vmax*dt/(SEG_DIST*0.5))));
  const sdt=dt/subSteps;
  for(let st=0;st<subSteps;st++){
    gdt=sdt;
    if(player&&player.alive)updateSnake(player,sdt);
    for(const s of snakes)if(!s.isPlayer&&s.alive)updateSnake(s,sdt);
    checkCollisions();
  }
  gdt=dt;
  updateParticles(dt);updateScorePopups(dt);
  foodSpawnTimer-=dt;if(foodSpawnTimer<=0){foodSpawnTimer=0.2;spawnFood();}
  puSpawnTimer-=dt;if(puSpawnTimer<=0){puSpawnTimer=5;spawnPowerup();}
  // Combo zones drift to a fresh pair every COMBO_ZONE_INTERVAL seconds.
  comboZoneTimer-=dt;if(comboZoneTimer<=0)spawnComboZones(false);
  // Respawn bots
  for(let i=snakes.length-1;i>=0;i--){
    const s=snakes[i];
    if(!s.alive&&!s.isPlayer){s.respawnTimer-=dt;if(s.respawnTimer<=0){
      snakes.splice(i,1);
      const sp=pickSafeBotSpawn(450);
      const nb=createSnake(false,sp.x,sp.y);
      nb.length=randInt(10,30+Math.floor(score/200));
      snakes.push(nb);
    }}
  }
  // King
  if(!kingActive&&score>=nextKingScore){
    kingActive=true;sndKing();
    const ksp=pickSafeBotSpawn(600);
    const k=createSnake(false,ksp.x,ksp.y);k.name='KING';k.isKing=true;k.length=200+Math.floor(score/50);
    k.personality='aggressive';k.skin=randInt(0,4);snakes.push(k);
    kingToast=3.5;flashAlpha=0.35;flashColor='#ffd600';shakeTimer=0.3;shakeMag=6;postMsg({type:'HAPTIC',data:'heavy'});
  }
  // Boss (D1) — rarer, every 5k score, length 300+, +30% speed, big rewards.
  if(!bossActive&&score>=nextBossScore){
    bossActive=true;sndKingSlain(); // dramatic chord, reused
    const bsp=pickSafeBotSpawn(700);
    const b=createSnake(false,bsp.x,bsp.y);b.name='BOSS';b.isBoss=true;b.length=300+Math.floor(score/120);
    b.personality='aggressive';b.skin=BOSS_SKIN_IDX;b.skill=1.0; // Blood skin, max skill
    snakes.push(b);
    bossToast=4;flashAlpha=0.45;flashColor='#ff1744';shakeTimer=0.45;shakeMag=9;
    postMsg({type:'HAPTIC',data:'heavy'});
    showToast(isTR?'⚠ BOSS GELDİ!':'⚠ BOSS INCOMING!','error');
  }
  // Camera
  if(player&&player.alive){
    camera.x=lerp(camera.x,player.segments[0].x,0.08);
    camera.y=lerp(camera.y,player.segments[0].y,0.08);
    // Smooth power-curve auto-zoom: 1.0 (small) → 0.45 (very long). Faster early, plateaus.
    const t=Math.min(1,player.length/800);
    const targetZoom=1.0-(1-Math.pow(1-t,1.6))*0.55;
    camera.zoom=lerp(camera.zoom,targetZoom,0.025);
  }
  updateZone();
  if(player&&player.alive&&player.boosting){const tail=player.segments[player.segments.length-1];spawnP(tail.x,tail.y,SKINS[player.skin].c[0],1,40,2);}
}

// ═══ RENDER ═══
function render(){
  ctx.setTransform(dpr,0,0,dpr,0,0);
  ctx.fillStyle=zoneBg;ctx.fillRect(0,0,W,H);
  if(state==='playing'||state==='dead'||state==='paused'){
    // Death cam: while the timer is running, ease the zoom up to ~1.25× over
    // the window so the moment of death feels heavier before the death screen
    // takes over. Cube-easing (1 - (1-t)^3) ramps fast then settles.
    let zoom=camera.zoom;
    if(state==='dead'&&deathCamTimer>0){
      const tProg=1-(deathCamTimer/DEATH_CAM_S);
      const eased=1-(1-tProg)*(1-tProg)*(1-tProg);
      zoom=camera.zoom*(1+0.25*eased);
    }
    const sx=shakeTimer>0?rand(-shakeMag,shakeMag):0,sy=shakeTimer>0?rand(-shakeMag,shakeMag):0;
    ctx.save();ctx.translate(W/2+sx,H/2+sy);ctx.scale(zoom,zoom);ctx.translate(-camera.x,-camera.y);
    drawGrid();drawStars();drawBoundary();drawComboZones();drawFood();drawPowerups();
    // Z-sort snakes: smaller bots first, bigger bots above; player always on top.
    const liveBots=snakes.filter(s=>s.alive&&!s.isPlayer).sort((a,b)=>a.length-b.length);
    for(const s of liveBots)drawSnake(s);
    if(player&&player.alive)drawSnake(player);
    drawParticles();drawScorePopups();ctx.restore();
    drawHUD();drawMinimap();
    if(joystick.active&&state==='playing')drawJoystick();
    if(state==='playing'){drawBoostFuel();drawPauseBtn();}
  }
  if(state==='menu'){drawMenu();if(!showTutorial&&!showSettings&&dailyToast>0)drawDailyToast();if(showSettings)drawSettingsOverlay();}
  if(state==='dead')drawDeathScreen();
  if(state==='paused')drawPauseScreen();
  if(state==='skinselect')drawSkinSelect();
  if(state==='leaderboard')drawLeaderboard();
  // Tutorial overlay renders on top of menu / pause / playing only — never
  // over the death screen, where it would just confuse the player.
  if(showTutorial&&state!=='dead')drawTutorial();
  if(flashAlpha>0){ctx.fillStyle=flashColor;ctx.globalAlpha=flashAlpha;ctx.fillRect(0,0,W,H);ctx.globalAlpha=1;}
  drawToasts();
  if(unlockToast>0&&(state==='playing'||state==='paused')){
    const a=Math.min(unlockToast,1),ty=sat+120;
    ctx.globalAlpha=a;ctx.textAlign='center';
    ctx.fillStyle='rgba(0,0,0,0.7)';rr(W/2-140,ty-28,280,52,12);ctx.fill();
    ctx.fillStyle='#ffd600';ctx.shadowColor='#ffd600';ctx.shadowBlur=12;
    ctx.font='900 14px Orbitron';ctx.fillText(L.skinUnlocked,W/2,ty-6);ctx.shadowBlur=0;
    ctx.fillStyle='#fff';ctx.font='700 16px Rajdhani';ctx.fillText(unlockToastName,W/2,ty+16);
    ctx.globalAlpha=1;ctx.textAlign='left';
  }
}

// ═══ DRAW HELPERS ═══
function drawGrid(){
  ctx.strokeStyle='rgba(255,255,255,0.025)';ctx.lineWidth=1;
  const gs=100;
  const x1=Math.floor((camera.x-W/2/camera.zoom)/gs)*gs,x2=Math.ceil((camera.x+W/2/camera.zoom)/gs)*gs;
  const y1=Math.floor((camera.y-H/2/camera.zoom)/gs)*gs,y2=Math.ceil((camera.y+H/2/camera.zoom)/gs)*gs;
  ctx.beginPath();
  for(let x=x1;x<=x2;x+=gs){ctx.moveTo(x,y1);ctx.lineTo(x,y2);}
  for(let y=y1;y<=y2;y+=gs){ctx.moveTo(x1,y);ctx.lineTo(x2,y);}
  ctx.stroke();
}
// Drifting parallax stars: a small persistent set of slow points scattered
// across the world. They tint with the current zone accent so each biome
// reads differently. Cheap (~80 dots) and stays under 1ms render.
const BG_STARS = [];
const BG_STAR_COUNT = 80;
(function seedStars(){
  for(let i=0;i<BG_STAR_COUNT;i++){
    BG_STARS.push({
      x:rand(0,WS),y:rand(0,WS),
      r:rand(0.6,2.2),
      a:rand(0.18,0.55),
      tw:rand(0,TAU), // twinkle phase
      tws:rand(0.5,2.0), // twinkle speed
      vx:rand(-3,3),vy:rand(-3,3) // very slow drift
    });
  }
})();
function drawStars(){
  // Cull to viewport with a margin so stars at edges still appear.
  const vx1=camera.x-W/2/camera.zoom-50,vx2=camera.x+W/2/camera.zoom+50;
  const vy1=camera.y-H/2/camera.zoom-50,vy2=camera.y+H/2/camera.zoom+50;
  ctx.fillStyle=zoneAccent;
  for(let i=0;i<BG_STARS.length;i++){
    const s=BG_STARS[i];
    // Drift + wrap inside the world
    s.x+=s.vx*gdt;s.y+=s.vy*gdt;
    if(s.x<0)s.x+=WS;else if(s.x>WS)s.x-=WS;
    if(s.y<0)s.y+=WS;else if(s.y>WS)s.y-=WS;
    if(s.x<vx1||s.x>vx2||s.y<vy1||s.y>vy2)continue;
    s.tw+=s.tws*gdt;
    const a=s.a*(0.6+0.4*Math.sin(s.tw));
    ctx.globalAlpha=a;
    ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,TAU);ctx.fill();
  }
  ctx.globalAlpha=1;
}
function drawBoundary(){
  ctx.beginPath();ctx.arc(WCX,WCY,WR,0,TAU);
  ctx.strokeStyle='rgba(255,50,50,0.15)';ctx.lineWidth=4;ctx.stroke();
  ctx.strokeStyle='rgba(255,50,50,0.06)';ctx.lineWidth=20;ctx.stroke();
}
function drawFood(){
  // Dropped per-food shadowBlur (was 6 with on/off per pellet × ~600 visible
  // foods = the biggest draw-op contributor). Pellets are 4-5 px and barely
  // showed the glow anyway; this is a major thermal/perf win on iPhone.
  const vx1=camera.x-W/2/camera.zoom-20,vx2=camera.x+W/2/camera.zoom+20;
  const vy1=camera.y-H/2/camera.zoom-20,vy2=camera.y+H/2/camera.zoom+20;
  for(const f of foods){
    if(f.x<vx1||f.x>vx2||f.y<vy1||f.y>vy2)continue;
    f.pulse+=0.05;const r=f.r+Math.sin(f.pulse)*1;
    ctx.fillStyle=f.color;
    ctx.beginPath();ctx.arc(f.x,f.y,r,0,TAU);ctx.fill();
  }
}
function drawPowerups(){
  const vx1=camera.x-W/2/camera.zoom-30,vx2=camera.x+W/2/camera.zoom+30;
  const vy1=camera.y-H/2/camera.zoom-30,vy2=camera.y+H/2/camera.zoom+30;
  for(const pu of powerups){
    if(pu.x<vx1||pu.x>vx2||pu.y<vy1||pu.y>vy2)continue;
    pu.pulse+=0.04;const r=12+Math.sin(pu.pulse)*3;
    ctx.save();ctx.translate(pu.x,pu.y);ctx.rotate(pu.pulse*0.5);
    ctx.fillStyle=PU_COLORS[pu.type];ctx.shadowColor=PU_COLORS[pu.type];ctx.shadowBlur=15;
    if(pu.type==='speed'){ctx.beginPath();for(let i=0;i<6;i++){const a=i*PI/3-PI/6;ctx.lineTo(Math.cos(a)*r,Math.sin(a)*r);}ctx.closePath();ctx.fill();}
    else if(pu.type==='shield'){ctx.beginPath();ctx.arc(0,0,r,0,TAU);ctx.fill();}
    else if(pu.type==='magnet'){ctx.beginPath();for(let i=0;i<10;i++){const a=i*PI/5-PI/2;const d=i%2===0?r:r/2;ctx.lineTo(Math.cos(a)*d,Math.sin(a)*d);}ctx.closePath();ctx.fill();}
    else{ctx.beginPath();ctx.moveTo(0,-r);ctx.lineTo(r*0.6,0);ctx.lineTo(0,r);ctx.lineTo(-r*0.6,0);ctx.closePath();ctx.fill();}
    ctx.shadowBlur=0;ctx.restore();
    ctx.fillStyle='#fff';ctx.font='bold 8px Rajdhani';ctx.textAlign='center';
    ctx.fillText(pu.type.toUpperCase(),pu.x,pu.y+r+12);
  }
}

function drawSnake(s){
  const skin=SKINS[s.skin];
  const segs=s.segments;
  const segLen=segs.length;
  const denom=Math.max(1,segLen-1);
  const w=6+Math.min(segLen*0.03,14);
  const halfW=w/2;
  if(s.powerups.ghost>0)ctx.globalAlpha=0.4;
  if(s.invulnTimer>0&&Math.floor(s.invulnTimer*10)%2===0)ctx.globalAlpha=0.3;
  // Outline pass — fillStyle set once for the whole pass (was per-segment).
  ctx.shadowBlur=0;
  ctx.fillStyle='rgba(0,0,0,0.35)';
  for(let i=segLen-1;i>=0;i--){
    const seg=segs[i];const t=1-i/denom;
    const r=halfW*(0.55+t*0.45)+1.2;
    ctx.beginPath();ctx.arc(seg.x,seg.y,r,0,TAU);ctx.fill();
  }
  // Fill pass with skin colours.
  for(let i=segLen-1;i>=0;i--){
    const seg=segs[i];const t=1-i/denom;
    const r=halfW*(0.55+t*0.45);let color;
    if(skin.p==='rainbow')color=hsl((i*8+frameCount*2)%360,80,60);
    else if(skin.p==='striped')color=((i/3)|0)%2===0?skin.c[0]:skin.c[1];
    else color=lerpColor(skin.c[1],skin.c[0],t);
    ctx.fillStyle=color;
    if(i===0){ctx.shadowColor=skin.c[0];ctx.shadowBlur=skin.p==='neon'?22:14;}
    ctx.beginPath();ctx.arc(seg.x,seg.y,r,0,TAU);ctx.fill();
    if(i===0)ctx.shadowBlur=0;
    if(skin.p==='dotted'&&i%4===0&&i>0){ctx.fillStyle='rgba(255,255,255,0.35)';ctx.beginPath();ctx.arc(seg.x,seg.y,r*0.4,0,TAU);ctx.fill();}
  }
  // Shield aura
  if(s.powerups.shield>0){ctx.strokeStyle='rgba(64,196,255,0.4)';ctx.lineWidth=3;ctx.shadowColor='#40c4ff';ctx.shadowBlur=10;ctx.beginPath();ctx.arc(s.segments[0].x,s.segments[0].y,w/2+6,0,TAU);ctx.stroke();ctx.shadowBlur=0;}
  // Magnet range (player only — hint)
  if(s.isPlayer&&s.powerups.magnet>0){ctx.strokeStyle='rgba(118,255,3,0.18)';ctx.lineWidth=1;ctx.setLineDash([6,6]);ctx.beginPath();ctx.arc(s.segments[0].x,s.segments[0].y,200,0,TAU);ctx.stroke();ctx.setLineDash([]);}
  // Eyes
  const head=s.segments[0];const eyeD=w/4,eyeR=w/6;
  const ex1=head.x+Math.cos(s.angle-0.4)*eyeD,ey1=head.y+Math.sin(s.angle-0.4)*eyeD;
  const ex2=head.x+Math.cos(s.angle+0.4)*eyeD,ey2=head.y+Math.sin(s.angle+0.4)*eyeD;
  ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(ex1,ey1,eyeR,0,TAU);ctx.fill();ctx.beginPath();ctx.arc(ex2,ey2,eyeR,0,TAU);ctx.fill();
  ctx.fillStyle='#111';
  ctx.beginPath();ctx.arc(ex1+Math.cos(s.angle)*eyeR*0.4,ey1+Math.sin(s.angle)*eyeR*0.4,eyeR*0.5,0,TAU);ctx.fill();
  ctx.beginPath();ctx.arc(ex2+Math.cos(s.angle)*eyeR*0.4,ey2+Math.sin(s.angle)*eyeR*0.4,eyeR*0.5,0,TAU);ctx.fill();
  // King crown
  if(s.isKing){ctx.fillStyle='#ffd600';ctx.shadowColor='#ffd600';ctx.shadowBlur=10;const cx=head.x,cy=head.y-w/2-2;ctx.beginPath();ctx.moveTo(cx-6,cy+4);ctx.lineTo(cx-6,cy-2);ctx.lineTo(cx-3,cy+1);ctx.lineTo(cx,cy-4);ctx.lineTo(cx+3,cy+1);ctx.lineTo(cx+6,cy-2);ctx.lineTo(cx+6,cy+4);ctx.closePath();ctx.fill();ctx.shadowBlur=0;}
  // Boss aura: pulsating red halo + skull mark above the head.
  if(s.isBoss){
    const bp=0.5+0.5*Math.sin(frameCount*0.12);
    ctx.strokeStyle='rgba(255,23,68,'+(0.35+bp*0.45)+')';
    ctx.lineWidth=3+bp*3;
    ctx.shadowColor='#ff1744';ctx.shadowBlur=18;
    ctx.beginPath();ctx.arc(head.x,head.y,w/2+10+bp*6,0,TAU);ctx.stroke();
    ctx.shadowBlur=0;
    // Skull mark
    ctx.fillStyle='#ff1744';ctx.font='900 14px Orbitron';ctx.textAlign='center';
    ctx.fillText('☠',head.x,head.y-w/2-12);ctx.textAlign='left';
  }
  // Name
  ctx.fillStyle='rgba(255,255,255,0.7)';ctx.font='bold 10px Rajdhani';ctx.textAlign='center';
  ctx.fillText(s.name,head.x,head.y-w/2-8);
  ctx.fillStyle='rgba(255,255,255,0.4)';ctx.font='600 8px Rajdhani';
  ctx.fillText(s.length,head.x,head.y-w/2-18);
  ctx.globalAlpha=1;ctx.textAlign='left';
}

function rr(x,y,w,h,r){ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();}

let mmC=null;
function drawMinimap(){
  const sz=90,mx=W-sz-12,my=sat+8,sc=sz/WS;
  if(!mmC){mmC=document.createElement('canvas');mmC.width=sz*2;mmC.height=sz*2;}
  // Throttle expensive offscreen redraw to ~15fps; blit cached image every frame.
  if(frameCount%4===0){
    const mc=mmC.getContext('2d');mc.setTransform(2,0,0,2,0,0);mc.clearRect(0,0,sz,sz);
    mc.fillStyle='rgba(0,0,0,0.5)';mc.fillRect(0,0,sz,sz);
    mc.strokeStyle='rgba(255,255,255,0.1)';mc.lineWidth=1;mc.beginPath();mc.arc(sz/2,sz/2,WR*sc,0,TAU);mc.stroke();
    mc.fillStyle='rgba(100,255,100,0.2)';for(let i=0;i<foods.length;i+=10){const f=foods[i];mc.fillRect(f.x*sc,f.y*sc,1,1);}
    for(const s of snakes){
      if(!s.alive)continue;
      const hx=s.segments[0].x*sc,hy=s.segments[0].y*sc;
      mc.fillStyle=s.isPlayer?'#00e5ff':(s.isKing?'#ffd600':SKINS[s.skin].c[0]);
      if(s.isPlayer){
        const a=s.angle,tr=5;
        mc.beginPath();
        mc.moveTo(hx+Math.cos(a)*tr,hy+Math.sin(a)*tr);
        mc.lineTo(hx+Math.cos(a+2.5)*tr,hy+Math.sin(a+2.5)*tr);
        mc.lineTo(hx+Math.cos(a-2.5)*tr,hy+Math.sin(a-2.5)*tr);
        mc.closePath();mc.fill();
      }else{
        mc.beginPath();mc.arc(hx,hy,s.isKing?2.5:1.5,0,TAU);mc.fill();
      }
    }
    mc.strokeStyle='rgba(255,255,255,0.15)';mc.lineWidth=1;mc.strokeRect(0,0,sz,sz);
  }
  ctx.drawImage(mmC,0,0,sz*2,sz*2,mx,my,sz,sz);
}

  const cardW=Math.min(340,W-32),cardX=W/2-cardW/2;

  const startY=oy+uh*0.21;

  for(let i=0;i<TUT_CARDS.length;i++){

    const cy=startY+i*(cardH+8);
    if(cy+cardH>H-sab-60)break;
    // Card background
    ctx.fillStyle='rgba(255,255,255,0.04)';rr(cardX,cy,cardW,cardH,14);ctx.fill();
    ctx.strokeStyle=c.color+'66';ctx.lineWidth=1.5;rr(cardX,cy,cardW,cardH,14);ctx.stroke();
    // Icon circle (animated for boost)
    const iconR=cardH*0.32;
    const ix=cardX+iconR+18,iy=cy+cardH/2;
    if(c.animated){
      ctx.strokeStyle=c.color+Math.floor((0.3+(1-pulse)*0.5)*255).toString(16).padStart(2,'0');
      ctx.lineWidth=2.5;
      ctx.beginPath();ctx.arc(ix,iy,iconR+pulse*8,0,TAU);ctx.stroke();
    }
    ctx.fillStyle=c.color;ctx.shadowColor=c.color;ctx.shadowBlur=12;
    ctx.beginPath();ctx.arc(ix,iy,iconR,0,TAU);ctx.fill();ctx.shadowBlur=0;
    ctx.fillStyle='#0a0a1a';ctx.font='900 '+Math.floor(iconR*1.05)+'px Orbitron';
    ctx.textBaseline='middle';ctx.textAlign='center';
    ctx.fillText(c.icon,ix,iy+1);ctx.textBaseline='alphabetic';
    // Title + desc
    ctx.textAlign='left';
    ctx.fillStyle=c.color;ctx.font='900 14px Orbitron';
    ctx.fillText(c.title,cardX+iconR*2+30,cy+cardH*0.42);
    ctx.fillStyle='rgba(255,255,255,0.78)';ctx.font='600 12px Rajdhani';
    ctx.fillText(c.desc,cardX+iconR*2+30,cy+cardH*0.72);
  }
  // Tap to continue (pulsing)
  const tapAlpha=0.55+0.35*Math.sin(frameCount*0.1);

// ═══ MENU ═══
// Pre-render the static background grid to an offscreen canvas. The grid
// only depends on W/H/dpr, so we redraw it lazily when those change.
let menuBgC=null,menuBgW=0,menuBgH=0,menuBgDpr=0;
function ensureMenuBg(){
  if(menuBgC&&menuBgW===W&&menuBgH===H&&menuBgDpr===dpr)return;
  menuBgC=document.createElement('canvas');
  menuBgC.width=Math.ceil(W*dpr);menuBgC.height=Math.ceil(H*dpr);
  const mc=menuBgC.getContext('2d');mc.setTransform(dpr,0,0,dpr,0,0);
  mc.fillStyle='#0a0a1a';mc.fillRect(0,0,W,H);
  mc.strokeStyle='rgba(255,255,255,0.02)';mc.lineWidth=1;
  mc.beginPath();
  for(let x=0;x<W;x+=40){mc.moveTo(x,0);mc.lineTo(x,H);}
  for(let y=0;y<H;y+=40){mc.moveTo(0,y);mc.lineTo(W,y);}
  mc.stroke();
  menuBgW=W;menuBgH=H;menuBgDpr=dpr;
}

  const cols=5,cellW=W/cols,cellH=70,startY=oy+118-skinScroll;
  for(let i=0;i<SKINS.length;i++){
    const row=Math.floor(i/cols),col=i%cols;
    const cx=col*cellW+cellW/2,cy=startY+row*cellH+cellH/2;
    if(cy<sat+118||cy>H-sab)continue;
    const unlocked=unlockedSkins.includes(i);
    if(i===currentSkin){ctx.strokeStyle=zoneAccent;ctx.lineWidth=2;rr(cx-cellW/2+4,cy-cellH/2+4,cellW-8,cellH-8,8);ctx.stroke();}
    if(unlocked){
      const skin=SKINS[i];
      for(let j=0;j<5;j++){const t=j/5;let c;if(skin.p==='rainbow')c=hsl((j*60+frameCount*2)%360,80,60);else c=lerpColor(skin.c[1],skin.c[0],t);ctx.fillStyle=c;ctx.beginPath();ctx.arc(cx-10+j*5,cy-5,5-t*2,0,TAU);ctx.fill();}
      ctx.fillStyle='rgba(255,255,255,0.5)';ctx.font='600 10px Rajdhani';ctx.fillText(skin.name,cx,cy+18);
    }else{
      ctx.fillStyle='rgba(255,255,255,0.1)';ctx.beginPath();ctx.arc(cx,cy-5,12,0,TAU);ctx.fill();
      ctx.fillStyle='rgba(255,255,255,0.2)';ctx.font='bold 12px Rajdhani';ctx.fillText('?',cx,cy);
      const u=SKINS[i].u,t=u[0],v=parseInt(u.slice(1));let hint='';
      if(t==='s')hint=L.scoreReq+' '+v;if(t==='k')hint=v+' '+L.killsReq;if(t==='l')hint=L.lengthReq+' '+v;if(t==='g')hint=v+' '+L.gamesReq;
      ctx.fillStyle='rgba(255,255,255,0.3)';ctx.font='600 8px Rajdhani';ctx.fillText(hint,cx,cy+14);
      const p=skinPrice(SKINS[i]);
      ctx.fillStyle=coins>=p?'#ffd600':'rgba(255,214,0,0.3)';ctx.font='bold 9px Rajdhani';ctx.fillText('🪙'+p,cx,cy+24);
    }
  }
  // Buy confirm modal
  if(pendingSkinBuy>=0){
    const idx=pendingSkinBuy,sk=SKINS[idx],p=skinPrice(sk);
    ctx.fillStyle='rgba(0,0,0,0.92)';ctx.fillRect(0,0,W,H);
    const mw=Math.min(320,W-40),mh=Math.min(240,H-sat-sab-40);
    const mx=W/2-mw/2,my=Math.max(sat+20,(H-mh)/2);
    ctx.fillStyle='#10102a';rr(mx,my,mw,mh,16);ctx.fill();
    ctx.strokeStyle=zoneAccent;ctx.lineWidth=2;rr(mx,my,mw,mh,16);ctx.stroke();
    ctx.textAlign='center';
    // Skin preview
    for(let j=0;j<8;j++){const t=j/8;let c;if(sk.p==='rainbow')c=hsl((j*45+frameCount*2)%360,80,60);else c=lerpColor(sk.c[1],sk.c[0],t);ctx.fillStyle=c;ctx.beginPath();ctx.arc(mx+mw/2-18+j*5,my+44,6-t*2,0,TAU);ctx.fill();}
    ctx.fillStyle='#fff';ctx.font='900 22px Orbitron';ctx.fillText(sk.name,W/2,my+86);
    ctx.fillStyle='#ffd600';ctx.font='900 26px Orbitron';ctx.shadowColor='#ffd600';ctx.shadowBlur=10;
    ctx.fillText('🪙 '+p,W/2,my+126);ctx.shadowBlur=0;
    ctx.fillStyle='rgba(255,255,255,0.55)';ctx.font='600 13px Rajdhani';
    ctx.fillText(isTR?'Bu görünümü satın al?':'Buy this skin?',W/2,my+150);
    const cbw=120,cbh=48,cy=my+mh-cbh-20;
    ctx.fillStyle='#00e676';rr(mx+20,cy,cbw,cbh,24);ctx.fill();
    ctx.fillStyle='#0a0a1a';ctx.font='900 16px Orbitron';ctx.fillText(isTR?'AL':'BUY',mx+20+cbw/2,cy+30);
    ctx.fillStyle='rgba(255,255,255,0.15)';ctx.strokeStyle='rgba(255,255,255,0.5)';ctx.lineWidth=2;rr(mx+mw-cbw-20,cy,cbw,cbh,24);ctx.fill();ctx.stroke();
    ctx.fillStyle='#fff';ctx.fillText(isTR?'İPTAL':'CANCEL',mx+mw-cbw-20+cbw/2,cy+30);
    ctx.textAlign='left';
  }
  // Scrollbar indicator
  const maxScroll=Math.max(0,Math.ceil(SKINS.length/5)*70-H+sat+sab+128);
  if(maxScroll>0){
    const sbY=sat+128,sbH=H-sab-sbY-12,sbX=W-6;
    const thumbR=Math.min(1,sbH/(sbH+maxScroll)),thumbH=sbH*thumbR;
    const thumbY=sbY+(skinScroll/maxScroll)*(sbH-thumbH);
    ctx.fillStyle='rgba(255,255,255,0.08)';ctx.fillRect(sbX,sbY,3,sbH);
    ctx.fillStyle='rgba(255,255,255,0.45)';ctx.fillRect(sbX,thumbY,3,thumbH);
  }
  ctx.textAlign='left';
}

// ═══ INPUT ═══
// touches: { [identifier:number]: 'joy' | 'joyboost' } — ONLY numeric identifiers,
// never any other keys. Keep that invariant so iteration doesn't need a guard.
let touches={};
// Skin-select scroll uses its own state instead of stuffing a string key into
// the touches map (used to be touches._lastY which made every iteration need
// a `k !== '_lastY'` filter).
let skinScrollLastY=null;
let lastTapEndAt=0,lastTapX=0,lastTapY=0;
const DOUBLE_TAP_MS=320,DOUBLE_TAP_DIST=100;
$.addEventListener('touchstart',function(e){
  e.preventDefault();initAudio();
  const t=e.changedTouches[0];
  // Tutorial overlay can be shown over any state (initial spawn or pause-launched).
  // A single tap dismisses it and returns control to the underlying screen.
  if(showTutorial){markTutorialSeen();tutorialReturnState=null;sndMenu();return;}
  if(state==='menu'){handleMenuTap(t.clientX,t.clientY);return;}
  if(state==='dead'){handleDeathTap(t.clientX,t.clientY);return;}
  if(state==='paused'){handlePauseTap(t.clientX,t.clientY);return;}
  if(state==='leaderboard'){handleLeaderboardTap(t.clientX,t.clientY);return;}
  if(state==='skinselect'){handleSkinTap(t.clientX,t.clientY);skinScrollLastY=t.clientY;return;}
  if(state==='playing'){
    // Pause button (bottom-left) — only remaining HUD button
    if(dist({x:t.clientX,y:t.clientY},{x:50,y:H-sab-60})<46){state='paused';if(player)player.boosting=false;joystick.active=false;sndMenu();return;}
    // If a second finger is already on screen → boost while held
    let extraFinger=false;for(const k in touches){if(touches[k]){extraFinger=true;break;}}
    // Double-tap-and-hold: tap recently, this touch begins quickly nearby → boost
    const now=performance.now();
    const isDoubleTap=(now-lastTapEndAt<DOUBLE_TAP_MS)&&Math.hypot(t.clientX-lastTapX,t.clientY-lastTapY)<DOUBLE_TAP_DIST;
    const wantBoost=extraFinger||isDoubleTap;
    if(wantBoost&&player&&player.alive){player.boosting=true;sndBoost();}
    // Joystick anchor at this touch (so direction is whatever the player drags toward)
    joystick.active=true;joystick.cx=t.clientX;joystick.cy=t.clientY;joystick.dx=0;joystick.dy=0;
    touches[t.identifier]=wantBoost?'joyboost':'joy';
  }
},{passive:false});

$.addEventListener('touchmove',function(e){
  e.preventDefault();
  if(state==='skinselect'){const t=e.changedTouches[0];skinScroll-=t.clientY-(skinScrollLastY!=null?skinScrollLastY:t.clientY);skinScroll=Math.max(0,Math.min(skinScroll,Math.max(0,Math.ceil(SKINS.length/5)*70-H+sat+sab+128)));skinScrollLastY=t.clientY;return;}
  for(let i=0;i<e.changedTouches.length;i++){
    const t=e.changedTouches[i];
    const kind=touches[t.identifier];
    if((kind==='joy'||kind==='joyboost')&&joystick.active){
      let dx=t.clientX-joystick.cx,dy=t.clientY-joystick.cy;
      const d=Math.sqrt(dx*dx+dy*dy);if(d>JOY_RADIUS){dx=dx/d*JOY_RADIUS;dy=dy/d*JOY_RADIUS;}
      joystick.dx=dx;joystick.dy=dy;
      if(d>JOY_DEAD&&player){joystick.angle=Math.atan2(dy,dx);player.targetAngle=joystick.angle;}
    }
  }
},{passive:false});

$.addEventListener('touchend',function(e){
  e.preventDefault();
  for(let i=0;i<e.changedTouches.length;i++){
    const t=e.changedTouches[i];
    const kind=touches[t.identifier];
    if(kind==='joyboost'&&player)player.boosting=false;
    // Track recent finger-up for double-tap-hold detection
    if(state==='playing'&&kind==='joy'){lastTapEndAt=performance.now();lastTapX=t.clientX;lastTapY=t.clientY;}
    delete touches[t.identifier];
  }
  // After removing this touch, recompute who owns the joystick.
  // If any joy/joyboost touch is still down, transfer joystick anchor to it
  // so the player can lift one finger but keep steering with the other.
  let owner=null;for(const k in touches){const v=touches[k];if(v==='joy'||v==='joyboost'){owner=k;break;}}
  if(owner==null){
    joystick.active=false;
    if(player)player.boosting=false;
  }
  // (joystick anchor is updated in touchstart; on transfer, the stick keeps
  //  its previous direction until the surviving finger moves and re-anchors.)
  skinScrollLastY=null;
},{passive:false});

// Mouse
$.addEventListener('mousedown',function(e){
  initAudio();
  if(showTutorial){markTutorialSeen();tutorialReturnState=null;sndMenu();return;}
  if(state==='menu'){handleMenuTap(e.clientX,e.clientY);return;}
  if(state==='dead'){handleDeathTap(e.clientX,e.clientY);return;}
  if(state==='paused'){handlePauseTap(e.clientX,e.clientY);return;}
  if(state==='leaderboard'){handleLeaderboardTap(e.clientX,e.clientY);return;}
  if(state==='skinselect'){handleSkinTap(e.clientX,e.clientY);return;}
  if(state==='playing'&&dist({x:e.clientX,y:e.clientY},{x:50,y:H-sab-60})<42){state='paused';if(player)player.boosting=false;sndMenu();return;}
  if(e.button===2&&player){player.boosting=true;sndBoost();}
});
$.addEventListener('mousemove',function(e){if(state==='playing'&&player&&player.alive)player.targetAngle=Math.atan2(e.clientY-H/2,e.clientX-W/2);});
$.addEventListener('mouseup',function(e){if(player)player.boosting=false;});
$.addEventListener('contextmenu',function(e){e.preventDefault();});
window.addEventListener('keydown',function(e){
  // Tutorial overlay swallows everything: any key dismisses it and the
  // event does NOT fall through to gameplay (otherwise ESC+tutorial open
  // would resume the game while the overlay was still drawn on top).
  if(showTutorial){if(e.code==='Space'||e.code==='Enter'||e.code==='Escape'){markTutorialSeen();tutorialReturnState=null;sndMenu();}return;}
  if(e.code==='Space'&&player){player.boosting=true;sndBoost();}
  if(e.code==='Escape'){if(state==='playing'){state='paused';if(player)player.boosting=false;joystick.active=false;sndMenu();}else if(state==='paused'){state='playing';if(player)player.invulnTimer=Math.max(player.invulnTimer,1.2);quitConfirmTimer=0;sndMenu();}}
});
window.addEventListener('keyup',function(e){if(e.code==='Space'&&player)player.boosting=false;});

function handleMenuTap(x,y){
  // Settings overlay swallows taps when open.
  if(showSettings){
    const uh=H-sat-sab,oy=sat;
    const bw=Math.min(280,W-40),bh=Math.min(60,Math.floor(uh*0.09));
    // Pill row
    const ry=oy+uh*0.36;
    if(y>ry&&y<ry+bh){
      const pillW=Math.floor(bw/3)-6,pillGap=9;
      const totalPills=pillW*3+pillGap*2,pillsX=W/2-totalPills/2;
      const p2X=pillsX+pillW+pillGap,p3X=pillsX+2*(pillW+pillGap);
      if(x>pillsX&&x<pillsX+pillW){soundOn=!soundOn;saveSettings();sndMenu();return;}
      if(x>p2X&&x<p2X+pillW){musicOn=!musicOn;saveSettings();if(musicOn)startMusic();else stopMusic();sndMenu();return;}
      if(x>p3X&&x<p3X+pillW){vibrationOn=!vibrationOn;saveSettings();sndMenu();return;}
    }
    // Done button
    const dy=oy+uh*0.55;
    if(y>dy&&y<dy+bh&&x>W/2-bw/2&&x<W/2+bw/2){showSettings=false;sndMenu();return;}
    // Tap anywhere else outside the modal also dismisses
    return;
  }
  // Settings button (top-left corner)
  if(x<60&&x>10&&y>sat+10&&y<sat+60){showSettings=true;sndMenu();return;}
  // Help button (top-right corner)
  if(x>W-60&&x<W-10&&y>sat+10&&y<sat+60){showTutorial=true;sndMenu();return;}
  sndMenu();const uh=H-sat-sab,oy=sat,bw=220,bh=58,bx=W/2-bw/2,by=oy+uh*0.42;
  if(x>bx&&x<bx+bw&&y>by&&y<by+bh){startGame();return;}
  const sy=oy+uh*0.54;if(x>bx+20&&x<bx+bw-20&&y>sy&&y<sy+44){state='skinselect';skinScroll=0;return;}
  const ly=oy+uh*0.63;if(x>bx+20&&x<bx+bw-20&&y>ly&&y<ly+42){state='leaderboard';return;}
  const ay=oy+uh*0.72;if(x>bx+20&&x<bx+bw-20&&y>ay&&y<ay+42){
    if(!adReady.rewarded){showToast(L.adNotAvailable,'error');postMsg({type:'CHECK_AD_READY'});return;}
    postMsg({type:'SHOW_REWARDED_AD',data:{reward:'coins'}});return;
  }
}
function handlePauseTap(x,y){
  const uh=H-sat-sab,oy=sat;
  const bw=Math.min(260,W-40),bh=Math.min(52,Math.floor(uh*0.08)),bx=W/2-bw/2;
  // If the confirm modal is up, only Yes/No respond.
  if(quitConfirmTimer>0){
    const mw=Math.min(320,W-40),mh=Math.min(220,H-sat-sab-40);
    const mx=W/2-mw/2,my=Math.max(sat+20,(H-mh)/2);
    const cbw=120,cbh=48,cy=my+mh-cbh-20;
    if(x>mx+20&&x<mx+20+cbw&&y>cy&&y<cy+cbh){quitConfirmTimer=0;state='menu';saveHS();saveStats();saveCoins();resetTouchState();sndMenu();return;}
    if(x>mx+mw-cbw-20&&x<mx+mw-20&&y>cy&&y<cy+cbh){quitConfirmTimer=0;sndMenu();return;}
    return;
  }
  sndMenu();
  // Resume
  let ry=oy+uh*0.20;
  if(x>bx&&x<bx+bw&&y>ry&&y<ry+bh){state='playing';if(player)player.invulnTimer=Math.max(player.invulnTimer,1.2);quitConfirmTimer=0;return;}
  // Settings pills row
  ry=oy+uh*0.34;
  const pillW=Math.floor(bw/3)-6,pillGap=9;
  const totalPills=pillW*3+pillGap*2,pillsX=W/2-totalPills/2;
  if(y>ry&&y<ry+bh){
    const pillsXEnd=pillsX+pillW;
    const pill2X=pillsX+pillW+pillGap,pill2XEnd=pill2X+pillW;
    const pill3X=pillsX+2*(pillW+pillGap),pill3XEnd=pill3X+pillW;
    if(x>pillsX&&x<pillsXEnd){soundOn=!soundOn;saveSettings();return;}
    if(x>pill2X&&x<pill2XEnd){musicOn=!musicOn;saveSettings();if(musicOn)startMusic();else stopMusic();return;}
    if(x>pill3X&&x<pill3XEnd){vibrationOn=!vibrationOn;saveSettings();return;}
  }
  // How to play
  ry=oy+uh*0.50;
  if(x>bx&&x<bx+bw&&y>ry&&y<ry+bh){showTutorial=true;tutorialReturnState='paused';return;}
  // Main menu (open confirm)
  ry=oy+uh*0.64;
  if(x>bx&&x<bx+bw&&y>ry&&y<ry+bh){quitConfirmTimer=10;return;}
}
function handleLeaderboardTap(x,y){
  if(x>=12&&x<=12+84&&y>=sat+12&&y<=sat+12+40){state='menu';resetTouchState();sndMenu();}
}
function handleDeathTap(x,y){
  sndMenu();const uh=H-sat-sab,oy=sat;
  const bw=Math.min(260,W-40),bh=50;
  // Revive
  const ry=oy+uh*0.62;
  if(x>W/2-bw/2&&x<W/2+bw/2&&y>ry&&y<ry+bh){
    if(adReady.rewarded){postMsg({type:'SHOW_REWARDED_AD',data:{reward:'continue'}});return;}
    if(coins>=COIN_REVIVE_COST){coins-=COIN_REVIVE_COST;saveCoins();sndPowerup();revivePlayer();return;}
    showToast(L.adNotAvailable,'error');postMsg({type:'CHECK_AD_READY'});return;
  }
  // Play Again
  const ry2=oy+uh*0.745;
  if(x>W/2-bw/2&&x<W/2+bw/2&&y>ry2&&y<ry2+bh){startGame();return;}
  // Main Menu
  const ry3=oy+uh*0.87;
  if(x>W/2-bw/2&&x<W/2+bw/2&&y>ry3&&y<ry3+44){state='menu';saveHS();saveStats();saveCoins();resetTouchState();return;}
}
function handleSkinTap(x,y){
  // If buy-confirm modal is up, route taps to its buttons only
  if(pendingSkinBuy>=0){
    const mw=Math.min(320,W-40),mh=Math.min(240,H-sat-sab-40);
    const mx=W/2-mw/2,my=Math.max(sat+20,(H-mh)/2);
    const cbw=120,cbh=48,cy=my+mh-cbh-20;
    // Yes (left)
    if(x>mx+20&&x<mx+20+cbw&&y>cy&&y<cy+cbh){
      const idx=pendingSkinBuy,p=skinPrice(SKINS[idx]);
      if(p>0&&coins>=p){coins-=p;unlockedSkins.push(idx);currentSkin=idx;saveCoins();saveSkins();saveStats();sndPowerup();showToast(SKINS[idx].name+' ✓','success');}
      else{buyFailedMsg=2;showToast(L.notEnough,'error');sndDeath();}
      pendingSkinBuy=-1;return;
    }
    // No (right) — also acts as cancel for tap-outside
    pendingSkinBuy=-1;sndMenu();return;
  }
  // Back chip
  if(x>=12&&x<=12+84&&y>=sat+12&&y<=sat+12+40){state='menu';resetTouchState();sndMenu();return;}
  if(y<sat+118)return;
  const cols=5,cellW=W/cols,cellH=70,startY=sat+118-skinScroll;
  const col=Math.floor(x/cellW),row=Math.floor((y-startY)/cellH);
  const idx=row*cols+col;
  if(idx<0||idx>=SKINS.length)return;
  if(unlockedSkins.includes(idx)){currentSkin=idx;saveStats();sndMenu();return;}
  const p=skinPrice(SKINS[idx]);
  if(p<=0){return;}
  if(coins<p){buyFailedMsg=2;sndDeath();showToast(L.notEnough,'error');return;}
  // Open buy confirm modal
  pendingSkinBuy=idx;sndMenu();
}

// ═══ AUTO-PAUSE (background / focus loss / phone call / notification) ═══
function autoPauseIfPlaying(){
  if(state==='playing'){
    state='paused';
    if(player)player.boosting=false;
    joystick.active=false;
    for(const k in touches)delete touches[k];
    quitConfirmTimer=0;
  }
  // Always halt music tick on background — saves CPU + battery, avoids
  // overlapping notes when the WebView resumes. Ad-ready poll also stops
  // (the host pushes status when it changes; foreground polling is just a
  // safety net we don't need while hidden).
  stopMusic();
  stopAdReadyPoll();
}
function resumeFromBackground(){
  lt=0;
  if(musicOn&&ac&&ac.state!=='suspended')startMusic();
  startAdReadyPoll();
  if(hostBridgeSeen)postMsg({type:'CHECK_AD_READY'});
}
document.addEventListener('visibilitychange',function(){
  if(document.hidden)autoPauseIfPlaying();else resumeFromBackground();
});
window.addEventListener('blur',autoPauseIfPlaying);
window.addEventListener('pagehide',autoPauseIfPlaying);
window.addEventListener('focus',resumeFromBackground);

// ═══ GAME LOOP ═══
let lt=0;
function loop(ts){
  if(!lt)lt=ts;
  const d=Math.min((ts-lt)/1000,0.05);lt=ts;
  update(d);render();
  requestAnimationFrame(loop);
}
document.fonts.ready.then(function(){requestAnimationFrame(loop);});
</script>
